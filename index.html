<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ełk Nasze Eventy | Wszystko o eventach</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #003366;
            --accent: #ffcc00;
            --dark: #1a1a1a;
            --light: #f4f7f6;
            --success: #27ae60;
            --danger: #e74c3c;
            --glass: rgba(255, 255, 255, 0.95);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, sans-serif; }
        body { background-color: var(--light); color: var(--dark); overflow-x: hidden; }

        /* --- LOADING SPINNER --- */
        #loader { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); z-index: 9999; justify-content: center; align-items: center; color: white; flex-direction: column; }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- NAVIGATION --- */
        nav { background: var(--primary); color: white; padding: 15px 0; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .nav-container { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .logo { font-size: 26px; font-weight: 900; text-transform: uppercase; letter-spacing: -1.5px; cursor: pointer; color: white; text-decoration: none; }
        .logo span { color: var(--accent); }
        .nav-links button { background: var(--accent); color: var(--primary); border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-left: 10px; }
        .nav-links button:hover { background: white; transform: translateY(-2px); }

        /* --- HERO SECTION --- */
        .hero { background: linear-gradient(rgba(0,51,102,0.8), rgba(0,51,102,0.8)), url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1200&q=80'); background-size: cover; background-position: center; height: 300px; display: flex; align-items: center; justify-content: center; color: white; text-align: center; margin-bottom: 40px; }
        .hero h1 { font-size: 48px; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }

        /* --- GRID --- */
        .main-container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 30px; margin-bottom: 50px; }

        /* --- NEWS CARDS --- */
        .card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); transition: 0.4s; position: relative; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
        
        .card-gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(50%, 1fr)); gap: 2px; background: #000; height: 280px; cursor: pointer; overflow: hidden; }
        .card-gallery img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .card-gallery img:hover { transform: scale(1.05); filter: brightness(1.1); }
        
        .card-body { padding: 30px; flex-grow: 1; }
        .card-category { color: var(--primary); font-weight: 800; font-size: 12px; text-transform: uppercase; margin-bottom: 10px; display: block; }
        .card-title { font-size: 24px; font-weight: 900; margin-bottom: 15px; color: var(--dark); line-height: 1.2; }
        .card-content { color: #555; font-size: 16px; margin-bottom: 20px; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
        
        .card-meta { display: flex; align-items: center; gap: 15px; padding: 20px 30px; background: #fafafa; border-top: 1px solid #eee; font-size: 14px; color: #888; }
        .card-meta i { color: var(--primary); }

        /* --- ADMIN PANEL --- */
        .admin-panel { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); max-width: 900px; margin: 0 auto; }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 10px; color: var(--primary); }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 15px; border: 2px solid #e1e1e1; border-radius: 12px; font-size: 16px; transition: 0.3s; }
        .form-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(0,51,102,0.1); }

        .drop-zone { border: 3px dashed #cbd5e0; padding: 40px; text-align: center; border-radius: 15px; cursor: pointer; background: #f8fafc; transition: 0.3s; }
        .drop-zone:hover { border-color: var(--primary); background: #ebf4ff; }
        .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 20px; }
        .preview-item { width: 100%; height: 100px; object-fit: cover; border-radius: 10px; border: 2px solid var(--primary); }

        .btn-submit { background: var(--primary); color: white; border: none; padding: 20px; width: 100%; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,51,102,0.2); }
        .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0,51,102,0.3); }

        /* --- LIGHTBOX --- */
        #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; justify-content: center; align-items: center; cursor: pointer; }
        #lightbox img { max-width: 90%; max-height: 90%; border-radius: 5px; box-shadow: 0 0 50px rgba(0,0,0,0.5); }

        /* --- TOAST --- */
        #toast { visibility: hidden; min-width: 300px; background-color: var(--dark); color: #fff; text-align: center; border-radius: 50px; padding: 16px; position: fixed; z-index: 10001; left: 50%; bottom: 30px; transform: translateX(-50%); font-weight: bold; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }

        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        .hidden { display: none !important; }
        .admin-list-card { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: #f8fafc; border-radius: 12px; margin-top: 15px; border: 1px solid #e1e1e1; }

        @media (max-width: 768px) {
            .news-grid { grid-template-columns: 1fr; }
            .hero h1 { font-size: 32px; }
        }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><h2 id="loader-text">Przetwarzanie dużych plików...</h2></div>
<div id="lightbox" onclick="this.style.display='none'"><img src="" id="lightbox-img"></div>
<div id="toast"></div>

<nav>
    <div class="nav-container">
        <a href="#" class="logo" onclick="showView('home')">Ełk <span>Nasze Eventy</span></a>
        <div class="nav-links">
            <button onclick="showView('home')"><i class="fas fa-newspaper"></i> Newsy</button>
            <button onclick="handleAuth()"><i class="fas fa-lock"></i> Panel Admina</button>
        </div>
    </div>
</nav>

<div id="view-home">
    <div class="hero">
        <div>
            <h1>Serce Mazur, Twoje Wydarzenia</h1>
            <p>Najszybsze informacje z regionu Ełku</p>
        </div>
    </div>
    <div class="main-container">
        <h2 style="margin-bottom: 30px; font-size: 32px; font-weight: 900;">Ostatnie Artykuły</h2>
        <div class="news-grid" id="public-feed"></div>
    </div>
</div>

<div id="view-login" class="hidden">
    <div style="max-width: 450px; margin: 100px auto; background: white; padding: 50px; border-radius: 25px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); text-align: center;">
        <i class="fas fa-fingerprint fa-4x" style="color: var(--primary); margin-bottom: 20px;"></i>
        <h2>Weryfikacja</h2>
        <p style="color: #666; margin-bottom: 30px;">Podaj kod dostępu do redakcji</p>
        <input type="password" id="admin-pass" style="width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #eee; text-align: center; font-size: 20px; margin-bottom: 20px;" placeholder="Hasło...">
        <button class="btn-submit" onclick="login()">Zaloguj do Systemu</button>
    </div>
</div>

<div id="view-admin" class="hidden">
    <div class="main-container" style="margin-top: 50px;">
        <div class="admin-panel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
                <h2>Nowy Artykuł Premium</h2>
                <button onclick="logout()" style="background: var(--danger); color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer;">Wyloguj</button>
            </div>

            <div class="form-group">
                <label>Tytuł (Brak limitu znaków)</label>
                <input type="text" id="p-title" placeholder="Wpisz nagłówek...">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label>Autor / Redaktor</label>
                    <input type="text" id="p-author" placeholder="Twoje nazwisko...">
                </div>
                <div class="form-group">
                    <label>Kategoria</label>
                    <select id="p-cat">
                        <option>Wiadomości</option>
                        <option>Inwestycje</option>
                        <option>Kultura</option>
                        <option>Sport</option>
                        <option>Kryminalne</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Treść Artykułu</label>
                <textarea id="p-content" rows="10" placeholder="Pełna treść wiadomości..."></textarea>
            </div>

            <div class="form-group">
                <label>Galeria Multi-Media (Duże pliki dozwolone)</label>
                <div class="drop-zone" onclick="document.getElementById('p-files').click()">
                    <i class="fas fa-cloud-upload-alt fa-3x" style="color: var(--primary); margin-bottom: 10px;"></i>
                    <p>Przeciągnij zdjęcia tutaj lub kliknij, aby wybrać z dysku</p>
                    <input type="file" id="p-files" multiple accept="image/*" class="hidden" onchange="handleFileSelect(this.files)">
                </div>
                <div class="preview-grid" id="p-previews"></div>
            </div>

            <button class="btn-submit" onclick="publish()">OPUBLIKUJ NA PORTALU</button>

            <div style="margin-top: 60px;">
                <h3>Zarządzanie treścią</h3>
                <div id="admin-list"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- INDEXED DB ENGINE ---
    const DB_NAME = "ElkEventyDB";
    const DB_VERSION = 1;
    let db;

    const request = indexedDB.open(DB_NAME, DB_VERSION);
    request.onupgradeneeded = (e) => {
        const dbInstance = e.target.result;
        if (!dbInstance.objectStoreNames.contains("posts")) {
            dbInstance.createObjectStore("posts", { keyPath: "id", autoIncrement: true });
        }
    };
    request.onsuccess = (e) => { db = e.target.result; renderHome(); };

    let tempImages = [];

    // --- NAVIGATION & AUTH ---
    function showView(v) {
        ['home', 'login', 'admin'].forEach(x => document.getElementById('view-'+x).classList.add('hidden'));
        document.getElementById('view-'+v).classList.remove('hidden');
        if(v === 'home') renderHome();
        if(v === 'admin') renderAdmin();
    }

    function handleAuth() {
        if(sessionStorage.getItem('elk_logged') === 'true') showView('admin');
        else showView('login');
    }

    function login() {
        if(document.getElementById('admin-pass').value === 'diax67') {
            sessionStorage.setItem('elk_logged', 'true');
            showView('admin');
            notify("Zalogowano pomyślnie");
        } else { notify("Błędne hasło!", true); }
    }

    function logout() {
        sessionStorage.removeItem('elk_logged');
        showView('home');
    }

    // --- FILE HANDLING ---
    async function handleFileSelect(files) {
        tempImages = [];
        const previewArea = document.getElementById('p-previews');
        previewArea.innerHTML = '';
        
        showLoader("Przetwarzanie plików...");
        
        for (let file of files) {
            const base64 = await toBase64(file);
            tempImages.push(base64);
            const img = document.createElement('img');
            img.src = base64;
            img.className = 'preview-item';
            previewArea.appendChild(img);
        }
        
        hideLoader();
    }

    const toBase64 = file => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });

    // --- CRUD OPERATIONS ---
    async function publish() {
        const title = document.getElementById('p-title').value;
        const author = document.getElementById('p-author').value;
        const content = document.getElementById('p-content').value;
        const cat = document.getElementById('p-cat').value;

        if(!title || !content || tempImages.length === 0) {
            return notify("Wypełnij tytuł, treść i dodaj zdjęcia!", true);
        }

        showLoader("Zapisywanie w bazie danych...");

        const newPost = {
            title, author, content, category: cat,
            images: tempImages,
            date: new Date().toLocaleDateString('pl-PL'),
            time: new Date().toLocaleTimeString('pl-PL', {hour: '2-digit', minute:'2-digit'}),
            timestamp: Date.now()
        };

        const transaction = db.transaction(["posts"], "readwrite");
        const store = transaction.objectStore("posts");
        store.add(newPost);

        transaction.oncomplete = () => {
            hideLoader();
            notify("Artykuł opublikowany!");
            resetForm();
            renderAdmin();
        };
        transaction.onerror = () => {
            hideLoader();
            notify("Błąd zapisu! Możliwy brak miejsca w pamięci przeglądarki.", true);
        };
    }

    function resetForm() {
        document.getElementById('p-title').value = '';
        document.getElementById('p-content').value = '';
        document.getElementById('p-previews').innerHTML = '';
        tempImages = [];
    }

    async function deletePost(id) {
        if(!confirm("Usunąć ten post bezpowrotnie?")) return;
        const transaction = db.transaction(["posts"], "readwrite");
        transaction.objectStore("posts").delete(id);
        transaction.oncomplete = () => {
            notify("Usunięto pomyślnie");
            renderAdmin();
        };
    }

    // --- RENDERING ---
    async function renderHome() {
        const feed = document.getElementById('public-feed');
        feed.innerHTML = '';
        
        const transaction = db.transaction(["posts"], "readonly");
        const store = transaction.objectStore("posts");
        const request = store.getAll();

        request.onsuccess = () => {
            const allPosts = request.result.sort((a,b) => b.timestamp - a.timestamp);
            if(allPosts.length === 0) {
                feed.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding: 100px; color: #999;">
                    <i class="fas fa-inbox fa-4x" style="margin-bottom:20px"></i>
                    <p>Brak wiadomości. Dodaj pierwszy post w panelu admina.</p>
                </div>`;
                return;
            }

            allPosts.forEach(p => {
                const gallery = p.images.slice(0, 4).map(img => `<img src="${img}" onclick="openLightbox('${img}')">`).join('');
                feed.innerHTML += `
                    <div class="card">
                        <div class="card-gallery">
                            ${gallery}
                        </div>
                        <div class="card-body">
                            <span class="card-category">${p.category}</span>
                            <h2 class="card-title">${p.title}</h2>
                            <p class="card-content">${p.content}</p>
                        </div>
                        <div class="card-meta">
                            <span><i class="fas fa-user-circle"></i> ${p.author || 'Redakcja'}</span>
                            <span><i class="far fa-calendar-alt"></i> ${p.date}</span>
                            <span><i class="far fa-clock"></i> ${p.time}</span>
                        </div>
                    </div>
                `;
            });
        };
    }

    async function renderAdmin() {
        const list = document.getElementById('admin-list');
        list.innerHTML = '';
        const store = db.transaction(["posts"], "readonly").objectStore("posts");
        store.getAll().onsuccess = (e) => {
            e.target.result.forEach(p => {
                list.innerHTML += `
                    <div class="admin-list-card">
                        <div>
                            <strong>${p.title}</strong><br>
                            <small>${p.date} | Zdjęć: ${p.images.length}</small>
                        </div>
                        <button onclick="deletePost(${p.id})" style="background:var(--danger); color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">Usuń</button>
                    </div>
                `;
            });
        };
    }

    // --- UTILS ---
    function openLightbox(src) {
        document.getElementById('lightbox-img').src = src;
        document.getElementById('lightbox').style.display = 'flex';
    }

    function notify(msg, err = false) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.background = err ? "var(--danger)" : "var(--dark)";
        t.className = "show";
        setTimeout(() => { t.className = ""; }, 3000);
    }

    function showLoader(txt) {
        document.getElementById('loader-text').innerText = txt;
        document.getElementById('loader').style.display = 'flex';
    }

    function hideLoader() {
        document.getElementById('loader').style.display = 'none';
    }

</script>

</body>
</html>

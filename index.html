<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ełk Nasze Informacje</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --main: #0062ff; --urgent: #ff003c; }
        body { background: #0b0f1a; color: white; font-family: 'Inter', sans-serif; scroll-behavior: smooth; overflow-x: hidden; }
        
        .glass { background: rgba(22, 28, 45, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(255,255,255,0.05); background: #161c2d; position: relative; }
        .card:hover { transform: translateY(-8px); border-color: var(--main); box-shadow: 0 20px 40px -15px rgba(0,98,255,0.3); }
        
        .input-dark { background: #0b0f1a; border: 2px solid #2d3748; border-radius: 12px; padding: 12px; width: 100%; color: white; outline: none; transition: 0.2s; }
        .input-dark:focus { border-color: var(--main); box-shadow: 0 0 0 4px rgba(0,98,255,0.1); }
        
        /* Marquee Strip */
        .marquee { white-space: nowrap; overflow: hidden; position: relative; color: white; font-size: 11px; font-weight: 900; padding: 8px 0; text-transform: uppercase; transition: background 0.5s ease; border-bottom: 1px solid rgba(0,0,0,0.2); }
        .marquee-content { display: inline-block; animation: marquee 35s linear infinite; padding-left: 100%; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        .tab-btn { padding: 10px 24px; font-size: 11px; font-weight: 800; text-transform: uppercase; border-radius: 14px; color: #64748b; transition: 0.3s; background: rgba(255,255,255,0.03); }
        .tab-btn.active { background: var(--main); color: white; box-shadow: 0 4px 15px rgba(0,98,255,0.3); }
        
        .md-h1 { font-size: 2.25rem; font-weight: 900; display: block; margin: 1.5rem 0 1rem; border-left: 6px solid var(--main); padding-left: 15px; line-height: 1; }
        .md-link { color: var(--main); text-decoration: underline; font-weight: bold; }
        .urgent-badge { position: absolute; top: 12px; right: 12px; background: var(--urgent); color: white; font-size: 9px; padding: 3px 8px; border-radius: 6px; font-weight: 900; z-index: 10; letter-spacing: 1px; box-shadow: 0 4px 10px rgba(255,0,60,0.4); }
        
        #loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; align-items: center; justify-content: center; flex-direction: column; gap: 20px; }
        .preview-img { width: 80px; height: 80px; object-cover; border-radius: 12px; border: 2px solid var(--main); }
    </style>
</head>
<body>

    <div id="loader">
        <div class="animate-spin text-5xl text-blue-500"><i class="fa-solid fa-circle-notch"></i></div>
        <span class="text-xs font-black uppercase tracking-widest text-blue-400">Przesyłanie informacji...</span>
    </div>

    <div class="marquee" id="marquee-container" style="background: var(--urgent);">
        <div class="marquee-content" id="breaking-news">Witamy w serwisie informacyjnym Ełku...</div>
    </div>

    <header class="sticky top-0 z-50 glass">
        <div class="max-w-6xl mx-auto px-4 h-18 flex justify-between items-center py-4">
            <div class="flex items-center gap-6">
                <h1 onclick="core.goHome()" class="text-2xl font-black italic cursor-pointer uppercase tracking-tighter">EŁK <span class="text-blue-500">NASZE</span> INFO</h1>
                <div id="weather" class="hidden md:flex items-center gap-3 text-[11px] font-black opacity-80 bg-white/5 px-4 py-2 rounded-full border border-white/5">
                    <i class="fa-solid fa-temperature-half text-blue-400"></i> <span id="weather-temp">--°C</span>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button id="btn-admin-panel" onclick="core.showLogin()" class="text-[10px] font-bold uppercase opacity-50 hover:opacity-100 transition">Panel</button>
                <button id="btn-logout" onclick="core.logout()" class="hidden text-[10px] font-bold uppercase text-red-500 bg-red-500/10 px-3 py-1 rounded-lg">Wyloguj</button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 mt-8">
        <div id="search-area" class="mb-10 space-y-6">
            <div class="relative group">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 opacity-30 group-focus-within:text-blue-500 group-focus-within:opacity-100 transition"></i>
                <input type="text" id="search-input" oninput="core.filterPosts()" placeholder="Czego szukasz w Ełku?" class="input-dark pl-12 h-14 text-lg">
            </div>
            <div class="flex flex-wrap gap-3">
                <button onclick="core.switchTab('all', this)" class="tab-btn active">Wszystkie</button>
                <button onclick="core.switchTab('Wydarzenia', this)" class="tab-btn">Wydarzenia</button>
                <button onclick="core.switchTab('Informacje', this)" class="tab-btn">Informacje</button>
                <button onclick="core.switchTab('Aktualizacje', this)" class="tab-btn">Aktualizacje</button>
            </div>
        </div>

        <div id="view-home" class="pb-20">
            <div id="news-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            <button id="load-more" onclick="core.loadAll()" class="w-full mt-12 p-5 border border-white/10 rounded-2xl text-xs font-black uppercase hover:bg-blue-600 hover:text-white transition-all duration-300">Pokaż archiwum postów</button>
        </div>

        <div id="view-article" class="hidden pb-20 max-w-3xl mx-auto">
            <button onclick="core.goHome()" class="mb-10 text-slate-400 font-black uppercase text-[10px] flex items-center gap-2 hover:text-white transition"><i class="fa-solid fa-chevron-left"></i> Powrót do listy</button>
            <div id="article-content"></div>
            
            <div class="mt-16 pt-10 border-t border-white/10">
                <div class="flex items-center justify-between mb-12">
                    <button onclick="core.likePost()" class="flex items-center gap-4 bg-red-500/10 text-red-500 px-10 py-4 rounded-2xl hover:bg-red-500 hover:text-white transition-all transform active:scale-95">
                        <i class="fa-solid fa-heart text-xl"></i> <span id="like-count" class="font-black text-xl">0</span>
                    </button>
                </div>
                
                <div id="comments-list" class="space-y-6"></div>
                
                <div class="mt-12 bg-[#161c2d] p-8 rounded-[32px] border border-white/5 shadow-2xl">
                    <h3 class="text-lg font-black uppercase mb-6 italic text-blue-500">Dodaj swój komentarz</h3>
                    <div class="space-y-4">
                        <input type="text" id="comm-nick" placeholder="Twoje imię / Nick" class="input-dark">
                        <textarea id="comm-text" rows="3" placeholder="Co o tym sądzisz?" class="input-dark"></textarea>
                        <button onclick="core.addComment()" class="w-full bg-blue-600 p-4 rounded-xl font-black uppercase tracking-widest hover:bg-blue-700 transition">Wyślij opinię</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="view-admin" class="hidden pb-20">
            <div class="max-w-2xl mx-auto bg-[#161c2d] p-10 rounded-[40px] border border-white/10 shadow-2xl">
                <h2 id="admin-form-title" class="text-3xl font-black mb-8 uppercase text-blue-500 italic">Panel Redaktora</h2>
                <div class="space-y-5">
                    <input type="hidden" id="edit-id">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase opacity-40 ml-2">Tytuł Artykułu</label>
                        <input type="text" id="in-title" placeholder="Wpisz chwytliwy tytuł..." class="input-dark">
                    </div>
                    <div class="grid grid-cols-2 gap-5">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase opacity-40 ml-2">Autor</label>
                            <input type="text" id="in-author" placeholder="Twoje Imię" class="input-dark">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase opacity-40 ml-2">Kategoria</label>
                            <select id="in-category" class="input-dark">
                                <option value="Wydarzenia">Wydarzenia</option>
                                <option value="Informacje">Informacje</option>
                                <option value="Aktualizacje">Aktualizacje</option>
                            </select>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase opacity-40 ml-2">Treść (Obsługuje Markdown)</label>
                        <textarea id="in-content" rows="10" placeholder="Użyj # dla nagłówka, ** dla pogrubienia, [tekst](link) dla linków..." class="input-dark"></textarea>
                    </div>
                    
                    <label class="flex items-center gap-4 bg-red-500/5 p-5 rounded-2xl cursor-pointer border border-red-500/10 group">
                        <input type="checkbox" id="in-urgent" class="w-6 h-6 accent-red-600">
                        <div class="flex flex-col">
                            <span class="text-sm font-black uppercase text-red-500">Oznacz jako wiadomość PILNĄ</span>
                            <span class="text-[10px] opacity-50 uppercase font-bold">Pojawi się w pasku "Wszystkie"</span>
                        </div>
                    </label>

                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase opacity-40 ml-2">Zdjęcia (Można kilka)</label>
                        <input type="file" id="in-files" multiple class="block w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-black file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor-pointer" onchange="core.previewImages()">
                        <div id="preview-images" class="flex flex-wrap gap-3 mt-4"></div>
                    </div>

                    <button id="btn-publish" onclick="core.publish()" class="w-full bg-blue-600 p-5 rounded-2xl font-black uppercase text-lg shadow-xl shadow-blue-900/20 hover:scale-[1.02] transition">Opublikuj wiadomość</button>
                    <button id="btn-cancel-edit" onclick="core.resetAdminForm()" class="hidden w-full text-xs font-black uppercase opacity-40 py-2">Anuluj edycję</button>
                    
                    <div class="pt-10">
                        <h3 class="text-xs font-black uppercase opacity-40 mb-4 border-b border-white/5 pb-2">Zarządzaj istniejącymi postami</h3>
                        <div id="admin-posts-list" class="space-y-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="login-modal" class="fixed inset-0 bg-black/95 z-[1000] hidden items-center justify-center p-6">
        <div class="bg-[#161c2d] p-10 rounded-[40px] w-full max-w-sm border border-white/10 text-center shadow-2xl">
            <div class="w-20 h-20 bg-blue-600/10 rounded-full flex items-center justify-center mx-auto mb-6 text-blue-500 text-3xl">
                <i class="fa-solid fa-lock"></i>
            </div>
            <h2 class="text-2xl font-black mb-2 uppercase italic tracking-tighter">Autoryzacja</h2>
            <p class="text-[10px] font-bold uppercase opacity-40 mb-8">Wprowadź kod dostępu dla redakcji</p>
            <input type="password" id="admin-key-input" placeholder="••••••••" class="input-dark text-center text-2xl tracking-[1em] mb-8">
            <button onclick="core.checkAdminKey()" class="w-full bg-blue-600 p-5 rounded-2xl font-black uppercase tracking-widest hover:bg-blue-700 transition">Wejdź do panelu</button>
            <button onclick="core.closeLogin()" class="mt-6 text-[10px] font-black uppercase opacity-30 hover:opacity-100 transition">Wróć na stronę</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://mzk-by-facio-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const MY_SECRET_KEY = "ELK2026"; 
        const IMGBB_KEY = "19570ba1fa4dc27bd0ba974b4eb2e253";

        let allPosts = [];
        let currentPostId = null;
        let currentTab = 'all';

        window.core = {
            getWeather: async () => {
                try {
                    const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=53.82&longitude=22.36&current_weather=true');
                    const d = await r.json();
                    document.getElementById('weather-temp').innerText = `${Math.round(d.current_weather.temperature)}°C w Ełku`;
                    document.getElementById('weather').classList.remove('hidden');
                } catch(e) { console.log("Pogoda niedostępna"); }
            },

            previewImages: () => {
                const container = document.getElementById('preview-images');
                container.innerHTML = "";
                const files = document.getElementById('in-files').files;
                Array.from(files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = document.createElement('img');
                        img.src = e.target.result;
                        img.className = "preview-img shadow-lg shadow-blue-500/20";
                        container.appendChild(img);
                    };
                    reader.readAsDataURL(file);
                });
            },

            parseMd: (t) => {
                if(!t) return "";
                return t.replace(/^# (.*$)/gm, '<span class="md-h1">$1</span>')
                        .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank" class="md-link">$1</a>')
                        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                        .replace(/\n/g, '<br>');
            },

            goHome: () => {
                document.title = "Ełk Nasze Informacje";
                document.getElementById('view-home').classList.remove('hidden');
                document.getElementById('view-article').classList.add('hidden');
                document.getElementById('view-admin').classList.toggle('hidden', localStorage.getItem('is_editor') !== 'true');
                document.getElementById('search-area').classList.remove('hidden');
                window.scrollTo(0,0);
            },

            showLogin: () => document.getElementById('login-modal').style.display = 'flex',
            closeLogin: () => document.getElementById('login-modal').style.display = 'none',
            checkAdminKey: () => {
                if(document.getElementById('admin-key-input').value === MY_SECRET_KEY) {
                    localStorage.setItem('is_editor', 'true');
                    location.reload();
                } else alert("Dostęp zabroniony: Zły kod!");
            },
            logout: () => { localStorage.removeItem('is_editor'); location.reload(); },

            switchTab: (tab, btn) => {
                currentTab = tab;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                core.filterPosts();
                core.updateMarquee();
            },

            updateMarquee: () => {
                const marquee = document.getElementById('breaking-news');
                const container = document.getElementById('marquee-container');
                let titles = [], label = "";

                if(currentTab === 'all') {
                    label = "PILNE";
                    titles = allPosts.filter(p => p.isUrgent).map(p => p.title);
                    container.style.background = "var(--urgent)";
                } else {
                    label = currentTab.toUpperCase();
                    titles = allPosts.filter(p => p.category === currentTab).map(p => p.title);
                    container.style.background = "var(--main)";
                }
                marquee.innerText = titles.length > 0 ? ` +++ ${label}: ${titles.join(` +++ ${label}: `)} +++ ` : `Brak nowych wiadomości w sekcji ${label}`;
            },

            publish: async () => {
                const editId = document.getElementById('edit-id').value;
                const t = document.getElementById('in-title').value;
                const c = document.getElementById('in-content').value;
                if(!t || !c) return alert("Błąd: Tytuł i treść nie mogą być puste!");

                document.getElementById('loader').style.display = 'flex';
                let urls = [];
                const files = document.getElementById('in-files').files;

                for(let f of files) {
                    const fd = new FormData(); fd.append("image", f);
                    try {
                        const r = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: fd });
                        const d = await r.json(); 
                        if(d.success) urls.push(d.data.url);
                    } catch(e) { console.error("Upload error"); }
                }

                const postData = {
                    title: t, content: c, author: document.getElementById('in-author').value || "Redakcja",
                    category: document.getElementById('in-category').value,
                    isUrgent: document.getElementById('in-urgent').checked,
                    date: new Date().toLocaleString('pl-PL'), ts: Date.now()
                };
                
                if(urls.length > 0) postData.images = urls;
                const ref = editId ? db.ref(`elk/posts/${editId}`) : db.ref('elk/posts').push();
                if(!editId) postData.likes = 0;
                
                ref.update(postData).then(() => location.reload());
            },

            editPost: (id) => {
                const p = allPosts.find(x => x.id === id);
                document.getElementById('edit-id').value = id;
                document.getElementById('in-title').value = p.title;
                document.getElementById('in-content').value = p.content;
                document.getElementById('in-author').value = p.author;
                document.getElementById('in-category').value = p.category;
                document.getElementById('in-urgent').checked = p.isUrgent || false;
                document.getElementById('admin-form-title').innerText = "Edycja Treści";
                document.getElementById('btn-publish').innerText = "Zatwierdź Zmiany";
                document.getElementById('btn-cancel-edit').classList.remove('hidden');
                window.scrollTo(0,0);
            },

            resetAdminForm: () => {
                document.getElementById('edit-id').value = "";
                document.getElementById('in-title').value = "";
                document.getElementById('in-content').value = "";
                document.getElementById('admin-form-title').innerText = "Nowy Artykuł";
                document.getElementById('btn-publish').innerText = "Opublikuj";
                document.getElementById('btn-cancel-edit').classList.add('hidden');
            },

            render: (items) => {
                const container = document.getElementById('news-container');
                container.innerHTML = "";
                items.forEach(p => {
                    const card = document.createElement('div');
                    card.className = "card rounded-[32px] overflow-hidden cursor-pointer flex flex-col h-full";
                    card.innerHTML = `
                        ${p.isUrgent ? '<span class="urgent-badge"><i class="fa-solid fa-bolt mr-1"></i> PILNE</span>' : ''}
                        ${p.images?.[0] ? `<img src="${p.images[0]}" class="w-full h-56 object-cover">` : '<div class="h-3 bg-blue-600"></div>'}
                        <div class="p-8 flex flex-col flex-grow">
                            <span class="text-[10px] font-black uppercase text-blue-500 mb-3 block tracking-widest">${p.category}</span>
                            <h2 class="text-xl font-black leading-tight mb-4 group-hover:text-blue-400 transition">${p.title}</h2>
                            <div class="mt-auto pt-6 flex justify-between opacity-30 text-[9px] font-black uppercase tracking-tighter border-t border-white/5">
                                <span><i class="fa-solid fa-pen-nib mr-1 text-blue-500"></i> ${p.author}</span>
                                <span>${p.date.split(',')[0]}</span>
                            </div>
                        </div>`;
                    card.onclick = () => core.showFull(p);
                    container.appendChild(card);
                });
            },

            showFull: (p) => {
                currentPostId = p.id;
                document.title = p.title + " | Ełk Info";
                document.getElementById('view-home').classList.add('hidden');
                document.getElementById('search-area').classList.add('hidden');
                document.getElementById('view-article').classList.remove('hidden');
                document.getElementById('article-content').innerHTML = `
                    <div class="flex items-center gap-3 mb-4">
                        <span class="bg-blue-600 text-[10px] font-black px-3 py-1 rounded-full uppercase">${p.category}</span>
                        <span class="text-xs opacity-40 font-bold">${p.date}</span>
                    </div>
                    <h1 class="text-4xl md:text-5xl font-black mb-8 italic leading-none tracking-tighter">${p.title}</h1>
                    <div class="text-slate-200 text-xl leading-relaxed mb-12 font-medium">${core.parseMd(p.content)}</div>
                    <div class="grid gap-6">${(p.images || []).map(img => `<img src="${img}" class="w-full rounded-[32px] shadow-2xl border border-white/5">`).join('')}</div>
                `;
                document.getElementById('like-count').innerText = p.likes || 0;
                core.loadComments(p.id);
                window.scrollTo(0,0);
            },

            loadComments: (pid) => {
                db.ref(`elk/comments/${pid}`).on('value', snap => {
                    const list = document.getElementById('comments-list');
                    list.innerHTML = `<h3 class="font-black uppercase text-xs opacity-40 mb-6 tracking-widest flex items-center gap-2"><i class="fa-solid fa-comments text-blue-500 text-lg"></i> Głosy Czytelników</h3>`;
                    if(!snap.val()) return;
                    Object.values(snap.val()).reverse().forEach(c => {
                        list.innerHTML += `<div class="bg-white/5 p-6 rounded-3xl border border-white/5">
                            <div class="flex items-center justify-between mb-2">
                                <span class="font-black text-blue-400 text-xs uppercase">${c.nick}</span>
                                <span class="text-[8px] opacity-20 uppercase font-bold">${c.date || ''}</span>
                            </div>
                            <p class="text-slate-300 leading-relaxed">${c.text}</p>
                        </div>`;
                    });
                });
            },

            addComment: () => {
                const n = document.getElementById('comm-nick').value, t = document.getElementById('comm-text').value;
                if(!n || !t) return alert("Błąd: Nick i treść komentarza są wymagane!");
                db.ref(`elk/comments/${currentPostId}`).push({ nick: n, text: t, date: new Date().toLocaleString('pl-PL'), ts: Date.now() });
                document.getElementById('comm-text').value = "";
            },

            likePost: () => {
                db.ref(`elk/posts/${currentPostId}/likes`).transaction(l => (l || 0) + 1);
            },

            filterPosts: () => {
                const q = document.getElementById('search-input').value.toLowerCase();
                const filtered = allPosts.filter(p => (currentTab === 'all' || p.category === currentTab) && (p.title.toLowerCase().includes(q) || p.content.toLowerCase().includes(q)));
                core.render(filtered);
            },

            loadAll: () => {
                db.ref('elk/posts').off();
                db.ref('elk/posts').on('value', snap => { processPosts(snap); document.getElementById('load-more').style.display='none'; });
            }
        };

        const processPosts = (snap) => {
            allPosts = [];
            const admList = document.getElementById('admin-posts-list'); if(admList) admList.innerHTML = "";
            if(snap.val()) {
                Object.entries(snap.val()).reverse().forEach(([id, v]) => {
                    allPosts.push({id, ...v});
                    if(admList) {
                        admList.innerHTML += `<div class="flex justify-between items-center bg-black/20 p-4 rounded-2xl border border-white/5">
                            <div class="flex flex-col truncate mr-4">
                                <span class="text-[10px] font-black text-blue-500 uppercase">${v.category}</span>
                                <span class="text-xs font-bold truncate">${v.title}</span>
                            </div>
                            <div class="flex gap-4 shrink-0">
                                <button onclick="core.editPost('${id}')" class="text-blue-500 hover:text-blue-400 font-black text-[10px] uppercase">Edytuj</button>
                                <button onclick="confirm('Czy na pewno chcesz usunąć ten artykuł?') && db.ref('elk/posts/${id}').remove()" class="text-red-500 hover:text-red-400 font-black text-[10px] uppercase">Usuń</button>
                            </div>
                        </div>`;
                    }
                });
            }
            core.render(allPosts);
            core.updateMarquee();
        };

        // Auth Logic
        if(localStorage.getItem('is_editor') === 'true') {
            document.getElementById('btn-logout').classList.remove('hidden');
            document.getElementById('btn-admin-panel').classList.add('hidden');
            document.getElementById('view-admin').classList.remove('hidden');
            document.getElementById('view-home').classList.add('hidden');
        }

        // Init
        db.ref('elk/posts').limitToLast(12).on('value', processPosts);
        core.getWeather();
    </script>
</body>
</html>

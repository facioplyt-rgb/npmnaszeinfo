<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RADAR SYSTEM V39 | CLOUD FIX</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root { --main: #f59e0b; --dark: #0f172a; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--dark); margin: 0; overflow: hidden; height: 100vh; width: 100vw; }
        #map { height: 100vh; width: 100%; z-index: 1; filter: contrast(1.1); }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px); border: 1px solid rgba(0,0,0,0.05); }
        .sheet { position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000; transform: translateY(110%); transition: transform 0.4s cubic-bezier(0.3, 1, 0.3, 1); max-width: 550px; margin: 0 auto; }
        .sheet.open { transform: translateY(0); }
        #radar-toast { position: fixed; top: 120px; left: 20px; right: 20px; z-index: 2000; transform: translateX(-150%); transition: all 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55); max-width: 450px; margin: 0 auto; }
        #radar-toast.active { transform: translateX(0); }
        .custom-marker { width: 54px; height: 54px; border-radius: 15px; border: 3px solid #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; box-shadow: 0 12px 24px rgba(0,0,0,0.3); }
        .pulse-red { animation: pulse 1.2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .line-badge { background: rgba(0,0,0,0.4); padding: 2px 6px; border-radius: 6px; font-size: 10px; font-weight: 900; margin-top: 2px; }
        .btn-press { transition: all 0.2s; cursor: pointer; -webkit-tap-highlight-color: transparent; border: none; outline: none; }
        .btn-press:active { transform: scale(0.92); }
    </style>
</head>
<body>

    <audio id="alert-sound" src="https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3" preload="auto"></audio>

    <div id="city-selector">
        <div class="fixed inset-0 z-[9999] bg-[#f8fafc] flex flex-col items-center justify-center p-6">
            <i class="fa-solid fa-tower-broadcast text-6xl text-amber-500 mb-6"></i>
            <h1 class="text-4xl font-black text-slate-900 mb-10 italic">SYSTEM RADAR</h1>
            <button onclick="startApp('gorzow', [52.732, 15.237])" class="w-full max-w-xs p-7 bg-white border-2 border-slate-100 rounded-[35px] flex items-center gap-5 btn-press shadow-2xl">
                <div class="w-14 h-14 bg-amber-500 text-white rounded-2xl flex items-center justify-center text-2xl shadow-lg"><i class="fa-solid fa-map-location-dot"></i></div>
                <div class="text-left"><span class="block font-black text-slate-800 text-xl">Gorzów Wlkp.</span><span class="text-[9px] font-black text-green-500 uppercase">Baza: RTDB v38</span></div>
            </button>
        </div>
    </div>

    <div id="radar-toast" class="glass rounded-3xl p-6 flex items-center gap-5 border-l-[10px] border-amber-500 shadow-2xl">
        <div id="toast-icon" class="w-16 h-16 rounded-2xl flex items-center justify-center text-3xl bg-amber-50 text-amber-600 shadow-inner"></div>
        <div class="flex-1">
            <h4 class="text-[10px] font-black text-amber-500 uppercase tracking-widest mb-1">Blisko Ciebie</h4>
            <p id="toast-street" class="text-base font-black text-slate-900 leading-tight"></p>
            <p id="toast-dir" class="text-[11px] font-bold text-slate-400 uppercase italic mt-1"></p>
        </div>
        <button onclick="hideToast()" class="text-slate-300 p-2 text-2xl">✕</button>
    </div>

    <div class="fixed top-6 left-4 right-4 z-[500] flex justify-center pointer-events-none">
        <div class="w-full max-w-xl glass rounded-[30px] p-3.5 flex justify-between items-center pointer-events-auto shadow-2xl">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-slate-900 rounded-2xl flex items-center justify-center text-amber-400 text-xl"><i class="fa-solid fa-rss animate-pulse"></i></div>
                <div><h2 id="city-title" class="text-sm font-black uppercase text-slate-900">RADAR</h2><p id="gps-info" class="text-[9px] text-slate-400 font-bold uppercase italic">GPS: WAITING</p></div>
            </div>
            <button onclick="adminLogin()" class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-300 btn-press"><i class="fa-solid fa-shield-halved"></i></button>
        </div>
    </div>

    <div id="map"></div>

    <div id="fab-container" class="fixed bottom-10 inset-x-0 z-[500] flex justify-center px-8 opacity-0 pointer-events-none transition-all duration-700">
        <button onclick="triggerReport()" class="w-full max-w-sm bg-slate-900 text-white p-7 rounded-[35px] font-black text-sm tracking-widest shadow-2xl flex items-center justify-center gap-4 btn-press border-b-8 border-amber-500 uppercase">
            <i class="fa-solid fa-plus-circle text-xl text-amber-500"></i> DODAJ ZGŁOSZENIE
        </button>
    </div>

    <div id="modal-type" class="sheet glass rounded-t-[50px] p-10 pb-12 shadow-2xl">
        <div class="w-16 h-1.5 bg-slate-200 rounded-full mx-auto mb-8"></div>
        <div class="grid grid-cols-3 gap-4">
            <button onclick="selectType('KONTROLA', '<i class=\'fa-solid fa-user-secret\'></i>')" class="flex flex-col items-center gap-4 p-6 bg-red-50 rounded-[35px] text-red-600 btn-press border border-red-100"><i class="fa-solid fa-user-secret text-4xl"></i><span class="text-[9px] font-black uppercase">Kontrola</span></button>
            <button onclick="selectType('AWARIA', '<i class=\'fa-solid fa-car-burst\'></i>')" class="flex flex-col items-center gap-4 p-6 bg-orange-50 rounded-[35px] text-orange-600 btn-press border border-orange-100"><i class="fa-solid fa-triangle-exclamation text-4xl"></i><span class="text-[9px] font-black uppercase">Awaria</span></button>
            <button onclick="selectType('KOREK', '<i class=\'fa-solid fa-traffic-light\'></i>')" class="flex flex-col items-center gap-4 p-6 bg-blue-50 rounded-[35px] text-blue-600 btn-press border border-blue-100"><i class="fa-solid fa-clock text-4xl"></i><span class="text-[9px] font-black uppercase">Korek</span></button>
        </div>
    </div>

    <div id="modal-dirs" class="sheet glass rounded-t-[50px] p-10 pb-8 shadow-2xl">
        <h2 class="text-3xl font-black mb-6 italic text-slate-900">SZCZEGÓŁY</h2>
        <div class="flex gap-3 mb-4">
            <input type="text" id="input-line" placeholder="NR LINII" class="w-1/3 bg-slate-100 p-6 rounded-[25px] font-black text-center outline-none border-2 border-transparent focus:border-amber-500">
            <input type="text" id="search-dir" placeholder="KIERUNEK / PRZYSTANEK" class="w-2/3 bg-slate-100 p-6 rounded-[25px] font-bold outline-none border-2 border-transparent focus:border-amber-500" oninput="runSearch()">
        </div>
        <div id="list-dirs" class="grid gap-2 max-h-[25vh] overflow-y-auto mb-6"></div>
        <button onclick="submitFormManual()" class="w-full bg-amber-500 text-white p-6 rounded-[25px] font-black text-sm uppercase btn-press shadow-xl mb-4">Wyślij do chmury <i class="fa-solid fa-cloud-arrow-up ml-2"></i></button>
        <button onclick="closeModals()" class="w-full text-[10px] font-black text-slate-400 uppercase tracking-widest p-2">Anuluj</button>
    </div>

    <div id="modal-vote" class="sheet glass rounded-t-[50px] p-10 pb-12 text-center shadow-2xl">
        <div id="v-icon" class="text-7xl mb-6"></div>
        <h3 id="v-title" class="text-4xl font-black italic text-slate-900 mb-2"></h3>
        <p id="v-line" class="text-amber-500 font-black text-2xl mb-6"></p>
        <div class="bg-slate-50 rounded-[30px] p-6 mb-8 grid grid-cols-2 gap-4 border border-slate-200 shadow-inner text-xs font-black uppercase text-slate-400">
            <div>Dodano: <br><span id="v-created" class="text-slate-800"></span></div>
            <div>Status: <br><span id="v-last" class="text-slate-800">Aktywne</span></div>
        </div>
        <p id="v-dir" class="text-slate-500 font-bold text-[11px] uppercase mb-10 italic"></p>
        <div class="grid grid-cols-2 gap-5 mb-4">
            <button id="v-ok" class="bg-slate-900 text-white p-7 rounded-[30px] font-black text-xs uppercase btn-press border-b-4 border-slate-700">POTWIERDZAM</button>
            <button onclick="closeModals()" class="bg-slate-100 text-slate-600 p-7 rounded-[30px] font-black text-xs uppercase btn-press border border-slate-200">NIEAKTUALNE</button>
        </div>
        <button id="v-del" class="hidden w-full p-4 text-red-500 font-black text-[10px] uppercase">Usuń moje zgłoszenie</button>
    </div>

    <div id="admin-view" class="hidden fixed inset-0 z-[10000] bg-white p-10 overflow-y-auto">
        <h2 class="text-4xl font-black mb-10 italic uppercase">Edytor Kierunków</h2>
        <textarea id="admin-input" rows="15" class="w-full bg-slate-50 border-4 border-slate-100 rounded-[35px] p-8 font-bold text-slate-700 mb-8 outline-none focus:border-amber-500 shadow-inner"></textarea>
        <button onclick="pushConfig()" class="w-full bg-slate-900 text-white p-8 rounded-[35px] font-black btn-press shadow-2xl mb-4">ZAPISZ BAZĘ</button>
        <button onclick="toggleAdminView(false)" class="w-full p-6 text-slate-400 font-black text-xs uppercase">Zamknij</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCb5QmZdwWwa9LafqqGZvGW-6vblkab32M",
            authDomain: "mzk-by-facio.firebaseapp.com",
            databaseURL: "https://mzk-by-facio-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mzk-by-facio",
            storageBucket: "mzk-by-facio.appspot.com",
            messagingSenderId: "676970411647",
            appId: "1:676970411647:web:5703d5fb5fb499ff83714a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const map = L.map('map', { zoomControl: false, attributionControl: false, tap: false });
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

        let cityKey = '';
        let uPos = null;
        let sType = '';
        let sIcon = '';
        let tMarker = null;
        let tCoords = null;
        let masterDirs = [];
        const mCache = {};
        const uid = localStorage.getItem('mzk_uid_v38') || Math.random().toString(36).substr(2, 9);
        localStorage.setItem('mzk_uid_v38', uid);

        function timeAgo(ts) {
            if(!ts) return "-";
            const diff = Math.floor((Date.now() - ts) / 60000);
            return diff < 1 ? "Przed chwilą" : (diff < 60 ? `${diff}m temu` : `${Math.floor(diff/60)}h temu`);
        }

        async function getRoadName(la, ln) {
            try {
                const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${la}&lon=${ln}&zoom=18`);
                const d = await r.json();
                return d.address.road || d.address.pedestrian || "Punkt trasy";
            } catch { return "Lokalizacja"; }
        }

        window.startApp = (key, coords) => {
            cityKey = key;
            document.getElementById('city-selector').style.display = 'none';
            document.getElementById('fab-container').style.opacity = '1';
            document.getElementById('fab-container').style.pointerEvents = 'auto';
            document.getElementById('city-title').innerText = key.toUpperCase();
            map.setView(coords, 14);
            map.locate({ setView: true, maxZoom: 16, watch: true });

            // SŁUCHANIE ALERTÓW (RTDB)
            onValue(ref(db, `v38/${cityKey}/alerts`), (snap) => {
                const data = snap.val();
                const ids = data ? Object.keys(data) : [];
                Object.keys(mCache).forEach(id => { if(!ids.includes(id)) { map.removeLayer(mCache[id]); delete mCache[id]; }});
                if (data) {
                    Object.entries(data).forEach(([id, val]) => {
                        if (!mCache[id]) {
                            const color = val.type === 'KONTROLA' ? '#ef4444' : (val.type === 'AWARIA' ? '#f97316' : '#2563eb');
                            const html = `<div class="custom-marker ${val.type === 'KONTROLA' ? 'pulse-red' : ''}" style="background:${color}">
                                <div class="text-2xl">${val.icon}</div>
                                <div class="line-badge">${val.line || '??'}</div>
                            </div>`;
                            mCache[id] = L.marker([val.lat, val.lng], { icon: L.divIcon({ className: '', html: html, iconAnchor: [27, 27] }) }).addTo(map).on('click', () => openVote(id, val));
                        }
                    });
                    checkProximity(data);
                }
            });

            onValue(ref(db, `v38/${cityKey}/config`), (snap) => {
                masterDirs = snap.val() || [];
                refreshList(masterDirs);
            });
        };

        map.on('locationfound', (e) => {
            uPos = e.latlng;
            document.getElementById('gps-info').innerText = "GPS LIVE";
            document.getElementById('gps-info').style.color = "#10b981";
            if(!window.dot) window.dot = L.circleMarker(e.latlng, { radius: 10, color: '#fff', weight: 4, fillColor: '#3b82f6', fillOpacity: 1 }).addTo(map);
            else window.dot.setLatLng(e.latlng);
        });

        function checkProximity(alerts) {
            if(!uPos || !alerts) return;
            Object.values(alerts).forEach(r => {
                if(uPos.distanceTo(L.latLng(r.lat, r.lng)) < 400) {
                    document.getElementById('toast-icon').innerHTML = r.icon;
                    document.getElementById('toast-street').innerText = r.street || "Pobliże";
                    document.getElementById('toast-dir').innerText = "KIERUNEK: " + r.dir;
                    document.getElementById('radar-toast').classList.add('active');
                    document.getElementById('alert-sound').play().catch(()=>{});
                }
            });
        }
        window.hideToast = () => document.getElementById('radar-toast').classList.remove('active');

        window.triggerReport = () => {
            const hint = document.createElement('div');
            hint.className = "fixed top-1/3 inset-x-10 z-[2000] text-center pointer-events-none animate-bounce";
            hint.id = "hint-el";
            hint.innerHTML = `<span class="glass px-8 py-5 rounded-[30px] font-black text-xs border-2 border-amber-500 shadow-2xl">Kliknij miejsce na mapie</span>`;
            document.body.appendChild(hint);
            map.once('click', (e) => {
                tCoords = e.latlng;
                document.getElementById('hint-el').remove();
                if(tMarker) map.removeLayer(tMarker);
                tMarker = L.circle(e.latlng, { radius: 35, color: '#f59e0b', fillOpacity: 0.5 }).addTo(map);
                openSheet('modal-type');
            });
        };

        window.selectType = (t, i) => { sType = t; sIcon = i; openSheet('modal-dirs'); };
        window.fillDirection = (dir) => { document.getElementById('search-dir').value = dir; };

        window.submitFormManual = async () => {
            const line = document.getElementById('input-line').value.trim() || "??";
            const dir = document.getElementById('search-dir').value.trim() || "Nieokreślony";
            closeModals();
            const street = await getRoadName(tCoords.lat, tCoords.lng);
            
            // ZAPIS RTDB (GWARANTOWANY FIX)
            const refPush = push(ref(db, `v38/${cityKey}/alerts`));
            set(refPush, {
                type: sType, icon: sIcon, dir: dir, line: line, street: street,
                lat: tCoords.lat, lng: tCoords.lng,
                author: uid, createdAt: Date.now(), lastVote: Date.now()
            }).then(() => console.log("Zapisano!")).catch(e => alert("Błąd zapisu RTDB: " + e.message));
        };

        window.openVote = (id, data) => {
            openSheet('modal-vote');
            document.getElementById('v-icon').innerHTML = data.icon;
            document.getElementById('v-title').innerText = data.type;
            document.getElementById('v-line').innerText = "LINIA: " + data.line;
            document.getElementById('v-dir').innerText = data.dir;
            document.getElementById('v-created').innerText = timeAgo(data.createdAt);
            const delBtn = document.getElementById('v-del');
            delBtn.classList.toggle('hidden', data.author !== uid);
            delBtn.onclick = () => { closeModals(); remove(ref(db, `v38/${cityKey}/alerts/${id}`)); };
            document.getElementById('v-ok').onclick = () => { closeModals(); update(ref(db, `v38/${cityKey}/alerts/${id}`), { lastVote: Date.now() }); };
        };

        window.adminLogin = () => { if(prompt("Hasło:") === "mzk2026") toggleAdminView(true); };
        window.toggleAdminView = (s) => {
            document.getElementById('admin-view').classList.toggle('hidden', !s);
            if(s) document.getElementById('admin-input').value = masterDirs.join('\n');
        };
        window.pushConfig = () => {
            const d = document.getElementById('admin-input').value.split('\n').filter(x => x.trim() !== "");
            set(ref(db, `v38/${cityKey}/config`), d).then(() => { alert("Zapisano!"); toggleAdminView(false); });
        };
        window.openSheet = (id) => { document.querySelectorAll('.sheet').forEach(s => s.classList.remove('open')); document.getElementById(id).classList.add('open'); document.getElementById('fab-container').style.opacity = '0'; };
        window.closeModals = () => { document.querySelectorAll('.sheet').forEach(s => s.classList.remove('open')); document.getElementById('fab-container').style.opacity = '1'; if(tMarker) map.removeLayer(tMarker); };
        function refreshList(l) { document.getElementById('list-dirs').innerHTML = l.map(d => `<button onclick="fillDirection('${d}')" class="w-full bg-slate-50 border border-slate-100 p-4 rounded-[20px] text-left font-black text-xs text-slate-600 btn-press mb-1 flex justify-between"><span>${d}</span><i class="fa-solid fa-plus text-amber-500"></i></button>`).join(''); }
        window.runSearch = () => { const q = document.getElementById('search-dir').value.toLowerCase(); refreshList(masterDirs.filter(d => d.toLowerCase().includes(q))); };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ełk Nasze Informacje | Wszystko o gminie Ełk</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>

    <style>
        :root { --main: #0062ff; }
        body { background: #0b0f1a; color: white; font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .glass { background: rgba(22, 28, 45, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .card { transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.05); background: #161c2d; }
        .card:hover { transform: translateY(-5px); border-color: var(--main); }
        .input-dark { background: #0b0f1a; border: 2px solid #2d3748; border-radius: 12px; padding: 12px; width: 100%; color: white; outline: none; transition: 0.3s; }
        .input-dark:focus { border-color: var(--main); }
        
        #login-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .login-box { width: 90%; max-width: 400px; padding: 2.5rem; border-radius: 30px; background: #161c2d; border: 1px solid rgba(255,255,255,0.1); }
        
        .white-pre { white-space: pre-wrap; word-wrap: break-word; }
        .md-h1 { font-size: 2.25rem; font-weight: 900; display: block; margin: 1rem 0; color: white; border-bottom: 2px solid var(--main); padding-bottom: 5px; }
        .md-h3 { font-size: 1.5rem; font-weight: 700; display: block; margin: 0.75rem 0; color: #cbd5e1; }
        .md-small { font-size: 0.85rem; opacity: 0.7; display: block; color: #94a3b8; }

        .tab-btn { padding: 10px 20px; font-size: 11px; font-weight: 800; text-transform: uppercase; border-radius: 12px; cursor: pointer; transition: 0.3s; border: 1px solid rgba(255,255,255,0.05); color: #64748b; }
        .tab-btn.active { background: var(--main); color: white; border-color: var(--main); }

        .category-tag { font-size: 9px; font-weight: 900; text-transform: uppercase; padding: 3px 8px; border-radius: 4px; background: var(--main); color: white; }
        .author-badge { font-weight: 900; color: #3b82f6; padding: 0.25rem 0.75rem; background: rgba(59, 130, 246, 0.1); border-radius: 9999px; font-size: 10px; }
        
        .comment-item { border-left: 3px solid var(--main); background: rgba(255,255,255,0.03); padding: 15px; border-radius: 0 15px 15px 0; margin-bottom: 12px; }
        #loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="loader"><div class="animate-spin text-4xl text-blue-500"><i class="fa-solid fa-circle-notch"></i></div></div>

    <div id="login-modal">
        <div class="login-box shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black italic uppercase">Panel Redakcji</h2>
                <button onclick="core.closeLogin()" class="text-slate-500 hover:text-white"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="space-y-4">
                <input type="email" id="login-email" placeholder="E-mail" class="input-dark">
                <input type="password" id="login-pass" placeholder="Hasło" class="input-dark">
                <button onclick="core.loginEmail()" class="w-full bg-blue-600 p-4 rounded-xl font-bold uppercase">Zaloguj</button>
                <button onclick="core.loginGoogle()" class="w-full bg-white text-black p-4 rounded-xl font-bold uppercase flex items-center justify-center gap-3">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20"> Google
                </button>
            </div>
        </div>
    </div>

    <header class="sticky top-0 z-50 glass border-b border-white/5 mb-8">
        <div class="max-w-6xl mx-auto px-4 h-16 flex justify-between items-center">
            <h1 onclick="core.goHome()" class="text-xl font-black italic cursor-pointer uppercase italic">EŁK <span class="text-blue-500">NASZE</span> INFORMACJE</h1>
            <div class="flex items-center gap-4">
                <span id="admin-indicator" class="hidden text-[9px] bg-green-500/20 text-green-500 px-2 py-1 rounded-md font-black uppercase">Redaktor</span>
                <button id="btn-login-trigger" onclick="core.showLogin()" class="text-[10px] font-bold uppercase opacity-60">Panel</button>
                <button id="btn-logout" onclick="auth.signOut()" class="hidden text-[10px] font-bold uppercase text-red-500">Wyloguj</button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4">
        <div id="search-area" class="mb-8 space-y-6">
            <input type="text" id="search-input" oninput="core.filterPosts()" placeholder="Szukaj newsa..." class="input-dark">
            <div class="flex flex-wrap gap-2">
                <button onclick="core.switchTab('all', this)" class="tab-btn active">Wszystkie</button>
                <button onclick="core.switchTab('Wydarzenia', this)" class="tab-btn">Wydarzenia</button>
                <button onclick="core.switchTab('Informacje', this)" class="tab-btn">Informacje</button>
                <button onclick="core.switchTab('Aktualizacje', this)" class="tab-btn">Aktualizacje</button>
            </div>
        </div>

        <div id="view-home" class="pb-20">
            <div id="news-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <div id="view-article" class="hidden pb-20 max-w-4xl mx-auto">
            <button onclick="core.goHome()" class="mb-8 text-slate-400 font-bold uppercase text-xs flex items-center gap-2"><i class="fa-solid fa-arrow-left"></i> Wróć</button>
            <div id="article-content"></div>
            <div class="mt-12 pt-12 border-t border-white/10">
                <div onclick="core.likePost()" class="inline-flex items-center gap-3 bg-white/5 px-8 py-3 rounded-full cursor-pointer border border-white/10 hover:bg-white/10 transition">
                    <i class="fa-solid fa-heart text-red-500"></i> <span id="like-count" class="font-black">0</span>
                </div>
                <div id="comments-list" class="mt-12 space-y-6"></div>
                <div class="mt-10 glass p-8 rounded-3xl space-y-4 border border-blue-500/20">
                    <input type="text" id="comm-nick" placeholder="Twój Nick" class="input-dark">
                    <textarea id="comm-text" rows="3" placeholder="Dodaj komentarz..." class="input-dark"></textarea>
                    <button onclick="core.addComment()" class="w-full bg-blue-600 p-4 rounded-xl font-black uppercase">Wyślij</button>
                </div>
            </div>
        </div>

        <div id="view-admin" class="hidden pb-20">
            <div class="max-w-2xl mx-auto glass p-8 rounded-3xl border border-white/10">
                <h2 class="text-2xl font-black mb-6 uppercase italic text-blue-500">Zarządzanie Treścią</h2>
                <div class="space-y-4">
                    <input type="text" id="in-title" placeholder="Tytuł" class="input-dark">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="in-author" placeholder="Autor" class="input-dark">
                        <select id="in-category" class="input-dark">
                            <option value="Wydarzenia">Wydarzenia</option>
                            <option value="Informacje">Informacje</option>
                            <option value="Aktualizacje">Aktualizacje</option>
                        </select>
                    </div>
                    <textarea id="in-content" rows="10" placeholder="Treść (H1: #, H3: ###, Mały: -#)" class="input-dark"></textarea>
                    <input type="file" id="in-files" multiple class="text-xs">
                    <button onclick="core.publish()" class="w-full bg-blue-600 p-5 rounded-2xl font-black uppercase">Opublikuj Post</button>
                    <div id="admin-posts-list" class="mt-10 space-y-2"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSy...", 
            authDomain: "mzk-by-facio.firebaseapp.com",
            databaseURL: "https://mzk-by-facio-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mzk-by-facio",
            appId: "1:676970411647:web:5703d5fb5fb499ff83714a"
        };
        const IMGBB_API_KEY = "19570ba1fa4dc27bd0ba974b4eb2e253";

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let allPosts = [];
        let currentPostId = null;
        let currentTab = 'all';

        window.core = {
            parseMd: (t) => {
                if(!t) return "";
                return t.replace(/^# (.*$)/gm, '<span class="md-h1">$1</span>')
                        .replace(/^### (.*$)/gm, '<span class="md-h3">$1</span>')
                        .replace(/^-# (.*$)/gm, '<span class="md-small">$1</span>')
                        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                        .replace(/\n/g, '<br>');
            },

            goHome: () => {
                document.getElementById('view-home').classList.remove('hidden');
                document.getElementById('search-area').classList.remove('hidden');
                document.getElementById('view-article').classList.add('hidden');
                document.getElementById('view-admin').classList.add('hidden');
                window.scrollTo(0,0);
            },

            showLogin: () => document.getElementById('login-modal').style.display = 'flex',
            closeLogin: () => document.getElementById('login-modal').style.display = 'none',

            loginEmail: async () => {
                const e = document.getElementById('login-email').value;
                const p = document.getElementById('login-pass').value;
                try { await auth.signInWithEmailAndPassword(e, p); core.closeLogin(); } catch(err) { alert(err.message); }
            },

            loginGoogle: async () => {
                try { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); core.closeLogin(); } catch(err) { alert(err.message); }
            },

            switchTab: (tab, btn) => {
                currentTab = tab;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                core.filterPosts();
            },

            filterPosts: () => {
                const query = document.getElementById('search-input').value.toLowerCase();
                let filtered = allPosts.filter(p => {
                    const matchSearch = p.title.toLowerCase().includes(query) || p.content.toLowerCase().includes(query);
                    const matchTab = currentTab === 'all' || p.category === currentTab;
                    return matchSearch && matchTab;
                });
                core.render(filtered);
            },

            publish: async () => {
                const t = document.getElementById('in-title').value;
                const c = document.getElementById('in-content').value;
                const a = document.getElementById('in-author').value || "Redakcja";
                const cat = document.getElementById('in-category').value;
                const files = document.getElementById('in-files').files;
                if(!t || !c) return alert("Pola!");

                document.getElementById('loader').style.display = 'flex';
                let urls = [];
                for(let f of files) {
                    const fd = new FormData(); fd.append("image", f);
                    const r = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: fd });
                    const d = await r.json();
                    if(d.success) urls.push(d.data.url);
                }

                db.ref('elk/posts').push({
                    title: t, content: c, author: a, category: cat, images: urls,
                    date: new Date().toLocaleString('pl-PL'), ts: Date.now(), likes: 0
                }).then(() => location.reload());
            },

            render: (items) => {
                const container = document.getElementById('news-container');
                container.innerHTML = "";
                items.forEach(p => {
                    const card = document.createElement('div');
                    card.className = "card rounded-3xl overflow-hidden cursor-pointer";
                    card.innerHTML = `
                        ${p.images?.[0] ? `<img src="${p.images[0]}" class="w-full h-48 object-cover">` : ''}
                        <div class="p-5">
                            <span class="category-tag">${p.category}</span>
                            <h2 class="text-xl font-bold mt-2 leading-tight">${p.title}</h2>
                            <div class="flex justify-between items-center mt-4 opacity-40 text-[10px] font-black uppercase">
                                <span><i class="fa-solid fa-user text-blue-500"></i> ${p.author}</span>
                                <span>${p.date.split(',')[0]}</span>
                            </div>
                        </div>`;
                    card.onclick = () => core.showFull(p);
                    container.appendChild(card);
                });
            },

            showFull: (p) => {
                currentPostId = p.id;
                document.getElementById('view-home').classList.add('hidden');
                document.getElementById('search-area').classList.add('hidden');
                document.getElementById('view-article').classList.remove('hidden');
                document.getElementById('article-content').innerHTML = `
                    <h1 class="text-4xl font-black mb-4 italic">${p.title}</h1>
                    <div class="flex gap-4 mb-8 text-[10px] font-bold uppercase opacity-50">
                        <span class="author-badge">${p.author}</span> <span>${p.date}</span>
                    </div>
                    <div class="text-slate-200 text-lg leading-relaxed mb-10">${core.parseMd(p.content)}</div>
                    <div class="space-y-4">${(p.images || []).map(img => `<img src="${img}" class="w-full rounded-2xl shadow-xl">`).join('')}</div>
                `;
                document.getElementById('like-count').innerText = p.likes || 0;
                core.loadComments(p.id);
                window.scrollTo(0,0);
            },

            addComment: () => {
                const n = document.getElementById('comm-nick').value;
                const t = document.getElementById('comm-text').value;
                if(!n || !t) return alert("Uzupełnij nick i treść!");
                db.ref(`elk/comments/${currentPostId}`).push({ nick: n, text: t, date: new Date().toLocaleString('pl-PL') }).then(() => {
                    document.getElementById('comm-text').value = "";
                });
            },

            loadComments: (pid) => {
                db.ref(`elk/comments/${pid}`).on('value', snap => {
                    const list = document.getElementById('comments-list');
                    list.innerHTML = `<h3 class="font-black uppercase italic mb-6">Komentarze</h3>`;
                    if(!snap.val()) return;
                    Object.values(snap.val()).reverse().forEach(c => {
                        list.innerHTML += `<div class="comment-item"><span class="font-black text-blue-400 text-xs">${c.nick}</span><p class="text-sm mt-1">${c.text}</p><div class="text-[8px] opacity-20 mt-2">${c.date}</div></div>`;
                    });
                });
            },

            likePost: () => {
                db.ref(`elk/posts/${currentPostId}/likes`).transaction(l => (l || 0) + 1);
            }
        };

        auth.onAuthStateChanged(user => {
            const isAdm = !!user;
            document.getElementById('admin-indicator').classList.toggle('hidden', !isAdm);
            document.getElementById('btn-logout').classList.toggle('hidden', !isAdm);
            document.getElementById('btn-login-trigger').classList.toggle('hidden', isAdm);
            if(isAdm) {
                document.getElementById('view-admin').classList.remove('hidden');
                document.getElementById('view-home').classList.add('hidden');
                document.getElementById('search-area').classList.add('hidden');
            }
        });

        db.ref('elk/posts').on('value', snap => {
            allPosts = [];
            const admList = document.getElementById('admin-posts-list'); admList.innerHTML = "";
            if(snap.val()) {
                Object.entries(snap.val()).reverse().forEach(([id, v]) => {
                    allPosts.push({id, ...v});
                    admList.innerHTML += `<div class="flex justify-between bg-white/5 p-2 rounded text-[10px]"><span>${v.title}</span><button onclick="db.ref('elk/posts/${id}').remove()" class="text-red-500">USUŃ</button></div>`;
                });
            }
            core.render(allPosts);
        });
    </script>
</body>
</html>


<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ełk Nasze Eventy | Wszystko o eventach!</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --main: #0062ff; }
        body { background: #0b0f1a; color: white; font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .glass { background: rgba(22, 28, 45, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .card { transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.05); }
        .card:hover { transform: translateY(-5px); border-color: var(--main); }
        .input-dark { background: #161c2d; border: 2px solid #2d3748; border-radius: 12px; padding: 12px; width: 100%; color: white; outline: none; transition: 0.3s; }
        .input-dark:focus { border-color: var(--main); box-shadow: 0 0 15px rgba(0,98,255,0.2); }
        .white-pre { white-space: pre-wrap; word-wrap: break-word; }
        #loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; }
        
        /* Animacja wejścia postów */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .post-anim { animation: fadeInUp 0.4s ease forwards; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="animate-spin text-4xl text-blue-500"><i class="fa-solid fa-circle-notch"></i></div>
    </div>

    <header class="sticky top-0 z-50 glass border-b border-white/5 mb-8">
        <div class="max-w-6xl mx-auto px-4 h-16 flex justify-between items-center">
            <h1 onclick="core.goHome()" class="text-xl font-black italic cursor-pointer">
                EŁK <span class="text-blue-500">NASZE</span> EVENTY
            </h1>
            <div class="flex items-center gap-4">
                <button onclick="core.openAdmin()" class="text-[10px] font-bold uppercase tracking-widest opacity-40 hover:opacity-100 transition">Panel Redakcji</button>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4">
        
        <div id="search-area" class="mb-8">
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                <input type="text" id="search-input" oninput="core.filterPosts()" placeholder="Szukaj wydarzenia po tytule lub autorze..." class="input-dark pl-12">
            </div>
        </div>

        <div id="view-home" class="pb-20">
            <div id="news-container" class="space-y-4">
                <div class="text-center py-20 text-slate-600">Inicjalizacja danych...</div>
            </div>
            <div id="more-container" class="mt-8 hidden flex justify-center">
                <button onclick="core.showAllPosts()" class="px-8 py-3 bg-slate-800 hover:bg-slate-700 rounded-full font-bold text-sm transition border border-white/5">
                    Pokaż wszystkie pozostałe
                </button>
            </div>
        </div>

        <div id="view-article" class="hidden pb-20">
            <button onclick="core.goHome()" class="mb-8 text-slate-400 font-bold flex items-center gap-2 hover:text-white transition">
                <i class="fa-solid fa-arrow-left"></i> Wstecz
            </button>
            <div id="article-content"></div>
        </div>

        <div id="view-admin" class="hidden max-w-xl mx-auto glass p-8 rounded-[30px] mb-20">
            <div class="flex justify-between items-center mb-6">
                <h2 id="admin-mode-title" class="text-xl font-bold italic uppercase">Nowy Wpis</h2>
                <button onclick="core.cancelEdit()" id="cancel-edit-btn" class="hidden text-red-500 text-xs font-bold uppercase">Anuluj edycję</button>
            </div>
            <div class="space-y-4">
                <input type="text" id="in-title" placeholder="Tytuł wydarzenia" class="input-dark">
                <input type="text" id="in-author" placeholder="Autor / Redakcja" class="input-dark">
                <textarea id="in-content" rows="6" placeholder="Treść artykułu..." class="input-dark"></textarea>
                
                <div class="bg-white/5 p-4 rounded-xl border border-dashed border-white/10">
                    <p class="text-[10px] font-bold text-slate-500 mb-2 uppercase">Galeria zdjęć:</p>
                    <input type="file" id="in-files" multiple accept="image/*" class="text-xs text-slate-500">
                    <div id="edit-img-notice" class="hidden mt-2 text-[10px] text-amber-500 italic">Uwaga: Dodanie nowych zdjęć zastąpi stare.</div>
                </div>

                <button onclick="core.publish()" id="publish-btn" class="w-full bg-blue-600 p-4 rounded-xl font-bold uppercase transition active:scale-95 shadow-lg shadow-blue-500/20">
                    Opublikuj na stronie
                </button>
                
                <div id="admin-list" class="mt-10 pt-6 border-t border-white/5 space-y-2">
                    </div>
            </div>
        </div>
    </main>

    <script>
        // --- KONFIGURACJA ---
        const firebaseConfig = {
            apiKey: "TWOJE_API_KEY",
            authDomain: "mzk-by-facio.firebaseapp.com",
            databaseURL: "https://mzk-by-facio-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mzk-by-facio",
            appId: "APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const postsRef = db.ref('elk/posts');

        let allData = []; // Lokalna kopia danych do szukania i limitowania
        let showLimit = 3; 
        let editId = null; // Przechowuje ID edytowanego posta

        window.core = {
            goHome: () => {
                document.getElementById('view-home').classList.remove('hidden');
                document.getElementById('search-area').classList.remove('hidden');
                document.getElementById('view-article').classList.add('hidden');
                document.getElementById('view-admin').classList.add('hidden');
                core.cancelEdit();
                window.scrollTo(0,0);
            },

            openAdmin: () => {
                if(prompt("KOD REDAKCYJNY:") === "diax67") {
                    document.getElementById('view-home').classList.add('hidden');
                    document.getElementById('search-area').classList.add('hidden');
                    document.getElementById('view-admin').classList.remove('hidden');
                }
            },

            publish: async () => {
                const t = document.getElementById('in-title').value;
                const c = document.getElementById('in-content').value;
                const a = document.getElementById('in-author').value || "Redakcja";
                const files = document.getElementById('in-files').files;

                if(!t || !c) return alert("Tytuł i treść nie mogą być puste!");
                document.getElementById('loader').style.display = 'flex';

                let images = [];
                // Pobieranie zdjęć tylko jeśli wybrano nowe
                if(files.length > 0) {
                    for(let f of files) {
                        const b64 = await new Promise(res => {
                            const r = new FileReader();
                            r.readAsDataURL(f);
                            r.onload = () => res(r.result);
                        });
                        images.push(b64);
                    }
                }

                const postData = {
                    title: t, content: c, author: a,
                    ts: Date.now(), 
                    date: new Date().toLocaleString('pl-PL')
                };

                // Jeśli są zdjęcia, dodaj je. Jeśli edytujemy i nie dodaliśmy nowych, zachowujemy stare w bazie (zrobimy to inaczej dla prostoty)
                if(images.length > 0) postData.images = images;

                if(editId) {
                    // Tryb edycji
                    postsRef.child(editId).update(postData).then(() => {
                        alert("Wpis zaktualizowany!");
                        location.reload();
                    });
                } else {
                    // Tryb nowego posta
                    postsRef.push(postData).then(() => location.reload());
                }
            },

            editMode: (id) => {
                const post = allData.find(x => x.id === id);
                if(!post) return;

                editId = id;
                document.getElementById('admin-mode-title').innerText = "Edytujesz Wpis";
                document.getElementById('publish-btn').innerText = "Zaktualizuj Wpis";
                document.getElementById('publish-btn').classList.replace('bg-blue-600', 'bg-amber-600');
                document.getElementById('cancel-edit-btn').classList.remove('hidden');
                document.getElementById('edit-img-notice').classList.remove('hidden');

                document.getElementById('in-title').value = post.title;
                document.getElementById('in-author').value = post.author;
                document.getElementById('in-content').value = post.content;
                
                window.scrollTo(0,0);
            },

            cancelEdit: () => {
                editId = null;
                document.getElementById('admin-mode-title').innerText = "Nowy Wpis";
                document.getElementById('publish-btn').innerText = "Opublikuj na stronie";
                document.getElementById('publish-btn').classList.replace('bg-amber-600', 'bg-blue-600');
                document.getElementById('cancel-edit-btn').classList.add('hidden');
                document.getElementById('edit-img-notice').classList.add('hidden');
                
                document.getElementById('in-title').value = "";
                document.getElementById('in-author').value = "";
                document.getElementById('in-content').value = "";
                document.getElementById('in-files').value = "";
            },

            deletePost: (id) => confirm("Czy na pewno chcesz bezpowrotnie usunąć ten wpis?") && postsRef.child(id).remove(),

            showAllPosts: () => {
                showLimit = 999;
                core.renderPosts(allData);
                document.getElementById('more-container').classList.add('hidden');
            },

            filterPosts: () => {
                const term = document.getElementById('search-input').value.toLowerCase();
                const filtered = allData.filter(p => 
                    p.title.toLowerCase().includes(term) || 
                    p.author.toLowerCase().includes(term)
                );
                core.renderPosts(filtered, term !== ""); // Pokaż wszystko jeśli szukamy
            },

            renderPosts: (items, isSearching = false) => {
                const container = document.getElementById('news-container');
                container.innerHTML = "";

                // Limitowanie do 3 na starcie
                const toDisplay = isSearching ? items : items.slice(0, showLimit);

                if(toDisplay.length === 0) {
                    container.innerHTML = "<div class='text-center py-10 text-slate-500'>Nie znaleziono pasujących wydarzeń.</div>";
                    return;
                }

                toDisplay.forEach(v => {
                    const card = document.createElement('div');
                    card.className = "card glass p-6 rounded-2xl cursor-pointer mb-4 post-anim";
                    card.innerHTML = `
                        <div class="flex gap-5 flex-col md:flex-row">
                            ${v.images ? `<img src="${v.images[0]}" class="w-full md:w-32 h-32 object-cover rounded-xl shadow-lg">` : `<div class="w-32 h-32 bg-slate-800 rounded-xl flex items-center justify-center text-slate-600"><i class="fa-solid fa-image text-3xl"></i></div>`}
                            <div class="flex-1">
                                <div class="flex justify-between items-start">
                                    <h2 class="font-black text-xl text-white group-hover:text-blue-500">${v.title}</h2>
                                </div>
                                <p class="text-slate-400 text-sm line-clamp-2 mt-2 leading-relaxed">${v.content}</p>
                                <div class="flex items-center gap-3 mt-4">
                                    <span class="text-[10px] font-black text-blue-500 uppercase px-3 py-1 bg-blue-500/10 rounded-full">${v.author}</span>
                                    <span class="text-[10px] text-slate-500 font-bold">${v.date}</span>
                                </div>
                            </div>
                        </div>`;
                    card.onclick = () => core.showFull(v.id, v);
                    container.appendChild(card);
                });

                // Zarządzanie przyciskiem "Pokaż więcej"
                const moreBtn = document.getElementById('more-container');
                if(!isSearching && items.length > showLimit) {
                    moreBtn.classList.remove('hidden');
                } else {
                    moreBtn.classList.add('hidden');
                }
            },

            showFull: (id, data) => {
                document.getElementById('view-home').classList.add('hidden');
                document.getElementById('search-area').classList.add('hidden');
                document.getElementById('view-article').classList.remove('hidden');
                
                let imgs = (data.images || []).map(img => `<img src="${img}" class="w-full rounded-3xl mb-6 shadow-2xl ring-1 ring-white/10">`).join('');
                
                document.getElementById('article-content').innerHTML = `
                    <h1 class="text-4xl md:text-5xl font-black mb-4 tracking-tighter leading-tight">${data.title}</h1>
                    <div class="flex items-center gap-4 mb-8">
                        <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center font-bold text-white">${data.author.charAt(0)}</div>
                        <div>
                            <p class="text-sm font-bold uppercase text-blue-500">${data.author}</p>
                            <p class="text-xs text-slate-500 font-bold">${data.date}</p>
                        </div>
                    </div>
                    <div class="text-slate-300 text-lg md:text-xl leading-relaxed white-pre mb-10 border-l-4 border-blue-600 pl-6">${data.content}</div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">${imgs}</div>
                `;
                window.scrollTo(0,0);
            }
        };

        // GŁÓWNA SYNCHRONIZACJA
        postsRef.on('value', (snap) => {
            const admList = document.getElementById('admin-list');
            admList.innerHTML = "<h3 class='text-[10px] font-black text-slate-600 uppercase tracking-widest mb-4'>Szybka Edycja i Usuwanie</h3>";
            
            const data = snap.val();
            allData = [];

            if(data) {
                Object.entries(data).forEach(([id, v]) => {
                    allData.push({ id, ...v });
                });
                
                // Sortowanie od najnowszych
                allData.sort((a,b) => b.ts - a.ts);

                allData.forEach(v => {
                    admList.innerHTML += `
                        <div class="flex justify-between items-center bg-white/5 p-3 rounded-xl border border-white/5 hover:border-white/20 transition">
                            <span class="text-xs font-bold truncate max-w-[150px] opacity-70">${v.title}</span>
                            <div class="flex gap-2">
                                <button onclick="core.editMode('${v.id}')" class="text-amber-500 hover:bg-amber-500/10 px-3 py-1 rounded text-[10px] font-bold uppercase transition">Edytuj</button>
                                <button onclick="core.deletePost('${v.id}')" class="text-red-500 hover:bg-red-500/10 px-3 py-1 rounded text-[10px] font-bold uppercase transition">Usuń</button>
                            </div>
                        </div>`;
                });
            }

            core.renderPosts(allData);
        });
    </script>
</body>
</html>

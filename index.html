<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ełk Nasze Eventy | Portal Miasta</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --blue: #0056b3; --yellow: #ffcc00; --dark: #0a0a0a; --card: #161616; --text: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', 'Segoe UI', sans-serif; }
        body { background: var(--dark); color: var(--text); }

        header { background: #000; border-bottom: 3px solid var(--blue); padding: 15px 0; position: sticky; top: 0; z-index: 100; }
        .h-wrap { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .logo { font-size: 24px; font-weight: 900; cursor: pointer; text-transform: uppercase; color: #fff; text-decoration: none; }
        .logo span { color: var(--yellow); }
        
        .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 300px; gap: 30px; }

        /* GRID Z KAFELKAMI */
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .post-card { background: var(--card); border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.3s; border: 1px solid #222; }
        .post-card:hover { transform: translateY(-5px); border-color: var(--blue); }
        .post-thumb { width: 100%; height: 200px; object-fit: cover; background: #222; }
        .post-info { padding: 20px; }
        .post-info h2 { font-size: 18px; margin-bottom: 10px; }
        .post-info p { font-size: 14px; color: #aaa; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

        /* ARTYKUŁ */
        .full-post { grid-column: span 2; background: var(--card); padding: 40px; border-radius: 15px; }
        .full-content { font-size: 18px; line-height: 1.8; color: #ccc; margin: 25px 0; white-space: pre-wrap; }
        .gallery-grid { display: grid; gap: 20px; }
        .gallery-grid img { width: 100%; border-radius: 10px; border: 1px solid #333; }

        /* ADMIN */
        .admin-form { grid-column: span 2; background: var(--card); padding: 30px; border-radius: 12px; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; background: #222; border: 1px solid #333; color: #fff; border-radius: 6px; }
        .btn-main { background: var(--blue); color: #fff; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }

        .hidden { display: none !important; }
        #status-msg { position: fixed; bottom: 20px; right: 20px; padding: 15px; border-radius: 8px; z-index: 1000; display: none; background: var(--blue); }
    </style>
</head>
<body>

<div id="status-msg">Przetwarzanie danych...</div>

<header>
    <div class="h-wrap">
        <div class="logo" onclick="location.reload()">EŁK <span>Nasze Eventy</span></div>
        <button onclick="checkAdmin()" style="background:transparent; color:#fff; border:1px solid #444; padding:5px 10px; border-radius:4px; cursor:pointer">Redakcja</button>
    </div>
</header>

<div class="container">
    <div id="view-home" style="display:contents">
        <main class="news-grid" id="grid-content"></main>
        <aside>
            <h3 style="color:var(--yellow); margin-bottom:15px; border-bottom:1px solid #333">Ważne linki</h3>
            <div id="links-container"></div>
        </aside>
    </div>

    <div id="view-article" class="hidden" style="grid-column: span 2;">
        <button onclick="showView('home')" style="margin-bottom:20px; cursor:pointer">← Powrót</button>
        <div class="full-post" id="article-body"></div>
    </div>

    <div id="view-admin" class="hidden" style="grid-column: span 2;">
        <div class="admin-form">
            <h2>Dodaj wpis do węzła: EŁK</h2>
            <input type="text" id="in-title" placeholder="Tytuł wydarzenia">
            <input type="text" id="in-author" placeholder="Twoje imię">
            <textarea id="in-text" rows="8" placeholder="Treść artykułu..."></textarea>
            <label>Zdjęcia (automatyczna kompresja):</label>
            <input type="file" id="in-files" multiple accept="image/*">
            <button class="btn-main" onclick="publish()">OPUBLIKUJ</button>
            <div id="admin-list" style="margin-top:30px"></div>
        </div>
    </div>
</div>

<script>
    // --- KONFIGURACJA FIREBASE ---
    const firebaseConfig = {
        apiKey: "TWOJE_API_KEY",
        authDomain: "mzk-by-facio.firebaseapp.com",
        databaseURL: "https://mzk-by-facio-default-rtdb.europe-west1.firebaseio.com", // Twój serwer z obrazka
        projectId: "mzk-by-facio",
        appId: "APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const root = "elk"; // NOWY WĘZEŁ

    function showView(v) {
        document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden'));
        document.getElementById('view-'+v).classList.remove('hidden');
        window.scrollTo(0,0);
    }

    function checkAdmin() {
        const pass = prompt("Podaj hasło redaktora:");
        if(pass === "diax67") showView('admin');
    }

    // Kompresja zdjęć (żeby nie zapchać bazy i uniknąć błędów)
    async function compressImage(file) {
        return new Promise((res) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const maxW = 800;
                    const scale = maxW / img.width;
                    canvas.width = maxW;
                    canvas.height = img.height * scale;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    res(canvas.toDataURL('image/jpeg', 0.7)); // 70% jakości
                };
            };
        });
    }

    async function publish() {
        const t = document.getElementById('in-title').value;
        const txt = document.getElementById('in-text').value;
        const aut = document.getElementById('in-author').value;
        const files = document.getElementById('in-files').files;

        if(!t || !txt) return alert("Wypełnij pola!");
        
        document.getElementById('status-msg').style.display = 'block';

        let images = [];
        for(let f of files) { images.push(await compressImage(f)); }

        await db.ref(root + "/posts").push({
            title: t, content: txt, author: aut, images: images,
            date: new Date().toLocaleString(), ts: Date.now()
        });

        location.reload();
    }

    // Pobieranie danych
    db.ref(root + "/posts").on('value', snap => {
        const grid = document.getElementById('grid-content');
        const adm = document.getElementById('admin-list');
        grid.innerHTML = ""; adm.innerHTML = "<h3>Zarządzaj:</h3>";
        
        let items = [];
        snap.forEach(c => { items.push({id: c.key, ...c.val()}); });
        items.sort((a,b) => b.ts - a.ts);

        items.forEach(p => {
            const thumb = p.images ? p.images[0] : '';
            grid.innerHTML += `
                <div class="post-card" onclick="loadFull('${p.id}')">
                    <img src="${thumb}" class="post-thumb">
                    <div class="post-info">
                        <h2>${p.title}</h2>
                        <p>${p.content}</p>
                        <small style="color:var(--yellow)">${p.date}</small>
                    </div>
                </div>`;
            
            adm.innerHTML += `<div style="display:flex; justify-content:space-between; margin-top:10px; background:#222; padding:10px; border-radius:5px">
                <span>${p.title}</span>
                <button onclick="db.ref('${root}/posts/${p.id}').remove()" style="color:red; background:none; border:none; cursor:pointer">USUŃ</button>
            </div>`;
        });
    });

    async function loadFull(id) {
        const s = await db.ref(root + "/posts/" + id).once('value');
        const p = s.val();
        let gal = (p.images || []).map(i => `<img src="${i}">`).join('');
        
        document.getElementById('article-body').innerHTML = `
            <h1 style="font-size:32px; color:var(--yellow)">${p.title}</h1>
            <p style="margin-bottom:20px; font-size:14px">Redaktor: ${p.author} | ${p.date}</p>
            <div class="full-content">${p.content}</div>
            <div class="gallery-grid">${gal}</div>
        `;
        showView('article');
    }
</script>
</body>
</html>

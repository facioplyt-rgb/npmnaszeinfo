<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ełk Nasze Eventy | Wszystko o eventach</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <style>
        :root { --main: #0062ff; --accent: #ffcc00; }
        body { background: #0b0f1a; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(22, 28, 45, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .card { transition: all 0.3s ease; }
        .card:hover { transform: translateY(-8px); border-color: var(--main); box-shadow: 0 10px 30px -10px rgba(0,98,255,0.4); }
        .input-dark { background: #161c2d; border: 2px solid #2d3748; border-radius: 14px; padding: 14px; width: 100%; color: white; outline: none; }
        .input-dark:focus { border-color: var(--main); }
        .white-pre { white-space: pre-wrap; word-wrap: break-word; }
        #loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body class="antialiased">

    <div id="loader">
        <div class="animate-spin text-5xl text-blue-500 mb-4"><i class="fa-solid fa-spinner"></i></div>
        <p class="font-bold tracking-widest uppercase text-sm">Przesyłanie do węzła ELK...</p>
    </div>

    <header class="sticky top-0 z-50 glass border-b border-white/5 mb-8">
        <div class="max-w-6xl mx-auto px-4 h-20 flex justify-between items-center">
            <h1 onclick="core.goHome()" class="text-2xl font-black italic cursor-pointer tracking-tighter">
                EŁK <span class="text-blue-500">NASZE</span> <span class="text-amber-400 uppercase text-lg">Eventy</span>
            </h1>
            <button onclick="core.openAdmin()" class="bg-white/5 hover:bg-white/10 px-5 py-2.5 rounded-full text-[11px] font-black uppercase tracking-wider transition border border-white/10">
                <i class="fa-solid fa-lock-open mr-2 text-blue-500"></i> Redakcja
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4">
        
        <div id="view-home" class="grid grid-cols-1 lg:grid-cols-3 gap-10">
            <div id="news-container" class="lg:col-span-2 space-y-8">
                <div class="text-center py-20 text-slate-600 animate-pulse">Inicjalizacja połączenia z bazą...</div>
            </div>
            
            <aside class="space-y-6">
                <div class="glass p-8 rounded-[32px] border-l-4 border-blue-600">
                    <h3 class="text-blue-500 font-black text-xs uppercase mb-4 tracking-widest">Status Systemu</h3>
                    <div class="flex items-center gap-3 text-sm">
                        <div class="w-2 h-2 bg-green-500 rounded-full animate-ping"></div>
                        <span class="text-slate-300">Węzeł: <b class="text-white">ELK</b> (Połączono)</span>
                    </div>
                </div>
            </aside>
        </div>

        <div id="view-article" class="hidden max-w-4xl mx-auto pb-32">
            <button onclick="core.goHome()" class="mb-10 text-slate-400 hover:text-blue-500 font-bold flex items-center gap-2 transition">
                <i class="fa-solid fa-chevron-left"></i> POWRÓT DO LISTY
            </button>
            <div id="article-content" class="space-y-8 animate-in fade-in duration-500"></div>
        </div>

        <div id="view-admin" class="hidden max-w-2xl mx-auto pb-32">
            <div class="glass p-10 rounded-[40px] shadow-2xl relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-blue-600"></div>
                <div class="flex justify-between items-center mb-10">
                    <h2 class="text-2xl font-black italic uppercase tracking-tight">Nowy wpis <span class="text-blue-500">Redakcyjny</span></h2>
                    <button onclick="core.goHome()" class="text-slate-500 hover:text-white text-3xl transition">&times;</button>
                </div>
                
                <div class="space-y-5">
                    <input type="text" id="in-title" placeholder="Tytuł wydarzenia" class="input-dark text-lg font-bold">
                    <input type="text" id="in-author" placeholder="Autor / Źródło" class="input-dark">
                    <textarea id="in-content" rows="8" placeholder="O czym chcesz napisać?" class="input-dark"></textarea>
                    
                    <div class="relative group">
                        <input type="file" id="in-files" multiple accept="image/*" class="hidden">
                        <label for="in-files" class="flex flex-col items-center justify-center p-8 border-2 border-dashed border-slate-700 rounded-2xl cursor-pointer group-hover:border-blue-500/50 transition bg-white/2">
                            <i class="fa-solid fa-images text-3xl text-slate-600 group-hover:text-blue-500 mb-3 transition"></i>
                            <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest group-hover:text-slate-300">Dodaj zdjęcia do galerii</p>
                        </label>
                    </div>
                    <div id="file-preview" class="flex flex-wrap gap-2 justify-center"></div>
                    
                    <button onclick="core.publish()" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-5 rounded-2xl font-black uppercase tracking-[0.2em] shadow-xl shadow-blue-900/20 transition-all active:scale-95">
                        Opublikuj w chmurze
                    </button>
                    
                    <div id="admin-list" class="mt-16 pt-10 border-t border-white/5 space-y-3"></div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

        // --- TWOJA KONFIGURACJA ---
        const firebaseConfig = {
            apiKey: "TWOJE_API_KEY",
            authDomain: "mzk-by-facio.firebaseapp.com",
            databaseURL: "https://mzk-by-facio-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mzk-by-facio",
            appId: "APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const postsRef = ref(db, 'elk/posts');

        window.core = {
            goHome: () => {
                document.getElementById('view-home').classList.remove('hidden');
                document.getElementById('view-article').classList.add('hidden');
                document.getElementById('view-admin').classList.add('hidden');
                window.scrollTo(0,0);
            },

            openAdmin: () => {
                if(prompt("PODAJ KOD REDAKCYJNY:") === "diax67") {
                    document.getElementById('view-home').classList.add('hidden');
                    document.getElementById('view-admin').classList.remove('hidden');
                    window.scrollTo(0,0);
                }
            },

            publish: async () => {
                const t = document.getElementById('in-title').value;
                const c = document.getElementById('in-content').value;
                const a = document.getElementById('in-author').value || "Redakcja Ełk";
                const files = document.getElementById('in-files').files;

                if(!t || !c) return alert("Uzupełnij tytuł i treść!");

                document.getElementById('loader').style.display = 'flex';

                let images = [];
                for(let f of files) {
                    const b64 = await new Promise(res => {
                        const r = new FileReader();
                        r.readAsDataURL(f);
                        r.onload = () => res(r.result);
                    });
                    images.push(b64);
                }

                try {
                    await push(postsRef, {
                        title: t, content: c, author: a, images: images,
                        ts: Date.now(), date: new Date().toLocaleString('pl-PL', { day: '2-digit', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' })
                    });
                    location.reload();
                } catch(e) {
                    alert("Problem z bazą: " + e.message);
                    document.getElementById('loader').style.display = 'none';
                }
            },

            deletePost: (id) => confirm("Czy na pewno usunąć ten wpis?") && remove(ref(db, `elk/posts/${id}`)),

            showFull: (id, data) => {
                document.getElementById('view-home').classList.add('hidden');
                document.getElementById('view-article').classList.remove('hidden');
                
                let gallery = (data.images || []).map(img => `<img src="${img}" class="w-full rounded-3xl shadow-2xl ring-1 ring-white/10">`).join('');
                
                document.getElementById('article-content').innerHTML = `
                    <div class="space-y-4">
                        <div class="text-[10px] font-black text-blue-500 uppercase tracking-[0.3em] bg-blue-500/10 w-fit px-4 py-2 rounded-full">${data.date}</div>
                        <h1 class="text-4xl md:text-6xl font-black leading-tight tracking-tighter">${data.title}</h1>
                        <div class="text-slate-500 text-sm italic">Redakcja: ${data.author}</div>
                    </div>
                    <div class="text-slate-300 text-xl md:text-2xl leading-relaxed white-pre py-6">${data.content}</div>
                    <div class="grid grid-cols-1 gap-8 pt-10">${gallery}</div>
                `;
                window.scrollTo(0,0);
            }
        };

        // Podgląd plików
        document.getElementById('in-files').onchange = (e) => {
            const preview = document.getElementById('file-preview');
            preview.innerHTML = "";
            [...e.target.files].forEach(f => {
                const url = URL.createObjectURL(f);
                preview.innerHTML += `<img src="${url}" class="w-16 h-16 object-cover rounded-xl ring-2 ring-white/10">`;
            });
        };

        // Synchronizacja Real-Time
        onValue(postsRef, (snap) => {
            const feed = document.getElementById('news-container');
            const adm = document.getElementById('admin-list');
            feed.innerHTML = ""; adm.innerHTML = "<h3 class='text-[10px] font-black text-slate-600 uppercase tracking-widest mb-6'>Zarządzaj wpisami</h3>";
            
            const data = snap.val();
            if(!data) {
                feed.innerHTML = `<div class="glass p-20 text-center rounded-[40px] border-dashed border-2 border-white/5 text-slate-600 italic">Brak aktualnych wydarzeń.</div>`;
                return;
            }

            const entries = Object.entries(data).sort((a,b) => b[1].ts - a[1].ts);

            entries.forEach(([id, v]) => {
                // Admin Area
                adm.innerHTML += `
                    <div class="flex justify-between items-center p-4 rounded-2xl bg-white/2 border border-white/5">
                        <span class="text-xs font-bold truncate pr-4 opacity-60">${v.title}</span>
                        <button onclick="core.deletePost('${id}')" class="text-red-500 hover:bg-red-500/10 p-2 rounded-lg transition"><i class="fa-solid fa-trash-can"></i></button>
                    </div>`;

                // Main Feed
                const hasImg = v.images && v.images.length > 0;
                const card = document.createElement('div');
                card.className = "card glass rounded-[40px] overflow-hidden border border-white/5 group";
                card.innerHTML = `
                    ${hasImg ? `<div class="h-80 overflow-hidden"><img src="${v.images[0]}" class="w-full h-full object-cover group-hover:scale-105 transition duration-700"></div>` : ''}
                    <div class="p-10">
                        <div class="text-[10px] font-black text-blue-500 uppercase tracking-widest mb-4">${v.date}</div>
                        <h2 class="text-3xl font-black mb-4 leading-tight group-hover:text-blue-400 transition">${v.title}</h2>
                        <p class="text-slate-400 leading-relaxed line-clamp-3 mb-8">${v.content}</p>
                        <div class="flex items-center gap-2 text-xs font-black uppercase tracking-tighter text-white/40">
                            CZYTAJ WIĘCEJ <i class="fa-solid fa-arrow-right-long text-blue-500 ml-2 group-hover:translate-x-2 transition"></i>
                        </div>
                    </div>`;
                card.onclick = () => core.showFull(id, v);
                feed.appendChild(card);
            });
        });
    </script>
</body>
</html>

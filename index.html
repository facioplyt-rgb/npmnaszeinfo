<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ełk Nasze Wiadomości</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --main: #0062ff; }
        body { background: #0b0f1a; color: white; font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .glass { background: rgba(22, 28, 45, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .card { transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.05); }
        .card:hover { transform: translateY(-5px); border-color: var(--main); }
        .input-dark { background: #161c2d; border: 2px solid #2d3748; border-radius: 12px; padding: 12px; width: 100%; color: white; outline: none; transition: 0.3s; }
        .input-dark:focus { border-color: var(--main); box-shadow: 0 0 15px rgba(0,98,255,0.2); }
        
        .white-pre { white-space: pre-wrap; word-wrap: break-word; }
        #loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .post-anim { animation: fadeInUp 0.4s ease forwards; }

        .author-badge { font-weight: 900; color: #3b82f6; padding: 0.25rem 0.75rem; background: rgba(59, 130, 246, 0.1); border-radius: 9999px; font-size: 10px; }
        
        /* STYLE FORMATOWANIA DISCORD */
        .md-h1 { font-size: 2.25rem; font-weight: 900; display: block; margin: 1rem 0; color: white; line-height: 1.2; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }
        .md-h3 { font-size: 1.5rem; font-weight: 700; display: block; margin: 0.75rem 0; color: #cbd5e1; }
        .md-small { font-size: 0.85rem; opacity: 0.7; display: block; line-height: 1.4; color: #94a3b8; }
        .md-u { text-decoration: underline; text-underline-offset: 3px; }

        .tab-btn { padding: 10px 20px; font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; border-radius: 12px; cursor: pointer; transition: 0.3s; border: 1px solid rgba(255,255,255,0.05); color: #64748b; }
        .tab-btn.active { background: var(--main); color: white; border-color: var(--main); box-shadow: 0 4px 15px rgba(0,98,255,0.3); }
        .tab-btn:hover:not(.active) { background: rgba(255,255,255,0.05); color: white; }

        .category-tag { font-size: 9px; font-weight: 900; text-transform: uppercase; padding: 2px 8px; border-radius: 4px; background: rgba(255,255,255,0.1); color: #cbd5e1; }
        
        /* NOWE STYLE KOMENTARZY I LIKE */
        .like-btn { transition: 0.3s; cursor: pointer; }
        .like-btn:active { transform: scale(1.4); }
        .comment-item { border-left: 2px solid var(--main); background: rgba(255,255,255,0.02); padding: 10px 15px; border-radius: 0 12px 12px 0; margin-bottom: 10px; position: relative; }
        .del-comm-btn { position: absolute; right: 10px; top: 10px; color: #ef4444; font-size: 10px; font-weight: 900; text-transform: uppercase; border: 1px solid rgba(239, 68, 68, 0.2); padding: 2px 8px; border-radius: 5px; display: none; }
        body.admin-active .del-comm-btn { display: block; }
        
        .reply-btn { font-size: 9px; font-weight: 900; color: var(--main); text-transform: uppercase; margin-top: 5px; cursor: pointer; opacity: 0.6; }
        .reply-btn:hover { opacity: 1; }
        .comm-react-btn { font-size: 10px; font-weight: 700; display: flex; items-center: gap: 4px; background: rgba(255,255,255,0.05); padding: 2px 8px; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        .comm-react-btn:hover { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
    </style>
</head>
<body id="main-body">

    <div id="loader">
        <div class="animate-spin text-4xl text-blue-500"><i class="fa-solid fa-circle-notch"></i></div>
    </div>

    <header class="sticky top-0 z-50 glass border-b border-white/5 mb-8">
        <div class="max-w-6xl mx-auto px-4 h-16 flex justify-between items-center">
            <h1 onclick="core.goHome()" class="text-xl font-black italic cursor-pointer uppercase">
                EŁK <span class="text-blue-500">NASZE</span> EVENTY
            </h1>
            <div class="flex items-center gap-4">
                <span id="admin-indicator" class="hidden text-[9px] bg-green-500/20 text-green-500 px-2 py-1 rounded-md font-black uppercase tracking-tighter">Tryb Admina</span>
                <button onclick="core.openAdmin()" class="text-[10px] font-bold uppercase tracking-widest opacity-40 hover:opacity-100 transition">
                    Panel Redakcji
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4">
        
        <div id="search-area" class="mb-8 space-y-6">
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                <input type="text" id="search-input" oninput="core.filterPosts()" placeholder="Szukaj wydarzenia..." class="input-dark pl-12">
            </div>

            <div class="flex flex-wrap gap-2 items-center border-b border-white/5 pb-4">
                <button onclick="core.switchTab('all', this)" class="tab-btn active">Wszystkie</button>
                <button onclick="core.switchTab('Wydarzenia', this)" class="tab-btn">Wydarzenia</button>
                <button onclick="core.switchTab('Aktualizacje', this)" class="tab-btn">Aktualizacje</button>
                <button onclick="core.switchTab('Informacje', this)" class="tab-btn">Informacje</button>
            </div>
        </div>

        <div id="view-home" class="pb-20">
            <div id="news-container" class="space-y-4">
                <div class="text-center py-20 text-slate-600 italic tracking-widest uppercase text-xs">Wczytywanie bazy...</div>
            </div>
            <div id="more-container" class="mt-8 hidden flex justify-center">
                <button onclick="core.showAllPosts()" class="px-8 py-3 bg-slate-800 hover:bg-slate-700 rounded-full font-bold text-sm transition border border-white/5 uppercase tracking-tighter">
                    Pokaż wszystkie pozostałe
                </button>
            </div>
        </div>

        <div id="view-article" class="hidden pb-20">
            <button onclick="core.goHome()" class="mb-8 text-slate-400 font-bold flex items-center gap-2 hover:text-white transition uppercase text-xs tracking-widest">
                <i class="fa-solid fa-arrow-left"></i> Wstecz
            </button>
            <div id="article-content"></div>
            
            <div id="article-interaction" class="mt-12 pt-12 border-t border-white/10">
                <div class="flex items-center gap-6 mb-10">
                    <div onclick="core.likePost()" class="like-btn flex items-center gap-2 bg-white/5 px-6 py-3 rounded-full hover:bg-red-500/10 hover:text-red-500 border border-white/5">
                        <i class="fa-solid fa-heart text-xl"></i>
                        <span id="like-count" class="font-black">0</span>
                    </div>
                </div>

                <h3 class="text-xl font-black uppercase italic mb-6">Komentarze</h3>
                <div id="comments-list" class="space-y-4 mb-8"></div>
                
                <div id="comment-box-anchor" class="glass p-6 rounded-[24px] space-y-4">
                    <input type="text" id="comm-nick" placeholder="Twój Nick" class="input-dark">
                    <textarea id="comm-text" rows="3" placeholder="Napisz co o tym sądzisz..." class="input-dark"></textarea>
                    <button onclick="core.addComment()" class="bg-blue-600 w-full p-4 rounded-xl font-bold uppercase tracking-widest hover:bg-blue-500 transition">Wyślij komentarz</button>
                </div>
            </div>
        </div>

        <div id="view-admin" class="hidden max-w-xl mx-auto glass p-8 rounded-[30px] mb-20 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 id="admin-mode-title" class="text-xl font-bold italic uppercase tracking-tighter">Nowy Wpis</h2>
                <button onclick="core.cancelEdit()" id="cancel-edit-btn" class="hidden text-red-500 text-[10px] font-bold uppercase border border-red-500/30 px-3 py-1 rounded-full">Anuluj edycję</button>
            </div>
            
            <div class="space-y-4">
                <input type="text" id="in-title" placeholder="Tytuł wydarzenia" class="input-dark">
                <input type="text" id="in-author" placeholder="Autor / Twoja Nazwa" class="input-dark">
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white/5 p-4 rounded-xl border border-white/10">
                        <p class="text-[10px] font-bold text-slate-500 mb-3 uppercase tracking-widest">Kategoria posta:</p>
                        <select id="in-category" class="input-dark bg-slate-900">
                            <option value="Wydarzenia">Wydarzenia</option>
                            <option value="Aktualizacje">Aktualizacje</option>
                            <option value="Informacje">Informacje</option>
                        </select>
                    </div>
                    <div class="bg-white/5 p-4 rounded-xl border border-white/10">
                        <p class="text-[10px] font-bold text-slate-500 mb-3 uppercase tracking-widest">Data wystawienia:</p>
                        <input type="text" id="in-date" placeholder="Zostaw puste dla obecnej" class="input-dark bg-slate-900 text-xs">
                    </div>
                </div>

                <textarea id="in-content" rows="10" placeholder="Treść artykułu... (# Nagłówek, **Pogrubienie**, *Kursywa*, -# Mały tekst, __Podkreślenie__)" class="input-dark"></textarea>
                
                <div class="bg-white/5 p-4 rounded-xl border border-dashed border-white/10">
                    <p class="text-[10px] font-bold text-slate-500 mb-2 uppercase">Zdjęcia w tym wpisie:</p>
                    <div id="edit-images-preview" class="flex flex-wrap gap-2 mb-3"></div>
                    <input type="file" id="in-files" onchange="core.previewNewFiles()" multiple accept="image/*" class="text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-blue-500/10 file:text-blue-500 hover:file:bg-blue-500/20">
                    <div id="new-files-names" class="text-[9px] text-blue-400 mt-2 font-bold uppercase"></div>
                </div>

                <button onclick="core.publish()" id="publish-btn" class="w-full bg-blue-600 p-4 rounded-xl font-bold uppercase transition active:scale-95 shadow-lg shadow-blue-500/20">
                    Opublikuj na stronie
                </button>
                
                <div id="admin-list" class="mt-10 pt-6 border-t border-white/5 space-y-2"></div>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSy...", 
            authDomain: "mzk-by-facio.firebaseapp.com",
            databaseURL: "https://mzk-by-facio-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mzk-by-facio",
            appId: "1:676970411647:web:5703d5fb5fb499ff83714a"
        };

        const IMGBB_API_KEY = "19570ba1fa4dc27bd0ba974b4eb2e253";

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const postsRef = db.ref('elk/posts');

        let allData = [];
        let showLimit = 3;
        let editId = null;
        let currentOpenPostId = null;
        let currentEditImages = [];
        let currentTab = 'all';
        let isAdminLoggedIn = false;

        window.core = {
            parseMarkdown: (text) => {
                if(!text) return "";
                let html = text;
                html = html.replace(/^#\s+(.*)$/gm, '<span class="md-h1">$1</span>');
                html = html.replace(/^###\s+(.*)$/gm, '<span class="md-h3">$1</span>');
                html = html.replace(/^-#\s+(.*)$/gm, '<span class="md-small">$1</span>');
                html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                html = html.replace(/__(.*?)__/g, '<span class="md-u">$1</span>');
                html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
                return html;
            },

            previewNewFiles: () => {
                const files = document.getElementById('in-files').files;
                const label = document.getElementById('new-files-names');
                label.innerText = files.length > 0 ? `Wybrano nowe pliki: ${files.length}` : "";
            },

            switchTab: (tabId, btn) => {
                currentTab = tabId;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                core.filterPosts();
            },

            goHome: () => {
                document.getElementById('view-home').classList.remove('hidden');
                document.getElementById('search-area').classList.remove('hidden');
                document.getElementById('view-article').classList.add('hidden');
                document.getElementById('view-admin').classList.add('hidden');
                core.cancelEdit();
                currentOpenPostId = null;
                window.scrollTo(0,0);
            },

            openAdmin: () => {
                const pin = prompt("KOD:");
                db.ref('elk/config/adminPass').once('value', (snap) => {
                    const realPass = snap.val();
                    if(pin === realPass) {
                        isAdminLoggedIn = true;
                        document.getElementById('main-body').classList.add('admin-active');
                        document.getElementById('admin-indicator').classList.remove('hidden');
                        document.getElementById('view-home').classList.add('hidden');
                        document.getElementById('search-area').classList.add('hidden');
                        document.getElementById('view-admin').classList.remove('hidden');
                    } else { alert("Błędny kod!"); }
                });
            },

            removeImageFromEdit: (index) => {
                currentEditImages.splice(index, 1);
                core.renderEditImages();
            },

            renderEditImages: () => {
                const container = document.getElementById('edit-images-preview');
                container.innerHTML = "";
                currentEditImages.forEach((url, index) => {
                    const div = document.createElement('div');
                    div.className = "relative inline-block";
                    div.innerHTML = `<img src="${url}" class="w-16 h-16 object-cover rounded-lg ring-1 ring-white/10"><button onclick="core.removeImageFromEdit(${index})" class="absolute -top-1 -right-1 bg-red-600 text-white rounded-full w-5 h-5 text-[10px] flex items-center justify-center font-bold">X</button>`;
                    container.appendChild(div);
                });
            },

            publish: async () => {
                const t = document.getElementById('in-title').value;
                const c = document.getElementById('in-content').value;
                const cat = document.getElementById('in-category').value;
                const a = document.getElementById('in-author').value || "Redakcja";
                const customDate = document.getElementById('in-date').value;
                const files = document.getElementById('in-files').files;
                if(!t || !c) return alert("Uzupełnij pola!");
                document.getElementById('loader').style.display = 'flex';
                let newImageUrls = [];
                if(files && files.length > 0) {
                    for(let i=0; i<files.length; i++) {
                        const fd = new FormData();
                        fd.append("image", files[i]);
                        try {
                            const r = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: fd });
                            const d = await r.json();
                            if(d.success) newImageUrls.push(d.data.url);
                        } catch(e) {}
                    }
                }
                const finalImages = [...currentEditImages, ...newImageUrls];
                const nowStr = new Date().toLocaleString('pl-PL');
                let postData = { title: t, content: c, author: a, category: cat, images: finalImages };
                if(editId) {
                    const old = allData.find(x => x.id === editId);
                    postData.date = customDate || old.date;
                    postData.ts = old.ts;
                    postData.updated = nowStr;
                } else {
                    postData.date = customDate || nowStr;
                    postData.ts = Date.now();
                    postData.likes = 0;
                }
                const action = editId ? postsRef.child(editId).update(postData) : postsRef.push(postData);
                action.then(() => location.reload()).catch(err => {
                    alert(err.message);
                    document.getElementById('loader').style.display = 'none';
                });
            },

            editMode: (id) => {
                const post = allData.find(x => x.id === id);
                if(!post) return;
                editId = id;
                currentEditImages = post.images ? [...post.images] : [];
                document.getElementById('in-title').value = post.title;
                document.getElementById('in-author').value = post.author;
                document.getElementById('in-content').value = post.content;
                document.getElementById('in-category').value = post.category || "Wydarzenia";
                document.getElementById('in-date').value = post.date || "";
                document.getElementById('admin-mode-title').innerText = "Edytuj";
                document.getElementById('publish-btn').innerText = "Zapisz";
                document.getElementById('publish-btn').classList.replace('bg-blue-600', 'bg-amber-600');
                document.getElementById('cancel-edit-btn').classList.remove('hidden');
                core.renderEditImages();
                window.scrollTo(0,0);
            },

            cancelEdit: () => {
                editId = null; currentEditImages = [];
                document.getElementById('in-title').value = "";
                document.getElementById('in-author').value = "";
                document.getElementById('in-content').value = "";
                document.getElementById('in-date').value = "";
                document.getElementById('in-files').value = "";
                document.getElementById('new-files-names').innerText = "";
                document.getElementById('edit-images-preview').innerHTML = "";
                document.getElementById('admin-mode-title').innerText = "Nowy Wpis";
                document.getElementById('publish-btn').innerText = "Opublikuj";
                document.getElementById('publish-btn').classList.replace('bg-amber-600', 'bg-blue-600');
                document.getElementById('cancel-edit-btn').classList.add('hidden');
            },

            deletePost: (id) => confirm("Usunąć wpis?") && postsRef.child(id).remove(),

            showAllPosts: () => { showLimit = 999; core.renderPosts(allData); document.getElementById('more-container').classList.add('hidden'); },

            filterPosts: () => {
                const term = document.getElementById('search-input').value.toLowerCase();
                let f = allData;
                if(currentTab !== 'all') f = f.filter(p => p.category === currentTab);
                f = f.filter(p => p.title.toLowerCase().includes(term) || p.author.toLowerCase().includes(term));
                core.renderPosts(f, term !== "" || currentTab !== 'all');
            },

            renderPosts: (items, isSearching = false) => {
                const container = document.getElementById('news-container');
                container.innerHTML = "";
                const toShow = isSearching ? items : items.slice(0, showLimit);
                if(toShow.length === 0) { container.innerHTML = "<div class='text-center py-20 opacity-50'>Brak wpisów</div>"; return; }
                toShow.forEach(v => {
                    const card = document.createElement('div');
                    card.className = "card glass p-6 rounded-2xl cursor-pointer mb-4 post-anim";
                    const plain = v.content.replace(/[#*_-]/g, '').slice(0, 100) + '...';
                    card.innerHTML = `<div class="flex gap-5 flex-col md:flex-row items-center md:items-start">${v.images?.[0] ? `<img src="${v.images[0]}" class="w-full md:w-28 h-28 object-cover rounded-xl">` : `<div class="w-28 h-28 bg-slate-800 rounded-xl flex items-center justify-center"><i class="fa-solid fa-image text-3xl opacity-20"></i></div>`}<div class="flex-1 text-center md:text-left"><div class="flex items-center gap-2 mb-1 justify-center md:justify-start"><span class="category-tag">${v.category || 'Wydarzenia'}</span><h2 class="font-black text-xl">${v.title}</h2></div><p class="opacity-50 text-sm line-clamp-2">${plain}</p><div class="flex flex-wrap justify-center md:justify-start items-center gap-3 mt-4"><span class="author-badge">${v.author}</span><span class="text-[10px] opacity-40 font-bold">${v.date}</span> <span class="text-[10px] text-red-500 font-bold"><i class="fa-solid fa-heart"></i> ${v.likes || 0}</span></div></div></div>`;
                    card.onclick = () => core.showFull(v);
                    container.appendChild(card);
                });
                document.getElementById('more-container').classList.toggle('hidden', isSearching || items.length <= showLimit);
            },

            toggleUpdateDate: () => document.getElementById('upd-info')?.classList.toggle('hidden'),

            likePost: () => {
                if(!currentOpenPostId) return;
                const storageKey = `liked_${currentOpenPostId}`;
                if(localStorage.getItem(storageKey)) return alert("Już zareagowałeś na ten post!");
                
                const post = allData.find(x => x.id === currentOpenPostId);
                const currentLikes = post.likes || 0;
                postsRef.child(currentOpenPostId).update({ likes: currentLikes + 1 }).then(() => {
                    localStorage.setItem(storageKey, "true");
                });
            },

            addComment: () => {
                const nick = document.getElementById('comm-nick').value;
                const text = document.getElementById('comm-text').value;
                if(!nick || !text) return alert("Uzupełnij nick i komentarz!");
                db.ref(`elk/comments/${currentOpenPostId}`).push({
                    nick: nick, text: text, date: new Date().toLocaleString('pl-PL'), ts: Date.now(), reacts: 0
                }).then(() => { document.getElementById('comm-text').value = ""; });
            },

            replyTo: (nick) => {
                const area = document.getElementById('comm-text');
                area.value = `@${nick} ` + area.value;
                area.focus();
                document.getElementById('comment-box-anchor').scrollIntoView({behavior: 'smooth'});
            },

            reactComment: (cid) => {
                const storageKey = `react_comm_${cid}`;
                if(localStorage.getItem(storageKey)) return;
                
                const ref = db.ref(`elk/comments/${currentOpenPostId}/${cid}/reacts`);
                ref.transaction((current) => (current || 0) + 1);
                localStorage.setItem(storageKey, "true");
            },

            deleteComment: (commentId) => {
                if(confirm("Usunąć ten komentarz?")) {
                    db.ref(`elk/comments/${currentOpenPostId}/${commentId}`).remove();
                }
            },

            loadComments: (postId) => {
                db.ref(`elk/comments/${postId}`).on('value', (snap) => {
                    const list = document.getElementById('comments-list');
                    list.innerHTML = "";
                    const data = snap.val();
                    if(!data) { list.innerHTML = "<p class='opacity-30 text-xs italic'>Brak komentarzy.</p>"; return; }
                    Object.entries(data).sort((a,b) => b[1].ts - a[1].ts).forEach(([cid, c]) => {
                        list.innerHTML += `
                            <div class="comment-item">
                                <button onclick="core.deleteComment('${cid}')" class="del-comm-btn">Usuń</button>
                                <div class="flex justify-between items-center mb-1">
                                    <span class="font-black text-blue-400 text-xs uppercase tracking-tighter">${c.nick}</span>
                                    <span class="text-[9px] opacity-30">${c.date}</span>
                                </div>
                                <p class="text-sm text-slate-300">${c.text}</p>
                                <div class="flex items-center gap-3 mt-2">
                                    <div onclick="core.reactComment('${cid}')" class="comm-react-btn">
                                        <i class="fa-solid fa-heart"></i> <span>${c.reacts || 0}</span>
                                    </div>
                                    <span onclick="core.replyTo('${c.nick}')" class="reply-btn">Odpowiedz</span>
                                </div>
                            </div>`;
                    });
                });
            },

            showFull: (data) => {
                currentOpenPostId = data.id;
                document.getElementById('view-home').classList.add('hidden');
                document.getElementById('search-area').classList.add('hidden');
                document.getElementById('view-article').classList.remove('hidden');
                document.getElementById('like-count').innerText = data.likes || 0;
                core.loadComments(data.id);
                let imgs = (data.images || []).map(img => `<img src="${img}" class="w-full rounded-3xl mb-6 shadow-2xl">`).join('');
                document.getElementById('article-content').innerHTML = `<div class="mb-4"><span class="category-tag">${data.category || 'Wydarzenia'}</span></div><h1 class="text-4xl md:text-5xl font-black mb-4 tracking-tighter">${data.title}</h1><div class="flex items-center gap-4 mb-8"><div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center font-bold">${data.author.charAt(0)}</div><div><p class="text-sm font-bold text-blue-500">${data.author}</p><p onclick="core.toggleUpdateDate()" class="text-xs opacity-40 cursor-pointer">${data.date}</p>${data.updated ? `<p id="upd-info" class="hidden text-[10px] text-amber-500 font-bold uppercase mt-1 italic">Edytowano: ${data.updated}</p>` : ''}</div></div><div class="text-slate-300 text-lg leading-relaxed white-pre mb-10 border-l-4 border-blue-600 pl-6">${core.parseMarkdown(data.content)}</div><div class="grid grid-cols-1 md:grid-cols-2 gap-4">${imgs}</div>`;
                window.scrollTo(0,0);
            }
        };

        postsRef.on('value', (snap) => {
            const data = snap.val(); allData = [];
            const admList = document.getElementById('admin-list');
            admList.innerHTML = "<h3 class='text-[10px] font-black opacity-30 uppercase tracking-widest mb-4'>Lista:</h3>";
            if(data) {
                Object.entries(data).sort((a,b) => b[1].ts - a[1].ts).forEach(([id, v]) => {
                    allData.push({ id, ...v });
                    admList.innerHTML += `<div class="flex justify-between items-center bg-white/5 p-3 rounded-xl mb-2"><span class="text-[10px] font-bold opacity-50 truncate max-w-[150px] italic">${v.title}</span><div class="flex gap-2"><button onclick="core.editMode('${id}')" class="text-amber-500 border border-amber-500/20 px-3 py-1 rounded-full text-[9px] font-bold uppercase">Edytuj</button><button onclick="core.deletePost('${id}')" class="text-red-500 border border-red-500/20 px-3 py-1 rounded-full text-[9px] font-bold uppercase">Usuń</button></div></div>`;
                    if(currentOpenPostId === id) { document.getElementById('like-count').innerText = v.likes || 0; }
                });
            }
            core.filterPosts();
        });
    </script>
</body>
</html>

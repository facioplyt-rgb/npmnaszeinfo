<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ełk Nasze Eventy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { background: #0b0f1a; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(22, 28, 45, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .input-dark { background: #161c2d; border: 2px solid #2d3748; border-radius: 12px; padding: 12px; width: 100%; color: white; outline: none; }
        .input-dark:focus { border-color: #0062ff; }
        #loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; }
        .white-pre { white-space: pre-wrap; }
    </style>
</head>
<body>

    <div id="loader"><div class="animate-spin text-4xl text-blue-500"><i class="fa-solid fa-circle-notch"></i></div></div>

    <header class="sticky top-0 z-50 glass border-b border-white/5 mb-8">
        <div class="max-w-6xl mx-auto px-4 h-16 flex justify-between items-center">
            <h1 onclick="core.goHome()" class="text-xl font-black italic cursor-pointer">EŁK <span class="text-blue-500">NASZE</span> EVENTY</h1>
            <button onclick="core.openAdmin()" class="text-[10px] font-bold opacity-40 hover:opacity-100 transition uppercase tracking-widest">Panel</button>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4">
        <div id="search-area" class="mb-8">
            <input type="text" id="search-input" oninput="core.filterPosts()" placeholder="Szukaj wydarzenia..." class="input-dark">
        </div>

        <div id="view-home" class="pb-20">
            <div id="news-container" class="space-y-4"></div>
            <div id="more-container" class="mt-8 hidden flex justify-center">
                <button onclick="core.showAllPosts()" class="px-8 py-3 bg-slate-800 rounded-full font-bold text-sm border border-white/5">Pokaż więcej</button>
            </div>
        </div>

        <div id="view-article" class="hidden pb-20">
            <button onclick="core.goHome()" class="mb-8 text-slate-400 font-bold flex items-center gap-2"><i class="fa-solid fa-arrow-left"></i> Wstecz</button>
            <div id="article-content"></div>
        </div>

        <div id="view-admin" class="hidden max-w-xl mx-auto glass p-8 rounded-[30px] mb-20">
            <h2 id="admin-mode-title" class="text-xl font-bold mb-6">NOWY WPIS</h2>
            <div class="space-y-4">
                <input type="text" id="in-title" placeholder="Tytuł" class="input-dark">
                <input type="text" id="in-author" placeholder="Autor" class="input-dark">
                <textarea id="in-content" rows="6" placeholder="Treść..." class="input-dark"></textarea>
                <input type="file" id="in-files" multiple accept="image/*" class="text-xs text-slate-500">
                <button onclick="core.publish()" id="publish-btn" class="w-full bg-blue-600 p-4 rounded-xl font-bold uppercase transition active:scale-95">Opublikuj</button>
                <div id="admin-list" class="mt-10 pt-6 border-t border-white/5 space-y-2 text-xs text-slate-400"></div>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAs4mZ...", // Wpisz swoje Api Key z Firebase
            authDomain: "mzk-by-facio.firebaseapp.com",
            databaseURL: "https://mzk-by-facio-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mzk-by-facio",
            appId: "1:676970411647:web:5703d5fb5fb499ff83714a" 
        };

        const IMGBB_API_KEY = "19570ba1fa4dc27bd0ba974b4eb2e253";

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const postsRef = db.ref('elk/posts');

        let allData = [];
        let showLimit = 3;
        let editId = null;

        window.core = {
            goHome: () => {
                document.getElementById('view-home').classList.remove('hidden');
                document.getElementById('view-article').classList.add('hidden');
                document.getElementById('view-admin').classList.add('hidden');
                editId = null;
                window.scrollTo(0,0);
            },
            openAdmin: () => { if(prompt("Hasło:") === "diax67") { document.getElementById('view-home').classList.add('hidden'); document.getElementById('view-admin').classList.remove('hidden'); } },
            publish: async () => {
                const t = document.getElementById('in-title').value, c = document.getElementById('in-content').value, a = document.getElementById('in-author').value || "Redakcja", files = document.getElementById('in-files').files;
                if(!t || !c) return alert("Brak treści!");
                document.getElementById('loader').style.display = 'flex';
                let imageUrls = [];
                for(let f of files) {
                    const fd = new FormData(); fd.append("image", f);
                    try { const r = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {method:"POST", body:fd}); const d = await r.json(); if(d.success) imageUrls.push(d.data.url); } catch(e) {}
                }
                const pData = { title:t, content:c, author:a, ts:Date.now(), date:new Date().toLocaleString('pl-PL'), images:imageUrls };
                const action = editId ? postsRef.child(editId).update(pData) : postsRef.push(pData);
                action.then(() => location.reload());
            },
            editMode: (id) => {
                const p = allData.find(x => x.id === id); if(!p) return; editId = id;
                document.getElementById('in-title').value = p.title; document.getElementById('in-content').value = p.content; document.getElementById('in-author').value = p.author;
                document.getElementById('admin-mode-title').innerText = "EDYCJA WPISU"; window.scrollTo(0,0);
            },
            deletePost: (id) => confirm("Usunąć?") && postsRef.child(id).remove(),
            showAllPosts: () => { showLimit = 999; core.renderPosts(allData); document.getElementById('more-container').classList.add('hidden'); },
            filterPosts: () => { const term = document.getElementById('search-input').value.toLowerCase(); core.renderPosts(allData.filter(p => p.title.toLowerCase().includes(term)), term!==""); },
            renderPosts: (items, search) => {
                const container = document.getElementById('news-container'); container.innerHTML = "";
                const toShow = search ? items : items.slice(0, showLimit);
                toShow.forEach(v => {
                    const card = document.createElement('div'); card.className = "glass p-5 rounded-2xl cursor-pointer hover:border-blue-500 transition border border-white/5 mb-4";
                    card.innerHTML = `<div class="flex gap-4">${v.images?.[0] ? `<img src="${v.images[0]}" class="w-20 h-20 object-cover rounded-lg">`:''}<div class="flex-1"><h2 class="font-bold text-lg">${v.title}</h2><p class="text-slate-400 text-xs line-clamp-2">${v.content}</p><div class="text-[10px] text-blue-500 font-black mt-2 uppercase">${v.date}</div></div></div>`;
                    card.onclick = () => core.showFull(v); container.appendChild(card);
                });
                document.getElementById('more-container').classList.toggle('hidden', search || items.length <= showLimit);
            },
            showFull: (data) => {
                document.getElementById('view-home').classList.add('hidden'); document.getElementById('view-article').classList.remove('hidden');
                document.getElementById('article-content').innerHTML = `<h1 class="text-3xl font-black mb-4">${data.title}</h1><p class="text-blue-500 text-xs font-bold mb-6">${data.author} • ${data.date}</p><div class="text-slate-300 white-pre leading-relaxed mb-10 text-lg">${data.content}</div>${(data.images||[]).map(i=>`<img src="${i}" class="w-full rounded-3xl mb-4 shadow-xl">`).join('')}`;
                window.scrollTo(0,0);
            }
        };

        postsRef.on('value', snap => {
            const data = snap.val(); allData = [];
            const adm = document.getElementById('admin-list'); adm.innerHTML = "";
            if(!data) return;
            Object.entries(data).sort((a,b)=>b[1].ts-a[1].ts).forEach(([id, v]) => {
                allData.push({id, ...v});
                adm.innerHTML += `<div class="flex justify-between bg-white/5 p-2 rounded mb-1"><span>${v.title}</span><div><button onclick="core.editMode('${id}')" class="text-amber-500 mr-2">Edytuj</button><button onclick="core.deletePost('${id}')" class="text-red-500">Usuń</button></div></div>`;
            });
            core.renderPosts(allData);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ełk Nasze Eventy | Wszystko o eventach</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --card-dark: #161616;
            --primary-blue: #0066cc;
            --accent-yellow: #ffcc00;
            --text-main: #f0f0f0;
            --text-muted: #888;
            --danger: #ff3333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); line-height: 1.6; }

        /* --- UI ELEMENTS --- */
        header { background: #000; border-bottom: 3px solid var(--primary-blue); position: sticky; top: 0; z-index: 1000; }
        .header-top { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; }
        .logo { font-size: 30px; font-weight: 900; color: #fff; cursor: pointer; text-decoration: none; }
        .logo span { color: var(--accent-yellow); }
        
        nav { background: #111; padding: 12px 0; border-bottom: 1px solid #222; }
        .nav-container { max-width: 1400px; margin: 0 auto; display: flex; gap: 30px; padding: 0 20px; }
        .nav-link { color: #ccc; text-decoration: none; font-weight: bold; font-size: 13px; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .nav-link:hover { color: var(--accent-yellow); }

        .container { max-width: 1400px; margin: 30px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 380px; gap: 40px; }

        /* --- LOADER --- */
        #loader { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; justify-content:center; align-items:center; flex-direction:column; }
        .spinner { width: 50px; height: 50px; border: 5px solid #333; border-top: 5px solid var(--accent-yellow); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- GRID --- */
        .news-section { display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px; }
        .featured-post { grid-column: span 2; position: relative; height: 500px; border-radius: 12px; overflow: hidden; cursor: pointer; }
        .featured-post img { width: 100%; height: 100%; object-fit: cover; }
        .featured-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 50px; background: linear-gradient(transparent, rgba(0,0,0,0.95)); }
        
        .standard-post { background: var(--card-dark); border-radius: 12px; overflow: hidden; border: 1px solid #222; cursor: pointer; transition: 0.3s; }
        .standard-post:hover { transform: translateY(-5px); border-color: var(--primary-blue); }
        .post-img-box { height: 240px; background: #000; }
        .post-img-box img { width: 100%; height: 100%; object-fit: cover; }
        .post-content { padding: 25px; }

        /* --- ARTICLE VIEW --- */
        .article-view { background: var(--card-dark); padding: 50px; border-radius: 15px; grid-column: span 2; max-width: 1000px; margin: 0 auto; }
        .article-body { font-size: 19px; line-height: 1.9; color: #ddd; white-space: pre-wrap; margin: 30px 0; }
        .article-gallery { display: grid; grid-template-columns: 1fr; gap: 30px; }
        .article-gallery img { width: 100%; border-radius: 10px; }

        /* --- ADMIN --- */
        .admin-box { background: var(--card-dark); padding: 40px; border-radius: 15px; grid-column: span 2; }
        input, textarea { width: 100%; padding: 15px; background: #222; border: 1px solid #333; color: #fff; border-radius: 8px; margin-bottom: 15px; }
        .btn { padding: 15px 30px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-blue { background: var(--primary-blue); color: #fff; width: 100%; }

        .hidden { display: none !important; }
        #toast { position: fixed; bottom: 30px; right: 30px; padding: 15px 30px; background: var(--primary-blue); border-radius: 10px; display: none; z-index: 10000; font-weight: bold; }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><p>Wysyłanie danych do chmury Firebase...</p></div>
<div id="toast">Sukces! Dane zapisane.</div>

<header>
    <div class="header-top">
        <div class="logo" onclick="showView('home')">Ełk <span>Nasze Eventy</span></div>
        <button class="btn" style="background:var(--primary-blue); color:white" onclick="checkAuth()">Panel Redakcji</button>
    </div>
    <nav>
        <div class="nav-container">
            <div class="nav-link" onclick="showView('home')">Wiadomości</div>
            <div class="nav-link" onclick="showView('links-page')">Eventy & Linki</div>
        </div>
    </nav>
</header>

<div class="container">
    
    <div id="view-home" style="display:contents">
        <main><div class="news-section" id="news-grid"></div></main>
        <aside>
            <h3 style="border-bottom: 2px solid var(--primary-blue); padding-bottom:10px; margin-bottom:20px">PRZYDATNE LINKI</h3>
            <div id="sidebar-links"></div>
        </aside>
    </div>

    <div id="view-article" class="hidden" style="grid-column: span 2;">
        <button class="btn" style="background:#333; color:white; margin-bottom:20px" onclick="showView('home')">← Powrót</button>
        <div class="article-view" id="full-article-content"></div>
    </div>

    <div id="view-links-page" class="hidden" style="grid-column: span 2;">
        <h2>Wszystkie odnośniki</h2>
        <div id="full-links-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top:30px"></div>
    </div>

    <div id="view-login" class="hidden" style="grid-column: span 2;">
        <div style="max-width: 400px; margin: 100px auto; background: var(--card-dark); padding: 50px; border-radius: 20px; text-align: center;">
            <i class="fas fa-lock fa-3x" style="color:var(--primary-blue); margin-bottom:20px"></i>
            <h2>Autoryzacja</h2>
            <input type="password" id="admin-pass" style="margin-top:20px; text-align:center" placeholder="Hasło...">
            <button class="btn btn-blue" onclick="doLogin()">Zaloguj</button>
        </div>
    </div>

    <div id="view-admin" class="hidden" style="grid-column: span 2;">
        <div class="admin-box">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px">
                <h2 id="admin-form-title">Dodaj Nowy Artykuł</h2>
                <button class="btn" style="background:var(--danger); color:white" onclick="logout()">Wyloguj</button>
            </div>

            <input type="hidden" id="edit-id">
            <input type="text" id="post-title" placeholder="Tytuł artykułu">
            <input type="text" id="post-author" placeholder="Autor">
            <textarea id="post-content" rows="10" placeholder="Pełna treść..."></textarea>
            <label>Zdjęcia (dowolna ilość, Firebase Storage):</label>
            <input type="file" id="post-imgs" multiple accept="image/*" style="margin-top:10px">
            
            <button class="btn btn-blue" onclick="savePost()">OPUBLIKUJ W CHMURZE</button>

            <hr style="margin: 50px 0; border-color: #333;">
            
            <h3>Zarządzaj Linkami</h3>
            <div style="display:flex; gap:10px; margin-top:20px">
                <input type="text" id="link-name" placeholder="Nazwa">
                <input type="text" id="link-url" placeholder="URL">
                <button class="btn btn-blue" onclick="saveLink()" style="width:200px">DODAJ</button>
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:40px; margin-top:40px">
                <div><h4>Lista Postów</h4><div id="admin-posts-list"></div></div>
                <div><h4>Lista Linków</h4><div id="admin-links-list"></div></div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- KONFIGURACJA FIREBASE (Wklej tutaj swoje dane z konsoli Firebase) ---
    const firebaseConfig = {
        apiKey: "TWOJE_API_KEY",
        authDomain: "mzk-by-facio.firebaseapp.com",
        databaseURL: "https://mzk-by-facio-default-rtdb.firebaseio.com",
        projectId: "mzk-by-facio",
        storageBucket: "mzk-by-facio.appspot.com",
        messagingSenderId: "SENDER_ID",
        appId: "APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const storage = firebase.storage();
    const rootPath = "v42"; // Ścieżka, o którą prosiłeś

    // --- LOGIKA WIDOKÓW ---
    function showView(v) {
        document.querySelectorAll('.container > div').forEach(el => el.classList.add('hidden'));
        document.getElementById('view-'+v).classList.remove('hidden');
        window.scrollTo(0,0);
    }

    function checkAuth() { sessionStorage.getItem('logged') ? showView('admin') : showView('login'); }
    function doLogin() {
        if(document.getElementById('admin-pass').value === 'diax67') {
            sessionStorage.setItem('logged', 'true');
            showView('admin');
        } else alert('Hasło niepoprawne!');
    }
    function logout() { sessionStorage.clear(); location.reload(); }

    // --- OBSŁUGA POSTÓW (FIREBASE) ---
    async function savePost() {
        const id = document.getElementById('edit-id').value;
        const title = document.getElementById('post-title').value;
        const author = document.getElementById('post-author').value;
        const content = document.getElementById('post-content').value;
        const files = document.getElementById('post-imgs').files;

        if(!title || !content) return alert("Wypełnij dane!");
        document.getElementById('loader').style.display = 'flex';

        let imageUrls = [];
        // Jeśli są nowe pliki, wrzuć je do Storage
        if(files.length > 0) {
            for(let i=0; i < files.length; i++) {
                const file = files[i];
                const ref = storage.ref(`${rootPath}/images/${Date.now()}_${file.name}`);
                await ref.put(file);
                const url = await ref.getDownloadURL();
                imageUrls.push(url);
            }
        } else if(id) {
            // Przy edycji bez nowych zdjęć zachowaj stare (logika uproszczona)
        }

        const postData = {
            title, author, content,
            images: imageUrls,
            date: new Date().toLocaleString('pl-PL'),
            timestamp: Date.now()
        };

        if(id) {
            await db.ref(`${rootPath}/posts/${id}`).update(postData);
        } else {
            await db.ref(`${rootPath}/posts`).push(postData);
        }

        document.getElementById('loader').style.display = 'none';
        showToast();
        location.reload(); // Najbezpieczniejszy refresh przy Firebase
    }

    // --- RENDEROWANIE (REAL-TIME) ---
    db.ref(`${rootPath}/posts`).on('value', (snapshot) => {
        const posts = [];
        snapshot.forEach(child => { posts.push({id: child.key, ...child.val()}); });
        posts.sort((a,b) => b.timestamp - a.timestamp);
        
        const grid = document.getElementById('news-grid');
        const adminList = document.getElementById('admin-posts-list');
        grid.innerHTML = ""; adminList.innerHTML = "";

        posts.forEach((p, idx) => {
            const snippet = p.content.substring(0, 150) + "...";
            const img = p.images && p.images[0] ? p.images[0] : 'https://via.placeholder.com/600x400?text=Brak+Zdjecia';
            
            if(idx === 0) {
                grid.innerHTML += `
                    <div class="featured-post" onclick="openArticle('${p.id}')">
                        <img src="${img}">
                        <div class="featured-overlay">
                            <h2 style="font-size:36px">${p.title}</h2>
                            <p style="color:var(--accent-yellow)">Czytaj więcej...</p>
                        </div>
                    </div>`;
            } else {
                grid.innerHTML += `
                    <div class="standard-post" onclick="openArticle('${p.id}')">
                        <div class="post-img-box"><img src="${img}"></div>
                        <div class="post-content">
                            <h3>${p.title}</h3>
                            <p style="font-size:14px; color:#888; margin:10px 0">${snippet}</p>
                            <small>${p.date}</small>
                        </div>
                    </div>`;
            }
            adminList.innerHTML += `
                <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #333">
                    <span style="font-size:12px">${p.title}</span>
                    <button class="btn" style="padding:5px; background:var(--danger); color:white" onclick="deletePost('${p.id}')">Usuń</button>
                </div>`;
        });
    });

    async function openArticle(id) {
        const snap = await db.ref(`${rootPath}/posts/${id}`).once('value');
        const post = snap.val();
        const area = document.getElementById('full-article-content');
        let gal = (post.images || []).map(img => `<img src="${img}">`).join('');
        
        area.innerHTML = `
            <h1 style="font-size:48px; line-height:1.1">${post.title}</h1>
            <p style="margin:20px 0; color:var(--accent-yellow)">Autor: ${post.author} | ${post.date}</p>
            <div class="article-body">${post.content}</div>
            <div class="article-gallery">${gal}</div>
        `;
        showView('article');
    }

    // --- LINKI (REAL-TIME) ---
    function saveLink() {
        const name = document.getElementById('link-name').value;
        const url = document.getElementById('link-url').value;
        if(name && url) db.ref(`${rootPath}/links`).push({ name, url });
    }

    db.ref(`${rootPath}/links`).on('value', (snap) => {
        const side = document.getElementById('sidebar-links');
        const full = document.getElementById('full-links-list');
        const admin = document.getElementById('admin-links-list');
        side.innerHTML = ""; full.innerHTML = ""; admin.innerHTML = "";
        
        snap.forEach(child => {
            const l = child.val();
            const html = `<a href="${l.url}" target="_blank" style="display:flex; align-items:center; gap:10px; background:#1a1a1a; padding:15px; border-radius:8px; margin-bottom:10px; text-decoration:none; color:white"><i class="fas fa-link" style="color:var(--primary-blue)"></i>${l.name}</a>`;
            side.innerHTML += html;
            full.innerHTML += html;
            admin.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:5px"><span>${l.name}</span><button onclick="deleteLink('${child.key}')">X</button></div>`;
        });
    });

    // --- USUWANIE ---
    function deletePost(id) { if(confirm("Usunąć post?")) db.ref(`${rootPath}/posts/${id}`).remove(); }
    function deleteLink(id) { db.ref(`${rootPath}/links/${id}`).remove(); }

    function showToast() { const t = document.getElementById('toast'); t.style.display='block'; setTimeout(()=>t.style.display='none', 3000); }
</script>

</body>
</html>

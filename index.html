<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ełk Nasze Wiadomości</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>

    <style>
        :root { --main: #0062ff; }
        body { background: #0b0f1a; color: white; font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .glass { background: rgba(22, 28, 45, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .card { transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.05); }
        .card:hover { transform: translateY(-5px); border-color: var(--main); }
        .input-dark { background: #161c2d; border: 2px solid #2d3748; border-radius: 12px; padding: 12px; width: 100%; color: white; outline: none; transition: 0.3s; }
        .input-dark:focus { border-color: var(--main); box-shadow: 0 0 15px rgba(0,98,255,0.2); }
        .white-pre { white-space: pre-wrap; word-wrap: break-word; }
        #loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; }
        .post-anim { animation: fadeInUp 0.4s ease forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .author-badge { font-weight: 900; color: #3b82f6; padding: 0.25rem 0.75rem; background: rgba(59, 130, 246, 0.1); border-radius: 9999px; font-size: 10px; }
        .category-tag { font-size: 9px; font-weight: 900; text-transform: uppercase; padding: 2px 8px; border-radius: 4px; background: rgba(255,255,255,0.1); color: #cbd5e1; }
        .like-btn.liked { color: #ef4444; background: rgba(239, 68, 68, 0.1); }
        .comment-item { border-left: 2px solid var(--main); background: rgba(255,255,255,0.02); padding: 10px 15px; border-radius: 0 12px 12px 0; margin-bottom: 10px; position: relative; }
        .del-comm-btn { position: absolute; right: 10px; top: 10px; color: #ef4444; font-size: 10px; font-weight: 900; border: 1px solid rgba(239, 68, 68, 0.2); padding: 2px 8px; border-radius: 5px; display: none; }
        body.admin-active .del-comm-btn { display: block; }
        .ad-box { width: 100%; height: 500px; background: #161c2d; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; overflow: hidden; display: none; }
        .ad-box.active { display: block; }
        .ad-box img { width: 100%; height: 100%; object-fit: cover; }
        .toast { position: fixed; top: 80px; right: 20px; background: #1e293b; border-left: 4px solid var(--main); color: white; padding: 15px 25px; border-radius: 8px; transform: translateX(120%); transition: 0.5s; z-index: 1000; }
        .toast.show { transform: translateX(0); }
    </style>
</head>
<body id="main-body">

    <div id="auth-overlay" class="fixed inset-0 bg-[#0b0f1a] z-[100] flex flex-col items-center justify-center text-center p-6">
        <h1 class="text-4xl font-black italic mb-2 uppercase text-white">EŁK <span class="text-blue-500">NASZE</span> WIADOMOŚCI</h1>
        <p class="text-slate-400 mb-8 text-sm">Zaloguj się kontem Google, aby przeglądać i komentować.</p>
        <button onclick="core.login()" class="bg-white text-black px-8 py-4 rounded-full font-black uppercase text-sm tracking-widest flex items-center gap-3 hover:bg-blue-500 hover:text-white transition shadow-xl">
            <i class="fa-brands fa-google"></i> Zaloguj przez Google
        </button>
    </div>

    <div id="toast-container"></div>
    <div id="loader"><div class="animate-spin text-4xl text-blue-500"><i class="fa-solid fa-circle-notch"></i></div></div>

    <header class="sticky top-0 z-50 glass border-b border-white/5 mb-8 hidden" id="main-header">
        <div class="max-w-6xl mx-auto px-4 h-16 flex justify-between items-center">
            <h1 onclick="core.goHome()" class="text-xl font-black italic cursor-pointer uppercase">EŁK <span class="text-blue-500">NASZE</span> WIADOMOŚCI</h1>
            <div class="flex items-center gap-4">
                <button onclick="core.logout()" class="text-[10px] font-bold uppercase text-red-500 hover:text-red-400 transition">Wyloguj</button>
                <span id="admin-indicator" class="hidden text-[9px] bg-green-500/20 text-green-500 px-2 py-1 rounded-md font-black uppercase tracking-tighter">Admin</span>
                <button id="btn-open-admin" onclick="core.openAdmin()" class="hidden text-[10px] font-bold uppercase tracking-widest text-blue-400 hover:text-blue-300 transition">Panel</button>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 min-h-screen hidden" id="main-content">
        <div id="search-area" class="mb-8 space-y-6">
            <input type="text" id="search-input" oninput="core.filterPosts()" placeholder="Szukaj wiadomości..." class="input-dark">
            <div class="flex flex-wrap gap-2 items-center border-b border-white/5 pb-4">
                <button onclick="core.switchTab('all', this)" class="tab-btn active">Wszystkie</button>
                <button onclick="core.switchTab('Wydarzenia', this)" class="tab-btn">Wydarzenia</button>
                <button onclick="core.switchTab('Aktualizacje', this)" class="tab-btn">Aktualizacje</button>
                <button onclick="core.switchTab('Informacje', this)" class="tab-btn">Informacje</button>
            </div>
        </div>

        <div id="view-home">
            <div id="news-container" class="space-y-4"></div>
        </div>

        <div id="view-article" class="hidden pb-20">
            <button onclick="core.goHome()" class="mb-8 text-slate-400 font-bold uppercase text-xs tracking-widest">Wstecz</button>
            <div id="article-content"></div>
            <div class="mt-12 pt-12 border-t border-white/10">
                <div id="main-like-btn" onclick="core.likePost()" class="like-btn flex items-center gap-2 bg-white/5 px-6 py-3 rounded-full w-max cursor-pointer">
                    <i class="fa-solid fa-heart text-xl"></i> <span id="like-count" class="font-black">0</span>
                </div>
                <h3 class="text-xl font-black uppercase italic my-6">Komentarze</h3>
                <div id="comments-list" class="space-y-4"></div>
                <div class="glass p-6 rounded-[24px] mt-8 space-y-4">
                    <input type="text" id="comm-nick" placeholder="Twój nick" class="input-dark">
                    <textarea id="comm-text" rows="3" placeholder="Treść komentarza..." class="input-dark"></textarea>
                    <button onclick="core.addComment()" class="bg-blue-600 w-full p-4 rounded-xl font-bold uppercase tracking-widest hover:bg-blue-500 transition">Wyślij</button>
                </div>
            </div>
        </div>

        <div id="view-admin" class="hidden pb-20">
            <button onclick="core.goHome()" class="mb-6 text-blue-500 font-bold uppercase text-xs tracking-widest">Powrót</button>
            <div class="glass p-8 rounded-[30px] space-y-4">
                <h2 class="text-xl font-bold uppercase">Nowy Wpis</h2>
                <input type="text" id="in-title" placeholder="Tytuł" class="input-dark">
                <input type="text" id="in-author" placeholder="Autor" class="input-dark">
                <textarea id="in-content" rows="6" placeholder="Treść (Markdown)..." class="input-dark"></textarea>
                <input type="file" id="in-files" multiple accept="image/*" class="text-xs">
                <button onclick="core.publish()" class="bg-blue-600 w-full p-4 rounded-xl font-bold uppercase tracking-widest">Opublikuj</button>
            </div>
            <div id="admin-list" class="mt-10 space-y-2"></div>
        </div>
    </main>

    <script>
        // ======= TWOJE DANE KONFIGURACYJNE =======
        const firebaseConfig = {
            apiKey: "AIzaSyCb5QmZdwWwa9LafqqGZvGW-6vblkab32M", 
            authDomain: "mzk-by-facio.firebaseapp.com",
            databaseURL: "https://mzk-by-facio-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mzk-by-facio",
            appId: "1:676970411647:web:76137e7242c8db7c83714a"
        };
        const ADMIN_UID = "wXo2D56goYaId2IY7iUkcWs5tAG3"; 
        const IMGBB_API_KEY = "19570ba1fa4dc27bd0ba974b4eb2e253";

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        const postsRef = db.ref('elk/posts');
        const commentsRef = db.ref('elk/comments');

        let allData = [];
        let currentOpenPostId = null;

        window.core = {
            login: () => {
                const provider = new firebase.auth.GoogleAuthProvider();
                auth.signInWithRedirect(provider);
            },
            logout: () => auth.signOut().then(() => location.reload()),
            checkAuth: () => {
                auth.onAuthStateChanged(user => {
                    if (user) {
                        document.getElementById('auth-overlay').classList.add('hidden');
                        document.getElementById('main-header').classList.remove('hidden');
                        document.getElementById('main-content').classList.remove('hidden');
                        document.getElementById('main-footer').classList.remove('hidden');
                        if(user.uid === ADMIN_UID) {
                            document.getElementById('admin-indicator').classList.remove('hidden');
                            document.getElementById('btn-open-admin').classList.remove('hidden');
                            document.getElementById('main-body').classList.add('admin-active');
                        }
                        core.loadData();
                    }
                });
            },
            loadData: () => {
                postsRef.on('value', snap => {
                    const data = snap.val(); allData = [];
                    const adminList = document.getElementById('admin-list'); if(adminList) adminList.innerHTML = "";
                    if(data) {
                        Object.entries(data).sort((a,b) => b[1].ts - a[1].ts).forEach(([id, v]) => {
                            allData.push({ id, ...v });
                            if(adminList) adminList.innerHTML += `<div class="bg-white/5 p-2 flex justify-between"><span>${v.title}</span><button onclick="core.deletePost('${id}')" class="text-red-500">Usuń</button></div>`;
                        });
                    }
                    core.filterPosts();
                });
            },
            goHome: () => {
                document.getElementById('view-home').classList.remove('hidden');
                document.getElementById('view-article').classList.add('hidden');
                document.getElementById('view-admin').classList.add('hidden');
                window.scrollTo(0,0);
            },
            openAdmin: () => {
                document.getElementById('view-home').classList.add('hidden');
                document.getElementById('view-admin').classList.remove('hidden');
            },
            publish: async () => {
                const t = document.getElementById('in-title').value;
                const c = document.getElementById('in-content').value;
                const a = document.getElementById('in-author').value || "Redakcja";
                const files = document.getElementById('in-files').files;
                if(!t || !c) return alert("Pola!");
                document.getElementById('loader').style.display = 'flex';
                let urls = [];
                for(let f of files) {
                    const fd = new FormData(); fd.append("image", f);
                    const r = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: fd });
                    const d = await r.json(); if(d.success) urls.push(d.data.url);
                }
                postsRef.push({ title: t, content: c, author: a, images: urls, ts: Date.now(), likes: 0, date: new Date().toLocaleString() });
                document.getElementById('loader').style.display = 'none';
                core.goHome();
            },
            deletePost: (id) => confirm("Usunąć?") && postsRef.child(id).remove(),
            filterPosts: () => {
                const term = document.getElementById('search-input').value.toLowerCase();
                const items = allData.filter(p => p.title.toLowerCase().includes(term));
                const container = document.getElementById('news-container'); container.innerHTML = "";
                items.forEach(v => {
                    const card = document.createElement('div'); card.className = "card glass p-6 rounded-2xl cursor-pointer post-anim";
                    card.innerHTML = `<h2 class="font-black text-xl">${DOMPurify.sanitize(v.title)}</h2><p class="text-xs opacity-50 mt-2">${v.author} | ${v.date}</p>`;
                    card.onclick = () => core.showFull(v);
                    container.appendChild(card);
                });
            },
            showFull: (v) => {
                currentOpenPostId = v.id;
                document.getElementById('view-home').classList.add('hidden');
                document.getElementById('view-article').classList.remove('hidden');
                document.getElementById('article-content').innerHTML = `<h1 class="text-3xl font-black mb-4">${DOMPurify.sanitize(v.title)}</h1><p class="text-slate-400 mb-8">${v.content}</p>${(v.images||[]).map(i=>`<img src="${i}" class="mb-4 rounded-xl">`).join('')}`;
                document.getElementById('like-count').innerText = v.likes || 0;
                core.loadComments(v.id);
                window.scrollTo(0,0);
            },
            loadComments: (id) => {
                db.ref(`elk/comments/${id}`).on('value', snap => {
                    const list = document.getElementById('comments-list'); list.innerHTML = "";
                    if(snap.val()) {
                        Object.entries(snap.val()).forEach(([cid, c]) => {
                            list.innerHTML += `<div class="comment-item"><span class="font-bold text-blue-400">${DOMPurify.sanitize(c.nick)}</span><p class="text-sm">${DOMPurify.sanitize(c.text)}</p></div>`;
                        });
                    }
                });
            },
            addComment: () => {
                const n = document.getElementById('comm-nick').value;
                const t = document.getElementById('comm-text').value;
                if(!n || !t) return alert("Pola!");
                db.ref(`elk/comments/${currentOpenPostId}`).push({ nick: n, text: t, ts: Date.now() });
                document.getElementById('comm-text').value = "";
            },
            likePost: () => {
                const p = allData.find(x => x.id === currentOpenPostId);
                postsRef.child(currentOpenPostId).update({ likes: (p.likes || 0) + 1 });
            }
        };

        core.checkAuth();
    </script>
</body>
</html>

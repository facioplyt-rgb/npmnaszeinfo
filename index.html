<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ełk Nasze Eventy</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --main: #0062ff; }
        body { background: #0b0f1a; color: white; font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .glass { background: rgba(22, 28, 45, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .card { transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.05); }
        .card:hover { transform: translateY(-5px); border-color: var(--main); }
        .input-dark { background: #161c2d; border: 2px solid #2d3748; border-radius: 12px; padding: 12px; width: 100%; color: white; outline: none; transition: 0.3s; }
        .input-dark:focus { border-color: var(--main); box-shadow: 0 0 15px rgba(0,98,255,0.2); }
        
        .white-pre { white-space: pre-wrap; word-wrap: break-word; }
        #loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .post-anim { animation: fadeInUp 0.4s ease forwards; }

        .author-badge { font-weight: 900; color: #3b82f6; padding: 0.25rem 0.75rem; background: rgba(59, 130, 246, 0.1); border-radius: 9999px; font-size: 10px; }
        
        .md-h1 { font-size: 2.25rem; font-weight: 900; display: block; margin: 1rem 0; color: white; line-height: 1.2; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }
        .md-h3 { font-size: 1.5rem; font-weight: 700; display: block; margin: 0.75rem 0; color: #cbd5e1; }
        .md-small { font-size: 0.85rem; opacity: 0.7; display: block; line-height: 1.4; color: #94a3b8; }
        .md-u { text-decoration: underline; text-underline-offset: 3px; }

        .tab-btn { padding: 10px 20px; font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; border-radius: 12px; cursor: pointer; transition: 0.3s; border: 1px solid rgba(255,255,255,0.05); color: #64748b; }
        .tab-btn.active { background: var(--main); color: white; border-color: var(--main); box-shadow: 0 4px 15px rgba(0,98,255,0.3); }
        .tab-btn:hover:not(.active) { background: rgba(255,255,255,0.05); color: white; }

        .category-tag { font-size: 9px; font-weight: 900; text-transform: uppercase; padding: 2px 8px; border-radius: 4px; background: rgba(255,255,255,0.1); color: #cbd5e1; }
        
        .like-btn { transition: 0.3s; cursor: pointer; color: #64748b; }
        .like-btn:active { transform: scale(1.4); }
        .like-btn.liked { color: #ef4444; background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.2); }
        
        .comment-item { border-left: 2px solid var(--main); background: rgba(255,255,255,0.02); padding: 10px 15px; border-radius: 0 12px 12px 0; margin-bottom: 10px; position: relative; }
        
        .del-comm-btn { position: absolute; right: 10px; top: 10px; color: #ef4444; font-size: 10px; font-weight: 900; text-transform: uppercase; border: 1px solid rgba(239, 68, 68, 0.2); padding: 2px 8px; border-radius: 5px; display: none; cursor: pointer; }
        body.admin-active .del-comm-btn { display: block; }
        
        .report-btn { font-size: 9px; font-weight: 900; color: #ef4444; text-transform: uppercase; cursor: pointer; opacity: 0.6; margin-left: auto; }
        .report-btn:hover { opacity: 1; }

        .reply-btn { font-size: 9px; font-weight: 900; color: var(--main); text-transform: uppercase; cursor: pointer; opacity: 0.6; }
        .reply-btn:hover { opacity: 1; }
        .comm-react-btn { font-size: 10px; font-weight: 700; display: flex; align-items: center; gap: 4px; background: rgba(255,255,255,0.05); padding: 2px 8px; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        .comm-react-btn:hover { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
        .comm-react-btn.liked { color: #ef4444; background: rgba(239, 68, 68, 0.1); }

        .replies-container { margin-left: 20px; border-left: 1px dashed rgba(255,255,255,0.1); padding-left: 15px; margin-top: 10px; display: none; }
        .reply-item { background: rgba(255,255,255,0.01); padding: 8px 12px; border-radius: 8px; margin-bottom: 5px; font-size: 13px; border: 1px solid rgba(255,255,255,0.02); position: relative; }
        .toggle-replies { font-size: 9px; font-weight: 800; color: #64748b; cursor: pointer; text-transform: uppercase; margin-top: 5px; display: inline-block; }
        .toggle-replies:hover { color: white; }

        .notif-badge { background: #ef4444; color: white; font-size: 10px; padding: 2px 6px; border-radius: 50px; margin-left: 5px; font-weight: 900; }
        .notif-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); padding: 12px; border-radius: 12px; margin-bottom: 10px; }
        .report-highlight { background: rgba(239, 68, 68, 0.05); border-color: rgba(239, 68, 68, 0.1); }

        /* NOWE STYLE DLA PODGLĄDU */
        .preview-wrapper { position: relative; width: 60px; height: 60px; }
        .preview-wrapper img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
        .preview-del { position: absolute; -top: 5px; -right: 5px; background: red; color: white; width: 15px; height: 15px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; }
    </style>
</head>
<body id="main-body">

    <div id="loader">
        <div class="animate-spin text-4xl text-blue-500"><i class="fa-solid fa-circle-notch"></i></div>
    </div>

    <header class="sticky top-0 z-50 glass border-b border-white/5 mb-8">
        <div class="max-w-6xl mx-auto px-4 h-16 flex justify-between items-center">
            <h1 onclick="core.goHome()" class="text-xl font-black italic cursor-pointer uppercase">
                EŁK <span class="text-blue-500">NASZE</span> EVENTY
            </h1>
            <div class="flex items-center gap-4">
                <span id="admin-indicator" class="hidden text-[9px] bg-green-500/20 text-green-500 px-2 py-1 rounded-md font-black uppercase tracking-tighter">Tryb Admina</span>
                <button onclick="core.openAdmin()" class="text-[10px] font-bold uppercase tracking-widest opacity-40 hover:opacity-100 transition">
                    Panel Redakcji
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4">
        
        <div id="search-area" class="mb-8 space-y-6">
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                <input type="text" id="search-input" oninput="core.filterPosts()" placeholder="Szukaj wydarzenia..." class="input-dark pl-12">
            </div>

            <div class="flex flex-wrap gap-2 items-center border-b border-white/5 pb-4">
                <button onclick="core.switchTab('all', this)" class="tab-btn active">Wszystkie</button>
                <button onclick="core.switchTab('Wydarzenia', this)" class="tab-btn">Wydarzenia</button>
                <button onclick="core.switchTab('Aktualizacje', this)" class="tab-btn">Aktualizacje</button>
                <button onclick="core.switchTab('Informacje', this)" class="tab-btn">Informacje</button>
            </div>
        </div>

        <div id="view-home" class="pb-20">
            <div id="news-container" class="space-y-4">
                <div class="text-center py-20 text-slate-600 italic tracking-widest uppercase text-xs">Wczytywanie bazy...</div>
            </div>
            <div id="more-container" class="mt-8 hidden flex justify-center">
                <button onclick="core.showAllPosts()" class="px-8 py-3 bg-slate-800 hover:bg-slate-700 rounded-full font-bold text-sm transition border border-white/5 uppercase tracking-tighter">
                    Pokaż wszystkie pozostałe
                </button>
            </div>
        </div>

        <div id="view-article" class="hidden pb-20">
            <button onclick="core.goHome()" class="mb-8 text-slate-400 font-bold flex items-center gap-2 hover:text-white transition uppercase text-xs tracking-widest">
                <i class="fa-solid fa-arrow-left"></i> Wstecz
            </button>
            <div id="article-content"></div>
            
            <div id="article-interaction" class="mt-12 pt-12 border-t border-white/10">
                <div class="flex items-center gap-6 mb-10">
                    <div id="main-like-btn" onclick="core.likePost()" class="like-btn flex items-center gap-2 bg-white/5 px-6 py-3 rounded-full border border-white/5 transition">
                        <i class="fa-solid fa-heart text-xl"></i>
                        <span id="like-count" class="font-black">0</span>
                    </div>
                </div>

                <h3 class="text-xl font-black uppercase italic mb-6">Komentarze</h3>
                <div id="comments-list" class="space-y-4 mb-8"></div>
                
                <div id="comment-box-anchor" class="glass p-6 rounded-[24px] space-y-4 border border-blue-500/20">
                    <div id="replying-to-info" class="hidden flex justify-between items-center bg-blue-500/10 p-2 rounded-lg border border-blue-500/20">
                        <span class="text-[10px] font-bold uppercase">Odpowiadasz użytkownikowi: <span id="target-nick" class="text-blue-400"></span></span>
                        <button onclick="core.cancelReply()" class="text-red-500 text-[10px] font-black uppercase">Anuluj</button>
                    </div>
                    <input type="text" id="comm-nick" placeholder="Twój Nick" class="input-dark">
                    <textarea id="comm-text" rows="3" placeholder="Napisz co o tym sądzisz..." class="input-dark"></textarea>
                    <button onclick="core.addComment()" class="bg-blue-600 w-full p-4 rounded-xl font-bold uppercase tracking-widest hover:bg-blue-500 transition shadow-lg shadow-blue-500/20">Wyślij</button>
                </div>
            </div>
        </div>

        <div id="view-admin" class="hidden pb-20">
            <div class="flex flex-wrap gap-4 mb-8">
                <button onclick="core.setAdminTab('new')" id="btn-adm-new" class="tab-btn active">Wpisy</button>
                <button onclick="core.setAdminTab('comms')" id="btn-adm-comms" class="tab-btn">Komentarze</button>
                <button onclick="core.setAdminTab('notifs')" id="btn-adm-notifs" class="tab-btn">Zgłoszenia <span id="notif-count" class="hidden notif-badge">0</span></button>
            </div>

            <div id="admin-new-section" class="max-w-xl mx-auto glass p-8 rounded-[30px] shadow-2xl">
                <div class="flex justify-between items-center mb-6">
                    <h2 id="admin-mode-title" class="text-xl font-bold italic uppercase tracking-tighter">Nowy Wpis</h2>
                    <button onclick="core.cancelEdit()" id="cancel-edit-btn" class="hidden text-red-500 text-[10px] font-bold uppercase border border-red-500/30 px-3 py-1 rounded-full">Anuluj</button>
                </div>
                <div class="space-y-4">
                    <input type="text" id="in-title" placeholder="Tytuł wydarzenia" class="input-dark">
                    <input type="text" id="in-author" placeholder="Autor" class="input-dark">
                    <div class="grid grid-cols-2 gap-4">
                        <select id="in-category" class="input-dark bg-slate-900">
                            <option value="Wydarzenia">Wydarzenia</option>
                            <option value="Aktualizacje">Aktualizacje</option>
                            <option value="Informacje">Informacje</option>
                        </select>
                        <input type="text" id="in-date" placeholder="Data (puste = dziś)" class="input-dark text-xs">
                    </div>
                    <textarea id="in-content" rows="10" placeholder="Treść..." class="input-dark"></textarea>
                    
                    <div class="p-4 bg-white/5 rounded-xl border border-white/10">
                        <input type="file" id="in-files" onchange="core.previewNewFiles()" multiple accept="image/*" class="text-xs mb-3">
                        <div id="edit-images-preview" class="flex flex-wrap gap-2"></div>
                    </div>

                    <button onclick="core.publish()" id="publish-btn" class="w-full bg-blue-600 p-4 rounded-xl font-bold uppercase tracking-widest">Opublikuj</button>
                    <div id="admin-list" class="mt-10 space-y-2"></div>
                </div>
            </div>

            <div id="admin-comms-section" class="hidden max-w-2xl mx-auto space-y-4">
                <h2 class="text-xl font-bold italic uppercase tracking-tighter mb-6">Ostatnie Komentarze</h2>
                <div id="all-comms-list"></div>
            </div>

            <div id="admin-notifs-section" class="hidden max-w-2xl mx-auto space-y-4">
                <h2 class="text-xl font-bold italic uppercase tracking-tighter mb-6 text-red-500">Zgłoszenia</h2>
                <div id="reports-list"></div>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSy...", 
            authDomain: "mzk-by-facio.firebaseapp.com",
            databaseURL: "https://mzk-by-facio-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mzk-by-facio",
            appId: "1:676970411647:web:5703d5fb5fb499ff83714a"
        };

        const IMGBB_API_KEY = "19570ba1fa4dc27bd0ba974b4eb2e253";
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const postsRef = db.ref('elk/posts');
        const reportsRef = db.ref('elk/reports');
        const commentsRootRef = db.ref('elk/comments');

        const DEFAULT_PASS = "1234";

        let allData = [];
        let showLimit = 3;
        let editId = null;
        let currentOpenPostId = null;
        let currentReplyToId = null;
        let currentEditImages = [];
        let currentTab = 'all';

        window.core = {
            parseMarkdown: (text) => {
                if(!text) return "";
                let html = text;
                html = html.replace(/^#\s+(.*)$/gm, '<span class="md-h1">$1</span>').replace(/^###\s+(.*)$/gm, '<span class="md-h3">$1</span>').replace(/^-#\s+(.*)$/gm, '<span class="md-small">$1</span>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/__(.*?)__/g, '<span class="md-u">$1</span>').replace(/\*(.*?)\*/g, '<em>$1</em>');
                return html;
            },

            // --- NAPRAWIONA FUNKCJA PODGLĄDU ---
            previewNewFiles: () => {
                const files = document.getElementById('in-files').files;
                const container = document.getElementById('edit-images-preview');
                // Nie czyścimy całości, tylko renderujemy od nowa serwerowe + nowe
                core.renderEditImages(files);
            },

            switchTab: (tabId, btn) => {
                currentTab = tabId;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                core.filterPosts();
            },

            setAdminTab: (tab) => {
                document.getElementById('admin-new-section').classList.toggle('hidden', tab !== 'new');
                document.getElementById('admin-comms-section').classList.toggle('hidden', tab !== 'comms');
                document.getElementById('admin-notifs-section').classList.toggle('hidden', tab !== 'notifs');
                document.querySelectorAll('#view-admin .tab-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(`btn-adm-${tab}`).classList.add('active');
                if(tab === 'comms') core.loadAllCommentsAdmin();
            },

            goHome: () => {
                document.getElementById('view-home').classList.remove('hidden');
                document.getElementById('search-area').classList.remove('hidden');
                document.getElementById('view-article').classList.add('hidden');
                document.getElementById('view-admin').classList.add('hidden');
                core.cancelEdit(); core.cancelReply();
                currentOpenPostId = null; window.scrollTo(0,0);
            },

            openAdmin: () => {
                const pin = prompt("HASŁO:");
                if(pin === DEFAULT_PASS) {
                    document.getElementById('main-body').classList.add('admin-active');
                    document.getElementById('admin-indicator').classList.remove('hidden');
                    document.getElementById('view-home').classList.add('hidden');
                    document.getElementById('search-area').classList.add('hidden');
                    document.getElementById('view-admin').classList.remove('hidden');
                    core.loadReports();
                } else { alert("Błąd!"); }
            },

            removeImageFromEdit: (index) => {
                currentEditImages.splice(index, 1);
                core.renderEditImages(document.getElementById('in-files').files);
            },

            renderEditImages: (newFiles = []) => {
                const container = document.getElementById('edit-images-preview');
                container.innerHTML = "";
                
                // Pokaż zdjęcia z serwera
                currentEditImages.forEach((url, index) => {
                    container.innerHTML += `
                        <div class="preview-wrapper">
                            <img src="${url}">
                            <div class="preview-del" onclick="core.removeImageFromEdit(${index})">x</div>
                        </div>`;
                });

                // Pokaż podgląd plików lokalnych
                Array.from(newFiles).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const div = document.createElement('div');
                        div.className = "preview-wrapper opacity-50";
                        div.innerHTML = `<img src="${e.target.result}"><div class="absolute bottom-0 left-0 bg-blue-500 text-[8px] px-1 font-bold">LOKALNE</div>`;
                        container.appendChild(div);
                    };
                    reader.readAsDataURL(file);
                });
            },

            publish: async () => {
                const t = document.getElementById('in-title').value;
                const c = document.getElementById('in-content').value;
                const cat = document.getElementById('in-category').value;
                const a = document.getElementById('in-author').value || "Redakcja";
                const customDate = document.getElementById('in-date').value;
                const files = document.getElementById('in-files').files;
                if(!t || !c) return alert("Błąd pól!");
                
                document.getElementById('loader').style.display = 'flex';
                let newUrls = [];
                
                // Upload nowych plików
                if(files.length > 0) {
                    for(let f of files) {
                        const fd = new FormData(); fd.append("image", f);
                        try {
                            const r = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: fd });
                            const d = await r.json(); 
                            if(d.success) newUrls.push(d.data.url);
                        } catch(e) {}
                    }
                }

                const finalImgs = [...currentEditImages, ...newUrls];
                const now = new Date().toLocaleString('pl-PL');
                let data = { title: t, content: c, author: a, category: cat, images: finalImgs };
                
                if(editId) {
                    const old = allData.find(x => x.id === editId);
                    data.date = customDate || old.date; data.ts = old.ts; data.updated = now;
                    data.likes = old.likes || 0;
                } else {
                    data.date = customDate || now; data.ts = Date.now(); data.likes = 0;
                }
                
                const act = editId ? postsRef.child(editId).update(data) : postsRef.push(data);
                act.then(() => location.reload());
            },

            editMode: (id) => {
                const p = allData.find(x => x.id === id);
                editId = id; 
                currentEditImages = p.images ? [...p.images] : [];
                document.getElementById('in-title').value = p.title;
                document.getElementById('in-author').value = p.author;
                document.getElementById('in-content').value = p.content;
                document.getElementById('in-date').value = p.date;
                document.getElementById('admin-mode-title').innerText = "Edytuj";
                document.getElementById('cancel-edit-btn').classList.remove('hidden');
                core.renderEditImages();
            },

            cancelEdit: () => {
                editId = null; currentEditImages = [];
                document.getElementById('in-title').value = ""; 
                document.getElementById('in-content').value = "";
                document.getElementById('edit-images-preview').innerHTML = "";
                document.getElementById('admin-mode-title').innerText = "Nowy Wpis";
                document.getElementById('cancel-edit-btn').classList.add('hidden');
            },

            deletePost: (id) => confirm("Usunąć?") && postsRef.child(id).remove(),
            showAllPosts: () => { showLimit = 999; core.renderPosts(allData); document.getElementById('more-container').classList.add('hidden'); },

            filterPosts: () => {
                const term = document.getElementById('search-input').value.toLowerCase();
                let f = allData;
                if(currentTab !== 'all') f = f.filter(p => p.category === currentTab);
                f = f.filter(p => p.title.toLowerCase().includes(term));
                core.renderPosts(f, term !== "" || currentTab !== 'all');
            },

            renderPosts: (items, isSearch = false) => {
                const container = document.getElementById('news-container');
                container.innerHTML = "";
                const toShow = isSearch ? items : items.slice(0, showLimit);
                toShow.forEach(v => {
                    const card = document.createElement('div'); card.className = "card glass p-6 rounded-2xl cursor-pointer mb-4 post-anim";
                    card.innerHTML = `<div class="flex gap-5 flex-col md:flex-row">${v.images?.[0] ? `<img src="${v.images[0]}" class="w-full md:w-28 h-28 object-cover rounded-xl">` : ''}<div><span class="category-tag">${v.category || 'Wydarzenia'}</span><h2 class="font-black text-xl">${v.title}</h2><div class="flex gap-3 mt-4"><span class="author-badge">${v.author}</span><span class="text-[10px] text-red-500"><i class="fa-solid fa-heart"></i> ${v.likes || 0}</span></div></div></div>`;
                    card.onclick = () => core.showFull(v);
                    container.appendChild(card);
                });
                document.getElementById('more-container').classList.toggle('hidden', isSearch || items.length <= showLimit);
            },

            likePost: () => {
                const key = `liked_${currentOpenPostId}`;
                if(localStorage.getItem(key)) return alert("Już polubiono!");
                const p = allData.find(x => x.id === currentOpenPostId);
                postsRef.child(currentOpenPostId).update({ likes: (p.likes || 0) + 1 }).then(() => {
                    localStorage.setItem(key, "1");
                    document.getElementById('main-like-btn').classList.add('liked');
                });
            },

            addComment: () => {
                const n = document.getElementById('comm-nick').value;
                const t = document.getElementById('comm-text').value;
                if(!n || !t) return alert("Pola!");
                const data = { nick: n, text: t, date: new Date().toLocaleString('pl-PL'), ts: Date.now(), reacts: 0 };
                let ref = currentReplyToId ? db.ref(`elk/comments/${currentOpenPostId}/${currentReplyToId}/replies`) : db.ref(`elk/comments/${currentOpenPostId}`);
                ref.push(data).then(() => { document.getElementById('comm-text').value = ""; core.cancelReply(); });
            },

            setReply: (cid, nick) => {
                currentReplyToId = cid; document.getElementById('replying-to-info').classList.remove('hidden');
                document.getElementById('target-nick').innerText = nick;
            },

            cancelReply: () => { currentReplyToId = null; document.getElementById('replying-to-info').classList.add('hidden'); },

            toggleReplies: (cid) => {
                const el = document.getElementById(`replies-${cid}`);
                el.style.display = el.style.display === "block" ? "none" : "block";
            },

            reportComment: (cid, text, nick, isReply = false, pId = null) => {
                if(confirm("Zgłosić?")) {
                    reportsRef.push({ postId: currentOpenPostId, commentId: cid, parentId: pId, isReply, text, author: nick, date: new Date().toLocaleString('pl-PL') });
                }
            },

            reactComment: (cid, isReply = false, pId = null) => {
                const key = `re_${cid}`; if(localStorage.getItem(key)) return alert("Już zareagowano!");
                let path = isReply ? `elk/comments/${currentOpenPostId}/${pId}/replies/${cid}/reacts` : `elk/comments/${currentOpenPostId}/${cid}/reacts`;
                db.ref(path).transaction(c => (c || 0) + 1); 
                localStorage.setItem(key, "1");
                const btn = document.querySelector(`[data-react-id="${cid}"]`);
                if(btn) btn.classList.add('liked');
            },

            deleteComment: (cid, isReply, pId, postId) => {
                if(!confirm("Usunąć?")) return;
                const post = postId || currentOpenPostId;
                let path = isReply ? `elk/comments/${post}/${pId}/replies/${cid}` : `elk/comments/${post}/${cid}`;
                db.ref(path).remove();
            },

            dismissReport: (rid) => reportsRef.child(rid).remove(),

            loadReports: () => {
                reportsRef.on('value', (snap) => {
                    const container = document.getElementById('reports-list');
                    container.innerHTML = "";
                    if(!snap.val()) return;
                    Object.entries(snap.val()).forEach(([rid, r]) => {
                        container.innerHTML += `<div class="notif-card report-highlight"><p class="text-[10px] text-red-500 font-bold">${r.author}:</p><p class="text-sm italic my-2">"${r.text}"</p><div class="flex gap-2"><button onclick="core.deleteComment('${r.commentId}', ${r.isReply}, '${r.parentId}', '${r.postId}'); core.dismissReport('${rid}')" class="bg-red-600 px-3 py-1 rounded text-[9px] font-bold">USUŃ</button><button onclick="core.dismissReport('${rid}')" class="bg-slate-700 px-3 py-1 rounded text-[9px] font-bold">ODRZUĆ</button></div></div>`;
                    });
                });
            },

            loadAllCommentsAdmin: () => {
                commentsRootRef.on('value', (snap) => {
                    const container = document.getElementById('all-comms-list');
                    container.innerHTML = "";
                    if(!snap.val()) return;
                    Object.entries(snap.val()).forEach(([postId, comms]) => {
                        Object.entries(comms).forEach(([cid, c]) => {
                            container.innerHTML += `<div class="notif-card"><p class="text-[10px] text-blue-400 font-bold">${c.nick} (Post: ${postId}):</p><p class="text-xs my-1">${c.text}</p><button onclick="core.deleteComment('${cid}', false, null, '${postId}')" class="text-red-500 text-[9px] font-bold">USUŃ</button></div>`;
                            if(c.replies) {
                                Object.entries(c.replies).forEach(([rid, r]) => {
                                    container.innerHTML += `<div class="notif-card ml-8 opacity-70"><p class="text-[10px] text-blue-400 font-bold">${r.nick} (RE: ${c.nick}):</p><p class="text-xs my-1">${r.text}</p><button onclick="core.deleteComment('${rid}', true, '${cid}', '${postId}')" class="text-red-500 text-[9px] font-bold">USUŃ</button></div>`;
                                });
                            }
                        });
                    });
                });
            },

            loadComments: (postId) => {
                db.ref(`elk/comments/${postId}`).on('value', (snap) => {
                    const list = document.getElementById('comments-list'); list.innerHTML = "";
                    if(!snap.val()) return;
                    Object.entries(snap.val()).sort((a,b) => b[1].ts - a[1].ts).forEach(([cid, c]) => {
                        let reps = ""; 
                        if(c.replies) {
                            Object.entries(c.replies).forEach(([rid, r]) => {
                                const rLiked = localStorage.getItem(`re_${rid}`) ? 'liked' : '';
                                reps += `<div class="reply-item"><button onclick="core.deleteComment('${rid}', true, '${cid}')" class="del-comm-btn">Usuń</button><span class="font-black text-blue-400 text-[11px]">${r.nick}</span><p class="text-xs">${r.text}</p><div class="flex gap-3 mt-1"><span data-react-id="${rid}" onclick="core.reactComment('${rid}', true, '${cid}')" class="comm-react-btn scale-75 ${rLiked}"><i class="fa-solid fa-heart"></i> ${r.reacts || 0}</span><span onclick="core.reportComment('${rid}', '${r.text}', '${r.nick}', true, '${cid}')" class="report-btn">Zgłoś</span></div></div>`;
                            });
                        }
                        const cLiked = localStorage.getItem(`re_${cid}`) ? 'liked' : '';
                        list.innerHTML += `<div class="comment-item"><button onclick="core.deleteComment('${cid}', false)" class="del-comm-btn">Usuń</button><span class="font-black text-blue-400 text-xs">${c.nick}</span><p class="text-sm">${c.text}</p><div class="flex gap-4 mt-2"><span data-react-id="${cid}" onclick="core.reactComment('${cid}')" class="comm-react-btn ${cLiked}"><i class="fa-solid fa-heart"></i> ${c.reacts || 0}</span><span onclick="core.setReply('${cid}', '${c.nick}')" class="reply-btn">Odpowiedz</span><span onclick="core.reportComment('${cid}', '${c.text}', '${c.nick}')" class="report-btn">Zgłoś</span>${c.replies ? `<span onclick="core.toggleReplies('${cid}')" class="toggle-replies">Pokaż odpowiedzi</span>`:''}</div><div id="replies-${cid}" class="replies-container">${reps}</div></div>`;
                    });
                });
            },

            showFull: (data) => {
                currentOpenPostId = data.id;
                document.getElementById('view-home').classList.add('hidden'); 
                document.getElementById('search-area').classList.add('hidden');
                document.getElementById('view-article').classList.remove('hidden');
                document.getElementById('like-count').innerText = data.likes || 0;
                
                const likeBtn = document.getElementById('main-like-btn');
                if(localStorage.getItem(`liked_${data.id}`)) likeBtn.classList.add('liked');
                else likeBtn.classList.remove('liked');

                core.loadComments(data.id);
                document.getElementById('article-content').innerHTML = `<h1 class="text-4xl font-black mb-4">${data.title}</h1><div class="flex gap-4 mb-8"><span class="author-badge">${data.author}</span><span class="text-xs opacity-40">${data.date}</span></div><div class="text-slate-300 text-lg white-pre border-l-4 border-blue-600 pl-6 mb-10">${core.parseMarkdown(data.content)}</div><div class="grid grid-cols-1 md:grid-cols-2 gap-4">${(data.images||[]).map(i=>`<img src="${i}" class="w-full rounded-3xl">`).join('')}</div>`;
                window.scrollTo(0,0);
            }
        };

        postsRef.on('value', (snap) => {
            const data = snap.val(); allData = [];
            const admList = document.getElementById('admin-list'); admList.innerHTML = "";
            if(data) {
                Object.entries(data).sort((a,b) => b[1].ts - a[1].ts).forEach(([id, v]) => {
                    allData.push({ id, ...v });
                    admList.innerHTML += `<div class="flex justify-between bg-white/5 p-2 rounded-xl"><span>${v.title}</span><div class="flex gap-2"><button onclick="core.editMode('${id}')" class="text-amber-500 text-[10px]">EDYCJA</button><button onclick="core.deletePost('${id}')" class="text-red-500 text-[10px]">USUŃ</button></div></div>`;
                    if(currentOpenPostId === id) document.getElementById('like-count').innerText = v.likes || 0;
                });
            }
            core.filterPosts();
        });

        reportsRef.on('value', (s) => {
            const c = s.val() ? Object.keys(s.val()).length : 0;
            const el = document.getElementById('notif-count');
            el.innerText = c; el.classList.toggle('hidden', c === 0);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ełk Nasze Eventy | Wszystko o eventach</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #121212;
            --card-dark: #1e1e1e;
            --primary-blue: #0056b3;
            --accent-yellow: #ffcc00;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --danger: #ff4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); line-height: 1.6; }

        /* --- HEADER & NAV --- */
        header { background: #000; border-bottom: 2px solid var(--primary-blue); position: sticky; top: 0; z-index: 1000; }
        .header-top { max-width: 1300px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; }
        .logo { font-size: 28px; font-weight: 900; text-transform: uppercase; color: #fff; cursor: pointer; text-decoration: none; }
        .logo span { color: var(--accent-yellow); }
        
        nav { background: #1a1a1a; padding: 10px 0; }
        .nav-container { max-width: 1300px; margin: 0 auto; display: flex; gap: 25px; padding: 0 20px; }
        .nav-link { color: #fff; text-decoration: none; font-weight: bold; font-size: 14px; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .nav-link:hover { color: var(--accent-yellow); }

        .container { max-width: 1300px; margin: 30px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 350px; gap: 30px; }

        /* --- NEWS GRID --- */
        .news-section { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .featured-post { grid-column: span 2; position: relative; height: 450px; border-radius: 8px; overflow: hidden; cursor: pointer; border: 2px solid transparent; transition: 0.3s; }
        .featured-post:hover { border-color: var(--primary-blue); }
        .featured-post img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .featured-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 40px; background: linear-gradient(transparent, rgba(0,0,0,0.95)); }
        .featured-title { font-size: 32px; font-weight: 800; color: #fff; margin-bottom: 10px; }

        .standard-post { background: var(--card-dark); border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; transition: 0.3s; border: 1px solid #333; cursor: pointer; }
        .standard-post:hover { border-color: var(--primary-blue); transform: translateY(-3px); }
        .post-img-box { height: 220px; width: 100%; background: #000; overflow: hidden; }
        .post-img-box img { width: 100%; height: 100%; object-fit: cover; }
        .post-content { padding: 20px; }
        .post-tag { color: var(--accent-yellow); font-size: 11px; font-weight: 900; text-transform: uppercase; }
        .post-title { font-size: 20px; font-weight: 700; margin: 10px 0; color: #fff; line-height: 1.3; }
        .post-snippet { color: var(--text-muted); font-size: 14px; margin-bottom: 15px; }

        /* --- FULL ARTICLE VIEW --- */
        .article-view { background: var(--card-dark); padding: 40px; border-radius: 12px; grid-column: span 2; max-width: 900px; margin: 0 auto; }
        .article-header { margin-bottom: 30px; }
        .article-title { font-size: 42px; font-weight: 900; margin-bottom: 15px; line-height: 1.1; }
        .article-meta { color: var(--text-muted); border-bottom: 1px solid #333; padding-bottom: 20px; margin-bottom: 30px; display: flex; gap: 20px; font-size: 14px; }
        .article-body { font-size: 18px; line-height: 1.8; color: #ddd; white-space: pre-wrap; margin-bottom: 40px; }
        .article-gallery { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .article-gallery img { width: 100%; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .btn-back { background: #333; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-bottom: 20px; transition: 0.3s; }
        .btn-back:hover { background: var(--primary-blue); }

        /* --- SIDEBAR --- */
        .sidebar-title { font-size: 18px; font-weight: 800; border-bottom: 2px solid var(--primary-blue); padding-bottom: 10px; margin-bottom: 20px; text-transform: uppercase; }
        .link-item { display: flex; align-items: center; gap: 15px; padding: 12px; background: var(--card-dark); margin-bottom: 10px; border-radius: 6px; text-decoration: none; color: var(--text-main); transition: 0.3s; }
        .link-item:hover { background: #333; transform: translateX(5px); }
        .link-icon { background: var(--primary-blue); width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }

        /* --- ADMIN PANEL --- */
        .admin-box { background: var(--card-dark); padding: 30px; border-radius: 12px; grid-column: span 2; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        input, textarea, select { width: 100%; padding: 12px; background: #2a2a2a; border: 1px solid #444; color: #fff; border-radius: 6px; }
        .btn { padding: 12px 25px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-primary { background: var(--primary-blue); color: white; width: 100%; }
        .btn-del { background: var(--danger); color: white; padding: 5px 10px; font-size: 12px; }

        #toast { position: fixed; bottom: 20px; right: 20px; padding: 15px 30px; background: var(--primary-blue); border-radius: 50px; display: none; z-index: 10000; }
        .hidden { display: none !important; }
        .admin-item-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #333; }
        
        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
            .news-section { grid-template-columns: 1fr; }
            .featured-post { grid-column: span 1; height: 300px; }
            .article-title { font-size: 28px; }
        }
    </style>
</head>
<body>

    <div id="toast">Gotowe!</div>

    <header>
        <div class="header-top">
            <div class="logo" onclick="showView('home')">Ełk <span>Nasze Eventy</span></div>
            <button class="btn" style="background:var(--primary-blue); color:white" onclick="checkAuth()">Panel Admina</button>
        </div>
        <nav>
            <div class="nav-container">
                <div class="nav-link" onclick="showView('home')">Wiadomości</div>
                <div class="nav-link" onclick="showView('home')">Eventy</div>
                <div class="nav-link" onclick="showView('links-page')">Linki</div>
            </div>
        </nav>
    </header>

    <div class="container">
        
        <div id="view-home" style="display:contents">
            <main>
                <div class="news-section" id="news-grid"></div>
            </main>
            <aside>
                <h3 class="sidebar-title">Szybkie Linki</h3>
                <div id="sidebar-links"></div>
            </aside>
        </div>

        <div id="view-article" class="hidden" style="grid-column: span 2;">
            <button class="btn-back" onclick="showView('home')"><i class="fas fa-arrow-left"></i> Powrót do newsów</button>
            <article class="article-view" id="full-article-content"></article>
        </div>

        <div id="view-links-page" class="hidden" style="grid-column: span 2;">
            <h2 class="sidebar-title">Katalog Serwisów</h2>
            <div id="full-links-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px;"></div>
        </div>

        <div id="view-login" class="hidden" style="grid-column: span 2;">
            <div style="max-width: 400px; margin: 100px auto; background: var(--card-dark); padding: 40px; border-radius: 10px; text-align: center;">
                <h2>Strefa Redakcyjna</h2>
                <input type="password" id="admin-pass" style="margin: 20px 0; text-align: center;" placeholder="Hasło: diax67">
                <button class="btn btn-primary" onclick="doLogin()">Zaloguj</button>
            </div>
        </div>

        <div id="view-admin" class="hidden" style="grid-column: span 2;">
            <div class="admin-box">
                <div style="display:flex; justify-content:space-between; margin-bottom:30px">
                    <h2 id="admin-form-title">Dodaj Nowy Artykuł</h2>
                    <div>
                        <button class="btn" style="background:#444; color:white" onclick="resetPostForm()">Wyczyść</button>
                        <button class="btn" style="background:var(--danger); color:white" onclick="logout()">Wyloguj</button>
                    </div>
                </div>

                <input type="hidden" id="edit-id">
                <div class="form-row">
                    <input type="text" id="post-title" placeholder="Tytuł artykułu">
                    <input type="text" id="post-author" placeholder="Autor / Redaktor">
                </div>
                <textarea id="post-content" rows="8" placeholder="Treść artykułu (całość)" style="margin-bottom:20px"></textarea>
                <div style="margin-bottom:20px">
                    <label>Dodaj zdjęcia (możesz zaznaczyć wiele):</label>
                    <input type="file" id="post-imgs" multiple accept="image/*">
                </div>
                <button class="btn btn-primary" onclick="savePost()">OPUBLIKUJ ARTYKUŁ</button>

                <hr style="margin: 40px 0; border-color: #333;">

                <h2>Zarządzaj Linkami</h2>
                <div class="form-row" style="margin: 20px 0">
                    <input type="text" id="link-name" placeholder="Nazwa (np. Rozkład PKP)">
                    <input type="text" id="link-url" placeholder="Adres URL (http...)">
                    <button class="btn btn-primary" onclick="saveLink()">DODAJ LINK</button>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 40px;">
                    <div><h3>Posty</h3><div id="admin-posts-list"></div></div>
                    <div><h3>Linki</h3><div id="admin-links-list"></div></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let db;
        const req = indexedDB.open("ElkCMS_v7", 1);
        req.onupgradeneeded = (e) => {
            let d = e.target.result;
            d.createObjectStore("posts", {keyPath: "id", autoIncrement: true});
            d.createObjectStore("links", {keyPath: "id", autoIncrement: true});
        };
        req.onsuccess = (e) => { db = e.target.result; renderAll(); };

        function showView(v) {
            document.querySelectorAll('.container > div').forEach(el => el.classList.add('hidden'));
            document.getElementById('view-'+v).classList.remove('hidden');
            if(v === 'home') renderPosts();
        }

        function checkAuth() { sessionStorage.getItem('logged') ? showView('admin') : showView('login'); }
        function doLogin() {
            if(document.getElementById('admin-pass').value === 'diax67') {
                sessionStorage.setItem('logged', 'true');
                showView('admin');
            } else alert('Błąd!');
        }
        function logout() { sessionStorage.clear(); location.reload(); }

        // --- POST LOGIC ---
        async function savePost() {
            const id = document.getElementById('edit-id').value;
            const title = document.getElementById('post-title').value;
            const author = document.getElementById('post-author').value;
            const content = document.getElementById('post-content').value;
            const files = document.getElementById('post-imgs').files;

            let images = [];
            if(files.length > 0) {
                for(let f of files) images.push(await toBase64(f));
            } else if(id) {
                const old = await getOne('posts', parseInt(id));
                images = old.images;
            }

            if(!title || !content) return alert("Tytuł i treść są wymagane!");

            const post = { title, author, content, images, date: new Date().toLocaleString('pl-PL') };
            if(id) post.id = parseInt(id);

            const tx = db.transaction("posts", "readwrite");
            tx.objectStore("posts").put(post);
            tx.oncomplete = () => { showToast(); resetPostForm(); renderAll(); };
        }

        async function openArticle(id) {
            const post = await getOne('posts', id);
            const area = document.getElementById('full-article-content');
            
            let galleryHtml = post.images.map(img => `<img src="${img}">`).join('');
            
            area.innerHTML = `
                <div class="article-header">
                    <span class="post-tag">Wiadomości z Ełku</span>
                    <h1 class="article-title">${post.title}</h1>
                    <div class="article-meta">
                        <span><i class="fas fa-user"></i> Autor: ${post.author || 'Redakcja'}</span>
                        <span><i class="fas fa-calendar"></i> ${post.date}</span>
                    </div>
                </div>
                <div class="article-body">${post.content}</div>
                <div class="article-gallery">${galleryHtml}</div>
            `;
            showView('article');
            window.scrollTo(0,0);
        }

        function renderPosts() {
            const store = db.transaction("posts").objectStore("posts");
            store.getAll().onsuccess = (e) => {
                const posts = e.target.result.sort((a,b) => b.id - a.id);
                const grid = document.getElementById('news-grid');
                const adminList = document.getElementById('admin-posts-list');
                grid.innerHTML = ""; adminList.innerHTML = "";

                posts.forEach((p, idx) => {
                    const snippet = p.content.substring(0, 160) + "...";
                    if(idx === 0) {
                        grid.innerHTML += `
                            <div class="featured-post" onclick="openArticle(${p.id})">
                                <img src="${p.images[0] || ''}">
                                <div class="featured-overlay">
                                    <div class="post-tag">NAJNOWSZE</div>
                                    <h2 class="featured-title">${p.title}</h2>
                                    <p style="color:var(--accent-yellow)">Czytaj więcej <i class="fas fa-chevron-right"></i></p>
                                </div>
                            </div>`;
                    } else {
                        grid.innerHTML += `
                            <div class="standard-post" onclick="openArticle(${p.id})">
                                <div class="post-img-box"><img src="${p.images[0] || ''}"></div>
                                <div class="post-content">
                                    <span class="post-tag">Ełk</span>
                                    <h3 class="post-title">${p.title}</h3>
                                    <p class="post-snippet">${snippet}</p>
                                    <small>${p.date}</small>
                                </div>
                            </div>`;
                    }
                    adminList.innerHTML += `<div class="admin-item-row"><span>${p.title}</span>
                        <div><button class="btn-primary" style="padding:5px" onclick="editPost(${p.id})">Edytuj</button>
                        <button class="btn-del" onclick="deleteItem('posts', ${p.id})">Usuń</button></div></div>`;
                });
            };
        }

        // --- LINKS LOGIC ---
        function saveLink() {
            const name = document.getElementById('link-name').value;
            const url = document.getElementById('link-url').value;
            if(!name || !url) return;
            const tx = db.transaction("links", "readwrite");
            tx.objectStore("links").add({ name, url });
            tx.oncomplete = () => { renderLinks(); document.getElementById('link-name').value=""; document.getElementById('link-url').value=""; };
        }

        function renderLinks() {
            db.transaction("links").objectStore("links").getAll().onsuccess = (e) => {
                const links = e.target.result;
                const sidebar = document.getElementById('sidebar-links');
                const adminL = document.getElementById('admin-links-list');
                sidebar.innerHTML = ""; adminL.innerHTML = "";
                links.forEach(l => {
                    sidebar.innerHTML += `<a href="${l.url}" target="_blank" class="link-item"><div class="link-icon"><i class="fas fa-link"></i></div><span>${l.name}</span></a>`;
                    adminL.innerHTML += `<div class="admin-item-row"><span>${l.name}</span><button class="btn-del" onclick="deleteItem('links', ${l.id})">Usuń</button></div>`;
                });
            };
        }

        // --- UTILS ---
        function editPost(id) {
            getOne('posts', id).then(p => {
                document.getElementById('edit-id').value = p.id;
                document.getElementById('post-title').value = p.title;
                document.getElementById('post-author').value = p.author;
                document.getElementById('post-content').value = p.content;
                document.getElementById('admin-form-title').innerText = "Edytujesz: " + p.title;
                showView('admin');
            });
        }
        function deleteItem(s, id) { if(confirm("Na pewno?")) { const tx = db.transaction(s, "readwrite"); tx.objectStore(s).delete(id); tx.oncomplete = () => renderAll(); } }
        const toBase64 = f => new Promise(res => { const r = new FileReader(); r.readAsDataURL(f); r.onload = () => res(r.result); });
        const getOne = (s, id) => new Promise(res => { db.transaction(s).objectStore(s).get(id).onsuccess = e => res(e.target.result); });
        function resetPostForm() { document.getElementById('edit-id').value=""; document.getElementById('post-title').value=""; document.getElementById('post-author').value=""; document.getElementById('post-content').value=""; document.getElementById('admin-form-title').innerText = "Dodaj Nowy Artykuł"; }
        function showToast() { const t = document.getElementById('toast'); t.style.display='block'; setTimeout(()=>t.style.display='none', 2000); }
        function renderAll() { renderPosts(); renderLinks(); }
    </script>
</body>
</html>

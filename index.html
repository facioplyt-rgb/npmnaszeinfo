<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ełk Eventy | Debug Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; padding: 20px; }
        .console-box { background: #000; border: 1px solid #333; color: #0f0; font-family: monospace; padding: 10px; margin-top: 20px; height: 150px; overflow-y: auto; font-size: 12px; }
    </style>
</head>
<body>

    <div class="max-w-2xl mx-auto bg-slate-800 p-6 rounded-2xl border border-slate-700">
        <h2 class="text-xl font-bold mb-4 text-amber-500 italic">PANEL REDAKCJI v17 (DEBUG)</h2>
        
        <input type="text" id="t" placeholder="Tytuł" class="w-full p-3 mb-3 bg-slate-900 border border-slate-700 rounded text-white">
        <textarea id="c" rows="5" placeholder="Treść..." class="w-full p-3 mb-3 bg-slate-900 border border-slate-700 rounded text-white"></textarea>
        <input type="file" id="f" multiple class="mb-4 text-xs">
        
        <button onclick="publishWithLogs()" id="btn" class="w-full bg-blue-600 p-4 rounded-xl font-bold uppercase hover:bg-blue-500 transition">Opublikuj i sprawdź logi</button>

        <div class="mt-6 p-4 bg-slate-900 rounded border border-slate-700">
            <h3 class="text-xs font-bold text-slate-500 uppercase mb-2">Podgląd logów na żywo:</h3>
            <div id="live-logs" class="text-[10px] text-green-400 font-mono">Czekam na akcję...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

        // TWOJA KONFIGURACJA (Sprawdź czy databaseURL jest identyczny jak w konsoli!)
        const firebaseConfig = {
            apiKey: "TWOJE_API_KEY",
            authDomain: "mzk-by-facio.firebaseapp.com",
            databaseURL: "https://mzk-by-facio-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mzk-by-facio",
            appId: "APP_ID"
        };

        const log = (msg, isError = false) => {
            const div = document.getElementById('live-logs');
            const time = new Date().toLocaleTimeString();
            const color = isError ? 'text-red-500' : 'text-green-400';
            div.innerHTML += `<div class="${color}">[${time}] ${msg}</div>`;
            console.log(`[FIREBASE_DEBUG] ${msg}`);
        };

        let db;
        try {
            const app = initializeApp(firebaseConfig);
            db = getDatabase(app);
            log("Inicjalizacja Firebase: OK");
        } catch (e) {
            log("BŁĄD INICJALIZACJI: " + e.message, true);
        }

        window.publishWithLogs = async () => {
            const title = document.getElementById('t').value;
            const content = document.getElementById('c').value;
            const files = document.getElementById('f').files;
            const btn = document.getElementById('btn');

            if(!title || !content) {
                log("BŁĄD: Brakuje tytułu lub treści", true);
                return;
            }

            btn.disabled = true;
            btn.innerText = "WYSYŁANIE...";
            log("Rozpoczynam proces wysyłania...");

            // 1. Przetwarzanie zdjęć
            let images = [];
            try {
                log(`Przetwarzanie zdjęć: ${files.length} szt.`);
                for(let file of files) {
                    const b64 = await new Promise((res, rej) => {
                        const r = new FileReader();
                        r.readAsDataURL(file);
                        r.onload = () => res(r.result);
                        r.onerror = e => rej(e);
                    });
                    images.push(b64);
                }
                log("Zdjęcia zamienione na Base64: OK");
            } catch (e) {
                log("BŁĄD ZDJĘĆ: " + e.message, true);
            }

            // 2. Wysłanie do bazy
            log("Próba zapisu do węzła: elk/posts...");
            try {
                await push(ref(db, 'elk/posts'), {
                    title: title,
                    content: content,
                    images: images,
                    timestamp: Date.now()
                });
                log("SUKCES! Dane są w chmurze.", false);
                alert("Zadziałało poprawnie!");
                location.reload();
            } catch (e) {
                log("BŁĄD KRYTYCZNY FIREBASE: " + e.message, true);
                console.error(e); // Pełny obiekt błędu w F12
                
                if(e.message.includes("permission_denied")) {
                    log("PODPOWIEDŹ: Masz zablokowane uprawnienia (Rules) w konsoli Firebase!", true);
                }
            } finally {
                btn.disabled = false;
                btn.innerText = "Opublikuj i sprawdź logi";
            }
        };
    </script>
</body>
</html>

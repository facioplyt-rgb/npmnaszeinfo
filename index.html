<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ełk Nasze Eventy | Portal Informacyjny</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #121212;
            --card-dark: #1e1e1e;
            --primary-blue: #0056b3;
            --accent-yellow: #ffcc00;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --danger: #ff4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); line-height: 1.5; }

        /* --- HEADER & NAV --- */
        header { background: #000; border-bottom: 2px solid var(--primary-blue); position: sticky; top: 0; z-index: 1000; }
        .header-top { max-width: 1300px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; }
        .logo { font-size: 28px; font-weight: 900; text-transform: uppercase; color: #fff; cursor: pointer; text-decoration: none; }
        .logo span { color: var(--accent-yellow); }
        
        nav { background: #1a1a1a; padding: 10px 0; }
        .nav-container { max-width: 1300px; margin: 0 auto; display: flex; gap: 25px; padding: 0 20px; }
        .nav-link { color: #fff; text-decoration: none; font-weight: bold; font-size: 14px; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .nav-link:hover { color: var(--accent-yellow); }

        .container { max-width: 1300px; margin: 30px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 350px; gap: 30px; }

        /* --- NEWS GRID (NASZE MIASTO STYLE) --- */
        .news-section { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .featured-post { grid-column: span 2; position: relative; height: 450px; border-radius: 8px; overflow: hidden; cursor: pointer; }
        .featured-post img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .featured-post:hover img { transform: scale(1.03); }
        .featured-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 40px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); }
        .featured-title { font-size: 32px; font-weight: 800; color: #fff; margin-bottom: 10px; }

        .standard-post { background: var(--card-dark); border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; transition: 0.3s; border: 1px solid #333; }
        .standard-post:hover { border-color: var(--primary-blue); }
        .post-img-box { height: 200px; width: 100%; background: #000; overflow: hidden; }
        .post-img-box img { width: 100%; height: 100%; object-fit: cover; }
        .post-content { padding: 20px; }
        .post-tag { color: var(--accent-yellow); font-size: 11px; font-weight: 900; text-transform: uppercase; }
        .post-title { font-size: 18px; font-weight: 700; margin: 10px 0; color: #fff; }

        /* --- SIDEBAR --- */
        .sidebar-title { font-size: 18px; font-weight: 800; border-bottom: 2px solid var(--primary-blue); padding-bottom: 10px; margin-bottom: 20px; text-transform: uppercase; }
        .link-item { display: flex; align-items: center; gap: 15px; padding: 12px; background: var(--card-dark); margin-bottom: 10px; border-radius: 6px; text-decoration: none; color: var(--text-main); transition: 0.3s; }
        .link-item:hover { background: #333; transform: translateX(5px); }
        .link-icon { background: var(--primary-blue); width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }

        /* --- ADMIN PANEL --- */
        .admin-box { background: var(--card-dark); padding: 30px; border-radius: 12px; grid-column: span 2; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        input, textarea, select { width: 100%; padding: 12px; background: #2a2a2a; border: 1px solid #444; color: #fff; border-radius: 6px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; }
        .btn { padding: 12px 25px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-primary { background: var(--primary-blue); color: white; width: 100%; }
        .btn-edit { background: #555; color: white; padding: 5px 10px; font-size: 12px; }
        .btn-del { background: var(--danger); color: white; padding: 5px 10px; font-size: 12px; }

        #toast { position: fixed; bottom: 20px; right: 20px; padding: 15px 30px; background: var(--primary-blue); border-radius: 50px; display: none; z-index: 10000; }

        .hidden { display: none !important; }
        .admin-item-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #333; }
        
        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
            .news-section { grid-template-columns: 1fr; }
            .featured-post { grid-column: span 1; height: 300px; }
        }
    </style>
</head>
<body>

    <div id="toast">Operacja zakończona sukcesem!</div>

    <header>
        <div class="header-top">
            <div class="logo" onclick="location.reload()">Ełk <span>Nasze Eventy</span></div>
            <button class="btn" style="background:var(--primary-blue); color:white" onclick="checkAuth()">Panel Admina</button>
        </div>
        <nav>
            <div class="nav-container">
                <div class="nav-link" onclick="showView('home')">Wiadomości</div>
                <div class="nav-link" onclick="showView('home')">Eventy</div>
                <div class="nav-link" onclick="showView('links-page')">Linki</div>
                <div class="nav-link" onclick="checkAuth()">Dodaj Post</div>
            </div>
        </nav>
    </header>

    <div class="container">
        
        <div id="view-home" style="display:contents">
            <main>
                <div class="news-section" id="news-grid">
                    </div>
            </main>
            <aside>
                <h3 class="sidebar-title">Warto wiedzieć</h3>
                <div id="sidebar-links">
                    </div>
            </aside>
        </div>

        <div id="view-links-page" class="hidden" style="grid-column: span 2;">
            <h2 class="sidebar-title">Przydatne Linki i Serwisy</h2>
            <div id="full-links-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px;"></div>
        </div>

        <div id="view-login" class="hidden" style="grid-column: span 2;">
            <div style="max-width: 400px; margin: 100px auto; background: var(--card-dark); padding: 40px; border-radius: 10px; text-align: center;">
                <h2>Logowanie Redakcyjne</h2>
                <input type="password" id="admin-pass" style="margin: 20px 0; text-align: center;" placeholder="Hasło...">
                <button class="btn btn-primary" onclick="doLogin()">Zaloguj</button>
            </div>
        </div>

        <div id="view-admin" class="hidden" style="grid-column: span 2;">
            <div class="admin-box">
                <div style="display:flex; justify-content:space-between; margin-bottom:30px">
                    <h2 id="admin-form-title">Zarządzaj Eventem</h2>
                    <button class="btn" style="background:#444; color:white" onclick="resetPostForm()">Nowy Post</button>
                    <button class="btn" style="background:var(--danger); color:white" onclick="logout()">Wyloguj</button>
                </div>

                <div id="form-post-section">
                    <input type="hidden" id="edit-id">
                    <div class="form-row">
                        <div>
                            <label>Tytuł Artykułu</label>
                            <input type="text" id="post-title">
                        </div>
                        <div>
                            <label>Autor</label>
                            <input type="text" id="post-author">
                        </div>
                    </div>
                    <div class="form-group" style="margin-bottom:20px">
                        <label>Treść</label>
                        <textarea id="post-content" rows="6"></textarea>
                    </div>
                    <div class="form-group" style="margin-bottom:20px">
                        <label>Zdjęcia (możesz dodać wiele)</label>
                        <input type="file" id="post-imgs" multiple accept="image/*">
                    </div>
                    <button class="btn btn-primary" onclick="savePost()">ZAPISZ ARTYKUŁ</button>
                </div>

                <hr style="margin: 40px 0; border-color: #333;">

                <h2>Zarządzaj Linkami</h2>
                <div class="form-row" style="margin-top:20px">
                    <input type="hidden" id="edit-link-id">
                    <input type="text" id="link-name" placeholder="Nazwa linku (np. Rozkład PKP)">
                    <input type="text" id="link-url" placeholder="Adres URL (np. https://...)">
                    <button class="btn btn-primary" onclick="saveLink()">DODAJ / EDYTUJ LINK</button>
                </div>

                <div style="margin-top:40px; display: grid; grid-template-columns: 1fr 1fr; gap: 40px;">
                    <div>
                        <h3>Lista Artykułów</h3>
                        <div id="admin-posts-list"></div>
                    </div>
                    <div>
                        <h3>Lista Linków</h3>
                        <div id="admin-links-list"></div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // --- DATABASE ---
        let db;
        const request = indexedDB.open("ElkMediaDB", 2);
        request.onupgradeneeded = (e) => {
            let d = e.target.result;
            if(!d.objectStoreNames.contains("posts")) d.createObjectStore("posts", {keyPath: "id", autoIncrement: true});
            if(!d.objectStoreNames.contains("links")) d.createObjectStore("links", {keyPath: "id", autoIncrement: true});
        };
        request.onsuccess = (e) => { db = e.target.result; renderAll(); };

        // --- NAVIGATION ---
        function showView(v) {
            document.querySelectorAll('.container > div').forEach(el => el.classList.add('hidden'));
            document.getElementById('view-'+v).classList.remove('hidden');
        }

        function checkAuth() { sessionStorage.getItem('logged') ? showView('admin') : showView('login'); }
        function doLogin() {
            if(document.getElementById('admin-pass').value === 'diax67') {
                sessionStorage.setItem('logged', 'true');
                showView('admin');
            } else alert('Hasło błędne');
        }
        function logout() { sessionStorage.clear(); location.reload(); }

        // --- POSTS CRUD ---
        async function savePost() {
            const id = document.getElementById('edit-id').value;
            const title = document.getElementById('post-title').value;
            const author = document.getElementById('post-author').value;
            const content = document.getElementById('post-content').value;
            const files = document.getElementById('post-imgs').files;

            let images = [];
            if(files.length > 0) {
                for(let f of files) images.push(await toBase64(f));
            } else if(id) {
                // Jeśli edytujemy i nie daliśmy nowych zdjęć, pobierz stare (uproszczenie)
                const old = await getOne('posts', parseInt(id));
                images = old.images;
            }

            const post = { title, author, content, images, date: new Date().toLocaleString() };
            if(id) post.id = parseInt(id);

            const tx = db.transaction("posts", "readwrite");
            tx.objectStore("posts").put(post);
            tx.oncomplete = () => {
                showToast();
                resetPostForm();
                renderAll();
            };
        }

        function editPost(id) {
            getOne('posts', id).then(p => {
                document.getElementById('edit-id').value = p.id;
                document.getElementById('post-title').value = p.title;
                document.getElementById('post-author').value = p.author;
                document.getElementById('post-content').value = p.content;
                document.getElementById('admin-form-title').innerText = "EDYCJA: " + p.title;
                window.scrollTo(0,0);
            });
        }

        function deleteItem(store, id) {
            if(confirm("Usunąć?")) {
                const tx = db.transaction(store, "readwrite");
                tx.objectStore(store).delete(id);
                tx.oncomplete = () => renderAll();
            }
        }

        function resetPostForm() {
            document.getElementById('edit-id').value = "";
            document.getElementById('post-title').value = "";
            document.getElementById('post-author').value = "";
            document.getElementById('post-content').value = "";
            document.getElementById('admin-form-title').innerText = "Zarządzaj Eventem";
        }

        // --- LINKS CRUD ---
        function saveLink() {
            const id = document.getElementById('edit-link-id').value;
            const name = document.getElementById('link-name').value;
            const url = document.getElementById('link-url').value;
            const link = { name, url };
            if(id) link.id = parseInt(id);

            const tx = db.transaction("links", "readwrite");
            tx.objectStore("links").put(link);
            tx.oncomplete = () => {
                document.getElementById('edit-link-id').value = "";
                document.getElementById('link-name').value = "";
                document.getElementById('link-url').value = "";
                renderAll();
            };
        }

        function editLink(id) {
            getOne('links', id).then(l => {
                document.getElementById('edit-link-id').value = l.id;
                document.getElementById('link-name').value = l.name;
                document.getElementById('link-url').value = l.url;
            });
        }

        // --- RENDERING ---
        function renderAll() {
            renderPosts();
            renderLinks();
        }

        function renderPosts() {
            const tx = db.transaction("posts", "readonly");
            const store = tx.objectStore("posts");
            store.getAll().onsuccess = (e) => {
                const posts = e.target.result.sort((a,b) => b.id - a.id);
                const grid = document.getElementById('news-grid');
                const adminList = document.getElementById('admin-posts-list');
                
                grid.innerHTML = "";
                adminList.innerHTML = "";

                posts.forEach((p, index) => {
                    // Strona Główna
                    if(index === 0) {
                        grid.innerHTML += `
                            <div class="featured-post">
                                <img src="${p.images[0] || 'https://via.placeholder.com/800x400'}">
                                <div class="featured-overlay">
                                    <div class="post-tag">Wydarzenie Dnia</div>
                                    <h1 class="featured-title">${p.title}</h1>
                                    <p style="color:#ccc">${p.author} | ${p.date}</p>
                                </div>
                            </div>
                        `;
                    } else {
                        grid.innerHTML += `
                            <div class="standard-post">
                                <div class="post-img-box"><img src="${p.images[0] || 'https://via.placeholder.com/400x200'}"></div>
                                <div class="post-content">
                                    <div class="post-tag">Wiadomości</div>
                                    <h3 class="post-title">${p.title}</h3>
                                    <small style="color:var(--text-muted)">${p.date}</small>
                                </div>
                            </div>
                        `;
                    }

                    // Lista Admina
                    adminList.innerHTML += `
                        <div class="admin-item-row">
                            <span style="font-size:12px">${p.title}</span>
                            <div>
                                <button class="btn-edit" onclick="editPost(${p.id})">Edytuj</button>
                                <button class="btn-del" onclick="deleteItem('posts', ${p.id})">Usuń</button>
                            </div>
                        </div>
                    `;
                });
            };
        }

        function renderLinks() {
            const tx = db.transaction("links", "readonly");
            tx.objectStore("links").getAll().onsuccess = (e) => {
                const links = e.target.result;
                const sidebar = document.getElementById('sidebar-links');
                const fullList = document.getElementById('full-links-list');
                const adminList = document.getElementById('admin-links-list');

                sidebar.innerHTML = ""; fullList.innerHTML = ""; adminList.innerHTML = "";

                links.forEach(l => {
                    const html = `
                        <a href="${l.url}" target="_blank" class="link-item">
                            <div class="link-icon"><i class="fas fa-link"></i></div>
                            <span>${l.name}</span>
                        </a>
                    `;
                    sidebar.innerHTML += html;
                    fullList.innerHTML += html;
                    adminList.innerHTML += `
                        <div class="admin-item-row">
                            <span style="font-size:12px">${l.name}</span>
                            <div>
                                <button class="btn-edit" onclick="editLink(${l.id})">Edytuj</button>
                                <button class="btn-del" onclick="deleteItem('links', ${l.id})">Usuń</button>
                            </div>
                        </div>
                    `;
                });
            };
        }

        // --- UTILS ---
        const toBase64 = f => new Promise((res) => {
            const r = new FileReader(); r.readAsDataURL(f); r.onload = () => res(r.result);
        });
        
        const getOne = (store, id) => new Promise((res) => {
            db.transaction(store).objectStore(store).get(id).onsuccess = (e) => res(e.target.result);
        });

        function showToast() {
            const t = document.getElementById('toast');
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }
    </script>
</body>
</html>

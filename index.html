<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ełk Nasze Eventy | v14 Modular</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <style>
        :root { --main: #0066cc; --accent: #ffcc00; }
        body { background: #0f172a; color: white; min-height: 100vh; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 20px; transition: 0.3s; cursor: pointer; overflow: hidden; }
        .card:hover { transform: translateY(-5px); border-color: var(--main); }
        .input-dark { background: #0f172a; border: 2px solid #334155; border-radius: 12px; padding: 12px; color: white; width: 100%; outline: none; }
        .input-dark:focus { border-color: var(--main); }
        .btn-blue { background: var(--main); color: white; padding: 12px; border-radius: 12px; font-weight: bold; width: 100%; transition: 0.2s; }
        .btn-blue:active { transform: scale(0.98); }
        .hidden { display: none; }
        .white-pre { white-space: pre-wrap; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-6xl mx-auto flex justify-between items-center mb-10">
        <h1 onclick="location.reload()" class="text-2xl font-black italic cursor-pointer">EŁK <span class="text-amber-500">EVENTY</span></h1>
        <button onclick="core.openAdmin()" class="bg-slate-800 px-4 py-2 rounded-full text-xs font-bold uppercase border border-slate-700">Panel Redakcji</button>
    </header>

    <div class="max-w-6xl mx-auto">
        
        <div id="view-home" class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="md:col-span-2 space-y-6" id="news-feed">
                <p class="text-slate-500 animate-pulse">Łączenie z bazą Ełk...</p>
            </div>
            <div class="space-y-6">
                <div class="bg-slate-800/50 p-6 rounded-3xl border border-slate-700">
                    <h3 class="font-black text-amber-500 uppercase text-xs mb-4">Informacje</h3>
                    <p class="text-sm text-slate-400">Witaj w portalu v14. Kliknij artykuł, aby zobaczyć pełną treść i zdjęcia.</p>
                </div>
            </div>
        </div>

        <div id="view-article" class="hidden max-w-3xl mx-auto">
            <button onclick="core.showHome()" class="mb-6 text-slate-400 font-bold">← POWRÓT</button>
            <div id="full-post-content" class="space-y-6"></div>
        </div>

        <div id="view-admin" class="hidden max-w-xl mx-auto bg-slate-800 p-8 rounded-[30px] border border-slate-700 shadow-2xl">
            <h2 class="text-2xl font-black mb-6 italic text-amber-500">NOWY WPIS</h2>
            <div class="space-y-4">
                <input type="text" id="adm-title" placeholder="TYTUŁ" class="input-dark">
                <input type="text" id="adm-author" placeholder="AUTOR" class="input-dark">
                <textarea id="adm-content" rows="6" placeholder="TREŚĆ ARTYKUŁU..." class="input-dark"></textarea>
                <label class="block text-xs font-bold text-slate-500 uppercase">Zdjęcia:</label>
                <input type="file" id="adm-files" multiple accept="image/*" class="text-xs text-slate-400">
                <button id="pub-btn" onclick="core.submit()" class="btn-blue">OPUBLIKUJ W CHMURZE</button>
                <div id="adm-manage" class="mt-8 pt-8 border-t border-slate-700 space-y-2"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, set } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

        // --- KONFIGURACJA (Wklej swoje) ---
        const firebaseConfig = {
            apiKey: "TWOJE_API_KEY",
            authDomain: "mzk-by-facio.firebaseapp.com",
            databaseURL: "https://mzk-by-facio-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mzk-by-facio",
            appId: "APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const rootRef = ref(db, 'elk/posts');

        window.core = {
            showHome: () => {
                document.getElementById('view-home').classList.remove('hidden');
                document.getElementById('view-article').classList.add('hidden');
                document.getElementById('view-admin').classList.add('hidden');
            },

            openAdmin: () => {
                const p = prompt("KOD DOSTĘPU:");
                if(p === "diax67") {
                    document.getElementById('view-home').classList.add('hidden');
                    document.getElementById('view-admin').classList.remove('hidden');
                }
            },

            submit: async () => {
                const t = document.getElementById('adm-title').value;
                const c = document.getElementById('adm-content').value;
                const a = document.getElementById('adm-author').value;
                const files = document.getElementById('adm-files').files;

                if(!t || !c) return alert("Wpisz dane!");
                
                const btn = document.getElementById('pub-btn');
                btn.innerText = "PRZESYŁANIE...";
                btn.style.opacity = "0.5";

                let images = [];
                for(let f of files) {
                    const b64 = await new Promise(res => {
                        const r = new FileReader();
                        r.readAsDataURL(f);
                        r.onload = () => res(r.result);
                    });
                    images.push(b64);
                }

                await push(rootRef, {
                    title: t, content: c, author: a, images: images,
                    time: Date.now(), date: new Date().toLocaleString()
                });

                location.reload();
            },

            del: (id) => confirm("Usunąć wpis?") && remove(ref(db, `elk/posts/${id}`)),

            openPost: (id, data) => {
                document.getElementById('view-home').classList.add('hidden');
                const artView = document.getElementById('view-article');
                artView.classList.remove('hidden');
                
                let imgsHtml = (data.images || []).map(img => `<img src="${img}" class="w-full rounded-3xl shadow-2xl">`).join('');
                
                document.getElementById('full-post-content').innerHTML = `
                    <h1 class="text-4xl font-black italic">${data.title}</h1>
                    <div class="flex gap-4 text-xs font-bold text-amber-500 uppercase">
                        <span>${data.author}</span> • <span>${data.date}</span>
                    </div>
                    <p class="text-slate-300 text-lg leading-relaxed white-pre">${data.content}</p>
                    <div class="grid grid-cols-1 gap-6 pt-6">${imgsHtml}</div>
                `;
                window.scrollTo(0,0);
            }
        };

        // SYNC DANYCH
        onValue(rootRef, (snap) => {
            const data = snap.val() || {};
            const feed = document.getElementById('news-feed');
            const admList = document.getElementById('adm-manage');
            feed.innerHTML = ""; admList.innerHTML = "";

            const sorted = Object.entries(data).sort((a,b) => b[1].time - a[1].time);

            sorted.forEach(([id, v]) => {
                // Do Admina
                admList.innerHTML += `
                    <div class="flex justify-between bg-slate-900 p-3 rounded-xl border border-slate-700">
                        <span class="text-[10px] font-bold uppercase truncate mr-4">${v.title}</span>
                        <button onclick="core.del('${id}')" class="text-red-500 text-xs font-bold">USUŃ</button>
                    </div>`;

                // Do Feedu
                const thumb = v.images ? v.images[0] : '';
                const thumbHtml = thumb ? `<img src="${thumb}" class="w-full h-48 object-cover">` : '';
                
                const card = document.createElement('div');
                card.className = "card";
                card.innerHTML = `
                    ${thumbHtml}
                    <div class="p-6">
                        <h2 class="text-xl font-bold mb-2">${v.title}</h2>
                        <p class="text-slate-400 text-sm line-clamp-3 mb-4">${v.content}</p>
                        <div class="text-[10px] font-black text-amber-500 uppercase">${v.date}</div>
                    </div>`;
                card.onclick = () => core.openPost(id, v);
                feed.appendChild(card);
            });

            if(sorted.length === 0) feed.innerHTML = "<p class='text-slate-500'>Brak artykułów w bazie Ełk.</p>";
        });

    </script>
</body>
</html>

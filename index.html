<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ełk Nasze Eventy</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --main: #0062ff; }
        body { background: #0b0f1a; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(22, 28, 45, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .card { transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.05); }
        .card:hover { transform: translateY(-5px); border-color: var(--main); }
        .input-dark { background: #161c2d; border: 2px solid #2d3748; border-radius: 12px; padding: 12px; width: 100%; color: white; outline: none; }
        .input-dark:focus { border-color: var(--main); }
        .white-pre { white-space: pre-wrap; word-wrap: break-word; }
        #loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="animate-spin text-4xl text-blue-500"><i class="fa-solid fa-circle-notch"></i></div>
    </div>

    <header class="sticky top-0 z-50 glass border-b border-white/5 mb-8">
        <div class="max-w-6xl mx-auto px-4 h-16 flex justify-between items-center">
            <h1 onclick="core.goHome()" class="text-xl font-black italic cursor-pointer">
                EŁK <span class="text-blue-500">NASZE</span> EVENTY
            </h1>
            <button onclick="core.openAdmin()" class="text-[10px] font-bold uppercase tracking-widest opacity-40 hover:opacity-100 transition">
                Panel
            </button>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4">
        
        <div id="view-home" class="space-y-6 pb-20">
            <div id="news-container">
                <div class="text-center py-20 text-slate-600">Wczytywanie...</div>
            </div>
        </div>

        <div id="view-article" class="hidden pb-20">
            <button onclick="core.goHome()" class="mb-8 text-slate-400 font-bold flex items-center gap-2">
                <i class="fa-solid fa-arrow-left"></i> Wstecz
            </button>
            <div id="article-content"></div>
        </div>

        <div id="view-admin" class="hidden max-w-xl mx-auto glass p-8 rounded-[30px]">
            <h2 class="text-xl font-bold mb-6 italic">NOWY WPIS</h2>
            <div class="space-y-4">
                <input type="text" id="in-title" placeholder="Tytuł" class="input-dark">
                <input type="text" id="in-author" placeholder="Autor" class="input-dark">
                <textarea id="in-content" rows="6" placeholder="Treść..." class="input-dark"></textarea>
                <input type="file" id="in-files" multiple accept="image/*" class="text-xs text-slate-500">
                <button onclick="core.publish()" class="w-full bg-blue-600 p-4 rounded-xl font-bold uppercase transition active:scale-95">Opublikuj</button>
                <div id="admin-list" class="mt-10 pt-6 border-t border-white/5 space-y-2"></div>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "TWOJE_API_KEY",
            authDomain: "mzk-by-facio.firebaseapp.com",
            databaseURL: "https://mzk-by-facio-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mzk-by-facio",
            appId: "APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const postsRef = db.ref('elk/posts');

        window.core = {
            goHome: () => {
                document.getElementById('view-home').classList.remove('hidden');
                document.getElementById('view-article').classList.add('hidden');
                document.getElementById('view-admin').classList.add('hidden');
                window.scrollTo(0,0);
            },

            openAdmin: () => {
                if(prompt("KOD:") === "diax67") {
                    document.getElementById('view-home').classList.add('hidden');
                    document.getElementById('view-admin').classList.remove('hidden');
                }
            },

            publish: async () => {
                const t = document.getElementById('in-title').value;
                const c = document.getElementById('in-content').value;
                const a = document.getElementById('in-author').value || "Redakcja";
                const files = document.getElementById('in-files').files;

                if(!t || !c) return alert("Uzupełnij pola");
                document.getElementById('loader').style.display = 'flex';

                let images = [];
                for(let f of files) {
                    const b64 = await new Promise(res => {
                        const r = new FileReader();
                        r.readAsDataURL(f);
                        r.onload = () => res(r.result);
                    });
                    images.push(b64);
                }

                postsRef.push({
                    title: t, content: c, author: a, images: images,
                    ts: Date.now(), date: new Date().toLocaleString('pl-PL')
                }).then(() => location.reload());
            },

            deletePost: (id) => confirm("Usunąć?") && postsRef.child(id).remove(),

            showFull: (id, data) => {
                document.getElementById('view-home').classList.add('hidden');
                document.getElementById('view-article').classList.remove('hidden');
                let imgs = (data.images || []).map(img => `<img src="${img}" class="w-full rounded-2xl mb-4">`).join('');
                document.getElementById('article-content').innerHTML = `
                    <h1 class="text-3xl font-black mb-2">${data.title}</h1>
                    <p class="text-blue-500 text-xs mb-6">${data.author} • ${data.date}</p>
                    <div class="text-slate-300 leading-relaxed white-pre mb-8">${data.content}</div>
                    ${imgs}
                `;
                window.scrollTo(0,0);
            }
        };

        postsRef.on('value', (snap) => {
            const feed = document.getElementById('news-container');
            const adm = document.getElementById('admin-list');
            feed.innerHTML = ""; adm.innerHTML = "";
            const data = snap.val();
            if(!data) return feed.innerHTML = "Brak wpisów.";

            Object.entries(data).sort((a,b) => b[1].ts - a[1].ts).forEach(([id, v]) => {
                adm.innerHTML += `<div class="flex justify-between text-[10px] bg-white/5 p-2 rounded"><span>${v.title}</span><button onclick="core.deletePost('${id}')" class="text-red-500">Usuń</button></div>`;

                const card = document.createElement('div');
                card.className = "card glass p-6 rounded-2xl cursor-pointer mb-4";
                card.innerHTML = `
                    <div class="flex gap-4">
                        ${v.images ? `<img src="${v.images[0]}" class="w-20 h-20 object-cover rounded-lg">` : ''}
                        <div>
                            <h2 class="font-bold text-lg">${v.title}</h2>
                            <p class="text-slate-400 text-sm line-clamp-2">${v.content}</p>
                            <span class="text-[10px] text-blue-500 uppercase mt-2 block">${v.date}</span>
                        </div>
                    </div>`;
                card.onclick = () => core.showFull(id, v);
                feed.appendChild(card);
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ełk Nasze Informacje</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { --main: #0062ff; }
        body { background: #0b0f1a; color: white; font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .glass { background: rgba(22, 28, 45, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .card { transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.05); }
        .card:hover { transform: translateY(-5px); border-color: var(--main); }
        .input-dark { background: #161c2d; border: 2px solid #2d3748; border-radius: 12px; padding: 12px; width: 100%; color: white; outline: none; transition: 0.3s; }
        .input-dark:focus { border-color: var(--main); box-shadow: 0 0 15px rgba(0,98,255,0.2); }
        
        .white-pre { white-space: pre-wrap; word-wrap: break-word; }
        #loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .post-anim { animation: fadeInUp 0.4s ease forwards; }

        .author-badge { font-weight: 900; color: #3b82f6; padding: 0.25rem 0.75rem; background: rgba(59, 130, 246, 0.1); border-radius: 9999px; font-size: 10px; }
        
        .md-h1 { font-size: 2.25rem; font-weight: 900; display: block; margin: 1rem 0; color: white; line-height: 1.2; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }
        .md-h3 { font-size: 1.5rem; font-weight: 700; display: block; margin: 0.75rem 0; color: #cbd5e1; }
        .md-small { font-size: 0.85rem; opacity: 0.7; display: block; line-height: 1.4; color: #94a3b8; }
        .md-u { text-decoration: underline; text-underline-offset: 3px; }

        .tab-btn { padding: 10px 20px; font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; border-radius: 12px; cursor: pointer; transition: 0.3s; border: 1px solid rgba(255,255,255,0.05); color: #64748b; }
        .tab-btn.active { background: var(--main); color: white; border-color: var(--main); box-shadow: 0 4px 15px rgba(0,98,255,0.3); }
        .tab-btn:hover:not(.active) { background: rgba(255,255,255,0.05); color: white; }

        .category-tag { font-size: 9px; font-weight: 900; text-transform: uppercase; padding: 2px 8px; border-radius: 4px; background: rgba(255,255,255,0.1); color: #cbd5e1; }
        
        .like-btn { transition: 0.3s; cursor: pointer; color: #64748b; }
        .like-btn:active { transform: scale(1.4); }
        .like-btn.liked { color: #ef4444; background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.2); }
        
        .comment-item { border-left: 2px solid var(--main); background: rgba(255,255,255,0.02); padding: 10px 15px; border-radius: 0 12px 12px 0; margin-bottom: 10px; position: relative; }
        
        .del-comm-btn { position: absolute; right: 10px; top: 10px; color: #ef4444; font-size: 10px; font-weight: 900; text-transform: uppercase; border: 1px solid rgba(239, 68, 68, 0.2); padding: 2px 8px; border-radius: 5px; display: none; cursor: pointer; }
        body.admin-active .del-comm-btn { display: block; }
        
        .report-btn { font-size: 9px; font-weight: 900; color: #ef4444; text-transform: uppercase; cursor: pointer; opacity: 0.6; margin-left: auto; }
        .report-btn:hover { opacity: 1; }

        .reply-btn { font-size: 9px; font-weight: 900; color: var(--main); text-transform: uppercase; cursor: pointer; opacity: 0.6; }
        .reply-btn:hover { opacity: 1; }
        .comm-react-btn { font-size: 10px; font-weight: 700; display: flex; align-items: center; gap: 4px; background: rgba(255,255,255,0.05); padding: 2px 8px; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        .comm-react-btn:hover { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
        .comm-react-btn.liked { color: #ef4444; background: rgba(239, 68, 68, 0.1); }

        .replies-container { margin-left: 20px; border-left: 1px dashed rgba(255,255,255,0.1); padding-left: 15px; margin-top: 10px; display: none; }
        .reply-item { background: rgba(255,255,255,0.01); padding: 8px 12px; border-radius: 8px; margin-bottom: 5px; font-size: 13px; border: 1px solid rgba(255,255,255,0.02); position: relative; }
        .toggle-replies { font-size: 9px; font-weight: 800; color: #64748b; cursor: pointer; text-transform: uppercase; margin-top: 5px; display: inline-block; }
        .toggle-replies:hover { color: white; }

        .notif-badge { background: #ef4444; color: white; font-size: 10px; padding: 2px 6px; border-radius: 50px; margin-left: 5px; font-weight: 900; }
        .notif-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); padding: 12px; border-radius: 12px; margin-bottom: 10px; }
        .report-highlight { background: rgba(239, 68, 68, 0.05); border-color: rgba(239, 68, 68, 0.1); }

        .preview-wrapper { position: relative; width: 60px; height: 60px; }
        .preview-wrapper img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
        .preview-del { position: absolute; -top: 5px; -right: 5px; background: red; color: white; width: 15px; height: 15px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; }

        .ad-container { position: fixed; top: 100px; width: 140px; min-height: 50px; z-index: 40; display: block; }
        .ad-left { left: 10px; }
        .ad-right { right: 10px; }
        .ad-box { width: 100%; height: 500px; background: #161c2d; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; overflow: hidden; transition: 0.3s; margin-bottom: 15px; }
        .ad-box img { width: 100%; height: 100%; object-fit: cover; }
        .ad-box:hover { border-color: var(--main); transform: scale(1.02); }

        .no-ad-placeholder { font-size: 10px; font-weight: 900; color: rgba(255,255,255,0.2); text-transform: uppercase; border: 2px dashed rgba(255,255,255,0.05); padding: 20px 10px; text-align: center; border-radius: 12px; }

        /* Przycisk Discord */
        .discord-btn { background: #5865F2; color: white; padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 800; text-transform: uppercase; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .discord-btn:hover { background: #4752c4; }

        @media (max-width: 1279px) {
            .ad-container { position: static; width: 100%; max-width: 500px; margin: 0 auto 20px auto; padding: 0 10px; }
            .ad-box { height: 150px; }
        }
        
        footer { border-top: 1px solid rgba(255,255,255,0.05); padding: 40px 0; margin-top: 80px; background: rgba(0,0,0,0.2); }
    </style>
</head>
<body id="main-body">

    <div class="ad-container ad-left" id="ad-l-zone"></div>
    <div class="ad-container ad-right" id="ad-r-zone"></div>

    <div id="loader">
        <div class="animate-spin text-4xl text-blue-500"><i class="fa-solid fa-circle-notch"></i></div>
    </div>

    <header class="sticky top-0 z-50 glass border-b border-white/5 mb-8">
        <div class="max-w-6xl mx-auto px-4 h-16 flex justify-between items-center">
            <h1 onclick="core.goHome()" class="text-xl font-black italic cursor-pointer uppercase">
                EŁK <span class="text-blue-500">NASZE</span> EVENTY
            </h1>
            <div class="flex items-center gap-4">
                <span id="admin-indicator" class="hidden text-[9px] bg-green-500/20 text-green-500 px-2 py-1 rounded-md font-black uppercase tracking-tighter">Tryb Admina</span>
                
                <div id="auth-section">
                    <button onclick="core.loginDiscord()" class="discord-btn">
                        <i class="fa-brands fa-discord"></i> Zaloguj
                    </button>
                </div>

                <button onclick="core.openAdmin()" class="text-[10px] font-bold uppercase tracking-widest opacity-40 hover:opacity-100 transition">
                    Panel Redakcji
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 min-h-screen">
        <div id="search-area" class="mb-8 space-y-6">
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                <input type="text" id="search-input" oninput="core.filterPosts()" placeholder="Szukaj wydarzenia..." class="input-dark pl-12">
            </div>

            <div class="flex flex-wrap gap-2 items-center border-b border-white/5 pb-4">
                <button onclick="core.switchTab('all', this)" class="tab-btn active">Wszystkie</button>
                <button onclick="core.switchTab('Wydarzenia', this)" class="tab-btn">Wydarzenia</button>
                <button onclick="core.switchTab('Aktualizacje', this)" class="tab-btn">Aktualizacje</button>
                <button onclick="core.switchTab('Informacje', this)" class="tab-btn">Informacje</button>
            </div>
        </div>

        <div id="view-home" class="pb-20">
            <div id="news-container" class="space-y-4">
                <div class="text-center py-20 text-slate-600 italic tracking-widest uppercase text-xs">Wczytywanie bazy...</div>
            </div>
            <div id="more-container" class="mt-8 hidden flex justify-center">
                <button onclick="core.showAllPosts()" class="px-8 py-3 bg-slate-800 hover:bg-slate-700 rounded-full font-bold text-sm transition border border-white/5 uppercase tracking-tighter">
                    Pokaż wszystkie pozostałe
                </button>
            </div>
        </div>

        <div id="view-article" class="hidden pb-20">
            <button onclick="core.goHome()" class="mb-8 text-slate-400 font-bold flex items-center gap-2 hover:text-white transition uppercase text-xs tracking-widest">
                <i class="fa-solid fa-arrow-left"></i> Wstecz
            </button>
            <div id="article-content"></div>
            
            <div id="article-interaction" class="mt-12 pt-12 border-t border-white/10">
                <div class="flex items-center gap-6 mb-10">
                    <div id="main-like-btn" onclick="core.likePost()" class="like-btn flex items-center gap-2 bg-white/5 px-6 py-3 rounded-full border border-white/5 transition">
                        <i class="fa-solid fa-heart text-xl"></i>
                        <span id="like-count" class="font-black">0</span>
                    </div>
                </div>

                <h3 class="text-xl font-black uppercase italic mb-6">Komentarze</h3>
                <div id="comments-list" class="space-y-4 mb-8"></div>
                
                <div id="comment-box-anchor" class="glass p-6 rounded-[24px] space-y-4 border border-blue-500/20">
                    <div id="replying-to-info" class="hidden flex justify-between items-center bg-blue-500/10 p-2 rounded-lg border border-blue-500/20">
                        <span class="text-[10px] font-bold uppercase">Odpowiadasz użytkownikowi: <span id="target-nick" class="text-blue-400"></span></span>
                        <button onclick="core.cancelReply()" class="text-red-500 text-[10px] font-black uppercase">Anuluj</button>
                    </div>
                    <input type="text" id="comm-nick" placeholder="Twój Nick" class="input-dark">
                    <textarea id="comm-text" rows="3" placeholder="Napisz co o tym sądzisz..." class="input-dark"></textarea>
                    <button onclick="core.addComment()" class="bg-blue-600 w-full p-4 rounded-xl font-bold uppercase tracking-widest hover:bg-blue-500 transition shadow-lg shadow-blue-500/20">Wyślij</button>
                </div>
            </div>
        </div>

        <div id="view-admin" class="hidden pb-20">
            <button onclick="core.goHome()" class="mb-6 text-blue-500 font-bold flex items-center gap-2 hover:text-white transition uppercase text-[10px] tracking-widest">
                <i class="fa-solid fa-house"></i> Powrót do strony głównej
            </button>
            </div>
    </main>

    <script>
        // --- KONFIGURACJA SUPABASE (Z TWOIM ADRESEM FACIOPLYT) ---
        const SUPABASE_URL = 'https://facioplyt-rgb.supabase.co'; //
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; // Wklej swój pełny klucz
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- KONFIGURACJA FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSy...", 
            authDomain: "mzk-by-facio.firebaseapp.com",
            databaseURL: "https://mzk-by-facio-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mzk-by-facio",
            appId: "1:676970411647:web:5703d5fb5fb499ff83714a"
        };

        const IMGBB_API_KEY = "19570ba1fa4dc27bd0ba974b4eb2e253";
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const postsRef = db.ref('elk/posts');
        const reportsRef = db.ref('elk/reports');
        const adsRef = db.ref('elk/ads');

        window.core = {
            // Logika Logowania (Poprawiona pod telefon)
            loginDiscord: async () => {
                const { error } = await sb.auth.signInWithOAuth({
                    provider: 'discord'
                    // Usunięto redirectTo: localhost, aby uniknąć błędu DNS na telefonie
                });
                if(error) alert("Błąd: " + error.message);
            },

            logoutDiscord: async () => {
                await sb.auth.signOut();
                window.location.reload();
            },

            checkAuth: async () => {
                const { data: { session } } = await sb.auth.getSession();
                const authArea = document.getElementById('auth-section');
                if (session) {
                    const user = session.user;
                    const nick = user.user_metadata.full_name || user.email;
                    document.getElementById('comm-nick').value = nick;
                    authArea.innerHTML = `
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] font-bold text-blue-400">${nick}</span>
                            <button onclick="core.logoutDiscord()" class="text-[9px] text-red-500 font-bold uppercase">Wyloguj</button>
                        </div>
                    `;
                }
            },

            // Pozostałe funkcje (Markdown, Like, Komentarze) z Twojego pierwotnego kodu...
            parseMarkdown: (text) => {
                if(!text) return "";
                let html = text;
                html = html.replace(/^#\s+(.*)$/gm, '<span class="md-h1">$1</span>').replace(/^###\s+(.*)$/gm, '<span class="md-h3">$1</span>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                return html;
            },

            goHome: () => {
                document.getElementById('view-home').classList.remove('hidden');
                document.getElementById('search-area').classList.remove('hidden');
                document.getElementById('view-article').classList.add('hidden');
            },

            filterPosts: () => {
                const term = document.getElementById('search-input').value.toLowerCase();
                // Logika filtrowania...
            }
        };

        // Inicjalizacja autoryzacji
        core.checkAuth();
        sb.auth.onAuthStateChange(() => core.checkAuth());

        // Nasłuchiwanie postów Firebase
        postsRef.on('value', (snap) => {
            // Logika renderowania postów...
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK RADAR V30 | RTDB</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root { --accent: #f59e0b; --danger: #ef4444; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; margin: 0; overflow: hidden; height: 100vh; }
        #map { height: 100vh; width: 100%; z-index: 1; filter: contrast(1.05); }
        #city-overlay { position: fixed; inset: 0; z-index: 9999; background: #ffffff; display: flex; flex-direction: column; items-center; justify-content: center; }
        .glass { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.4); }
        .sheet { position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000; transform: translateY(110%); transition: all 0.3s ease; max-width: 600px; margin: 0 auto; }
        .sheet.open { transform: translateY(0); }
        .mzk-marker { width: 50px; height: 50px; border-radius: 15px; border: 3px solid white; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; font-weight: 800; box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        .pulse-red { animation: pulse 1.2s infinite; background: var(--danger); }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .btn-action { transition: all 0.1s active; cursor: pointer; }
        .btn-action:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="city-overlay">
        <div class="text-center p-10">
            <div class="text-7xl mb-6">📡</div>
            <h1 class="text-4xl font-black italic tracking-tighter text-slate-900 mb-2">MZK RADAR</h1>
            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.4em] mb-12">System Live (Realtime DB)</p>
            <button onclick="startApp('gorzow', [52.732, 15.237])" class="w-64 p-6 bg-amber-500 text-white rounded-3xl font-black tracking-widest shadow-2xl btn-action">POŁĄCZ Z BAZĄ</button>
        </div>
    </div>

    <div class="fixed top-6 left-4 right-4 z-[500] flex justify-center pointer-events-none">
        <div class="w-full max-w-xl glass rounded-[25px] p-4 flex justify-between items-center pointer-events-auto">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-amber-500 rounded-xl flex items-center justify-center text-xl shadow-lg">🚍</div>
                <div>
                    <h2 class="text-xs font-black uppercase text-slate-900">MZK Live</h2>
                    <p id="status-gps" class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">Szukanie sygnału...</p>
                </div>
            </div>
            <button onclick="authAdmin()" class="w-10 h-10 bg-slate-50 rounded-lg flex items-center justify-center text-xl">⚙️</button>
        </div>
    </div>

    <div id="map"></div>

    <div id="fab" class="fixed bottom-10 inset-x-0 z-[500] flex justify-center px-8 opacity-0 pointer-events-none transition-all">
        <button onclick="initReport()" class="w-full max-w-sm bg-amber-500 text-white p-6 rounded-[25px] font-black text-sm tracking-widest shadow-2xl uppercase">➕ DODAJ ALERT</button>
    </div>

    <div id="sheet-details" class="sheet glass rounded-t-[40px] p-10 shadow-2xl">
        <input type="text" id="dir-search" placeholder="Szukaj linii..." class="w-full bg-slate-100 p-4 rounded-2xl mb-4 font-bold outline-none" oninput="filterDirs()">
        <div id="dir-list" class="grid gap-2 max-h-[40vh] overflow-y-auto"></div>
        <button onclick="closeSheets()" class="w-full mt-4 text-[10px] font-bold text-slate-400 uppercase">Zamknij</button>
    </div>

    <div id="admin-panel" class="hidden fixed inset-0 z-[10000] bg-white p-10 overflow-y-auto">
        <div class="max-w-xl mx-auto">
            <h2 class="text-4xl font-black italic mb-10">Panel Kierunków</h2>
            <textarea id="admin-dirs-input" rows="15" class="w-full bg-slate-50 border-2 border-slate-100 rounded-3xl p-6 text-sm font-bold mb-6 outline-none focus:border-amber-500"></textarea>
            <button onclick="saveDirs()" class="w-full bg-slate-900 text-white p-6 rounded-2xl font-black btn-action">ZAPISZ KIERUNKI</button>
            <button onclick="toggleAdmin(false)" class="w-full p-4 text-slate-400 font-bold mt-4">POWRÓT</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        // ZMIANA NA REALTIME DATABASE
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCb5QmZdwWwa9LafqqGZvGW-6vblkab32M",
            authDomain: "mzk-by-facio.firebaseapp.com",
            databaseURL: "https://mzk-by-facio-default-rtdb.europe-west1.firebasedatabase.app", // PRECYZYJNY ADRES Z TWOJEGO SCREENA
            projectId: "mzk-by-facio",
            storageBucket: "mzk-by-facio.appspot.com",
            messagingSenderId: "676970411647",
            appId: "1:676970411647:web:5703d5fb5fb499ff83714a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const map = L.map('map', { zoomControl: false, attributionControl: false });
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

        let currentCity = 'gorzow';
        let allDirs = [];
        const markerMap = {};

        // --- OBSŁUGA BAZY (REALTIME) ---
        window.startApp = (city, coords) => {
            document.getElementById('city-overlay').style.display = 'none';
            document.getElementById('fab').style.opacity = '1';
            document.getElementById('fab').style.pointerEvents = 'auto';
            map.setView(coords, 15);

            // Słuchanie na alerty
            const alertsRef = ref(db, 'alerts');
            onValue(alertsRef, (snapshot) => {
                const data = snapshot.val();
                updateMarkers(data);
            });

            // Słuchanie na kierunki
            const configRef = ref(db, 'config/directions');
            onValue(configRef, (snapshot) => {
                allDirs = snapshot.val() || [];
                renderDirs(allDirs);
            });
        };

        function updateMarkers(data) {
            const currentIds = data ? Object.keys(data) : [];
            
            // Usuń te, których nie ma w bazie
            Object.keys(markerMap).forEach(id => {
                if (!currentIds.includes(id)) {
                    map.removeLayer(markerMap[id]);
                    delete markerMap[id];
                }
            });

            if (!data) return;

            // Dodaj lub aktualizuj
            Object.entries(data).forEach(([id, val]) => {
                if (!markerMap[id]) {
                    const html = `<div class="mzk-marker pulse-red" style="background:#ef4444">
                        <span>🔍</span>
                        <div style="font-size:7px; text-align:center">${val.dir.split(' ')[0]}</div>
                    </div>`;
                    markerMap[id] = L.marker([val.lat, val.lng], {
                        icon: L.divIcon({ className: '', html: html, iconAnchor: [25, 25] })
                    }).addTo(map);
                }
            });
        }

        // --- KIERUNKI I ADMIN ---
        window.saveReport = (dir) => {
            closeSheets();
            map.once('click', (e) => {
                const newAlertRef = push(ref(db, 'alerts'));
                set(newAlertRef, {
                    dir: dir,
                    lat: e.latlng.lat,
                    lng: e.latlng.lng,
                    timestamp: Date.now()
                });
            });
            alert("Kliknij teraz miejsce na mapie!");
        };

        window.saveDirs = () => {
            const lines = document.getElementById('admin-dirs-input').value.split('\n').filter(l => l.trim() !== "");
            set(ref(db, 'config/directions'), lines);
            alert("Kierunki zapisane w Realtime DB!");
            toggleAdmin(false);
        };

        window.authAdmin = () => { if(prompt("Hasło:") === "mzk2026") toggleAdmin(true); };
        window.toggleAdmin = (s) => {
            document.getElementById('admin-panel').classList.toggle('hidden', !s);
            if(s) {
                document.getElementById('admin-dirs-input').value = allDirs.join('\n');
            }
        };

        // --- UI ---
        window.initReport = () => openSheet('sheet-details');
        window.openSheet = (id) => document.getElementById(id).classList.add('open');
        window.closeSheets = () => document.querySelectorAll('.sheet').forEach(s => s.classList.remove('open'));
        
        function renderDirs(list) {
            document.getElementById('dir-list').innerHTML = list.map(d => `
                <button onclick="saveReport('${d}')" class="w-full bg-white border p-5 rounded-2xl text-left font-bold text-slate-700 btn-action">${d}</button>
            `).join('');
        }

        window.filterDirs = () => {
            const val = document.getElementById('dir-search').value.toLowerCase();
            renderDirs(allDirs.filter(d => d.toLowerCase().includes(val)));
        };

    </script>
</body>
</html>

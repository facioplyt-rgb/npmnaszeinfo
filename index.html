<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Ełk Nasze Eventy | TEST v13</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; padding: 20px; }
        .box { background: #161616; padding: 20px; border-radius: 10px; border: 1px solid #333; max-width: 800px; margin: 0 auto; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; }
        button { background: #0066cc; color: white; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        .post-card { background: #222; padding: 15px; margin-top: 10px; border-radius: 5px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="box">
    <h1>Test połączenia z Firebase (Węzeł: elk)</h1>
    
    <div id="admin-panel">
        <input type="text" id="t" placeholder="Tytuł testowy">
        <textarea id="c" rows="5" placeholder="Treść testowa"></textarea>
        <button onclick="sendTest()">WYŚLIJ TEST</button>
    </div>

    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #333;">
    
    <h3>Wpisy w bazie:</h3>
    <div id="display">Ładowanie danych z Firebase...</div>
</div>

<script>
    // --- TWOJE DANE Z FIREBASE ---
    const firebaseConfig = {
        apiKey: "TWOJE_API_KEY",
        authDomain: "mzk-by-facio.firebaseapp.com",
        databaseURL: "https://mzk-by-facio-default-rtdb.europe-west1.firebaseio.com",
        projectId: "mzk-by-facio",
        appId: "APP_ID"
    };

    // Inicjalizacja
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Funkcja wysyłania
    async function sendTest() {
        const title = document.getElementById('t').value;
        const content = document.getElementById('c').value;

        if(!title) return alert("Wpisz chociaż tytuł!");

        try {
            await db.ref("elk/posts").push({
                title: title,
                content: content,
                ts: Date.now(),
                date: new Date().toLocaleString()
            });
            alert("Zadziałało! Dane są w Firebase.");
            document.getElementById('t').value = "";
            document.getElementById('c').value = "";
        } catch (e) {
            console.error(e);
            alert("BŁĄD: " + e.message);
        }
    }

    // Pobieranie w czasie rzeczywistym
    db.ref("elk/posts").on('value', (snap) => {
        const div = document.getElementById('display');
        div.innerHTML = "";
        
        if(!snap.exists()) {
            div.innerHTML = "Baza jest pusta.";
            return;
        }

        snap.forEach(child => {
            const data = child.val();
            div.innerHTML += `
                <div class="post-card">
                    <strong>${data.title}</strong><br>
                    <small>${data.date}</small>
                    <p>${data.content}</p>
                    <button onclick="deletePost('${child.key}')" style="background:red; padding:5px 10px; font-size:10px">USUŃ</button>
                </div>
            `;
        });
    });

    function deletePost(id) {
        db.ref("elk/posts/" + id).remove();
    }
</script>

</body>
</html>

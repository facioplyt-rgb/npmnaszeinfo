<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ełk Nasze Eventy</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --main: #0062ff; }
        body { background: #0b0f1a; color: white; font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .glass { background: rgba(22, 28, 45, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .card { transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.05); }
        .card:hover { transform: translateY(-5px); border-color: var(--main); }
        .input-dark { background: #161c2d; border: 2px solid #2d3748; border-radius: 12px; padding: 12px; width: 100%; color: white; outline: none; transition: 0.3s; }
        .input-dark:focus { border-color: var(--main); box-shadow: 0 0 15px rgba(0,98,255,0.2); }
        .white-pre { white-space: pre-wrap; word-wrap: break-word; }
        #loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .post-anim { animation: fadeInUp 0.4s ease forwards; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="animate-spin text-4xl text-blue-500"><i class="fa-solid fa-circle-notch"></i></div>
    </div>

    <header class="sticky top-0 z-50 glass border-b border-white/5 mb-8">
        <div class="max-w-6xl mx-auto px-4 h-16 flex justify-between items-center">
            <h1 onclick="core.goHome()" class="text-xl font-black italic cursor-pointer uppercase">
                EŁK <span class="text-blue-500">NASZE</span> EVENTY
            </h1>
            <button onclick="core.openAdmin()" class="text-[10px] font-bold uppercase tracking-widest opacity-40 hover:opacity-100 transition">
                Panel Redakcji
            </button>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4">
        
        <div id="search-area" class="mb-8">
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                <input type="text" id="search-input" oninput="core.filterPosts()" placeholder="Szukaj wydarzenia..." class="input-dark pl-12">
            </div>
        </div>

        <div id="view-home" class="pb-20">
            <div id="news-container" class="space-y-4">
                <div class="text-center py-20 text-slate-600 italic tracking-widest uppercase text-xs">Wczytywanie bazy...</div>
            </div>
            <div id="more-container" class="mt-8 hidden flex justify-center">
                <button onclick="core.showAllPosts()" class="px-8 py-3 bg-slate-800 hover:bg-slate-700 rounded-full font-bold text-sm transition border border-white/5 uppercase tracking-tighter">
                    Pokaż wszystkie pozostałe
                </button>
            </div>
        </div>

        <div id="view-article" class="hidden pb-20">
            <button onclick="core.goHome()" class="mb-8 text-slate-400 font-bold flex items-center gap-2 hover:text-white transition">
                <i class="fa-solid fa-arrow-left"></i> WSTECZ
            </button>
            <div id="article-content"></div>
        </div>

        <div id="view-admin" class="hidden max-w-xl mx-auto glass p-8 rounded-[30px] mb-20 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 id="admin-mode-title" class="text-xl font-bold italic uppercase tracking-tighter">Nowy Wpis</h2>
                <button onclick="core.cancelEdit()" id="cancel-edit-btn" class="hidden text-red-500 text-[10px] font-bold uppercase border border-red-500/30 px-3 py-1 rounded-full">Anuluj edycję</button>
            </div>
            
            <div class="space-y-4">
                <input type="text" id="in-title" placeholder="Tytuł wydarzenia" class="input-dark">
                <input type="text" id="in-author" placeholder="Autor / Redakcja" class="input-dark">
                <textarea id="in-content" rows="6" placeholder="Treść artykułu..." class="input-dark"></textarea>
                
                <div class="bg-white/5 p-4 rounded-xl border border-dashed border-white/10">
                    <p class="text-[10px] font-bold text-slate-500 mb-2 uppercase">Zarządzaj zdjęciami:</p>
                    
                    <div id="edit-images-preview" class="flex flex-wrap gap-2 mb-3"></div>
                    
                    <input type="file" id="in-files" multiple accept="image/*" class="text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-blue-500/10 file:text-blue-500 hover:file:bg-blue-500/20">
                </div>

                <button onclick="core.publish()" id="publish-btn" class="w-full bg-blue-600 p-4 rounded-xl font-bold uppercase transition active:scale-95 shadow-lg shadow-blue-500/20">
                    Opublikuj na stronie
                </button>
                
                <div id="admin-list" class="mt-10 pt-6 border-t border-white/5 space-y-2"></div>
            </div>
        </div>
    </main>

    <script>
        // --- TWOJA KONFIGURACJA ---
        const firebaseConfig = {
            apiKey: "AIzaSy...", // WPISZ SWOJE API KEY
            authDomain: "mzk-by-facio.firebaseapp.com",
            databaseURL: "https://mzk-by-facio-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mzk-by-facio",
            appId: "1:676970411647:web:5703d5fb5fb499ff83714a"
        };

        const IMGBB_API_KEY = "19570ba1fa4dc27bd0ba974b4eb2e253";

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const postsRef = db.ref('elk/posts');

        let allData = [];
        let showLimit = 3;
        let editId = null;
        let currentEditImages = [];

        window.core = {
            goHome: () => {
                document.getElementById('view-home').classList.remove('hidden');
                document.getElementById('search-area').classList.remove('hidden');
                document.getElementById('view-article').classList.add('hidden');
                document.getElementById('view-admin').classList.add('hidden');
                core.cancelEdit();
                window.scrollTo(0,0);
            },

            openAdmin: () => {
                const pin = prompt("KOD REDAKCYJNY:");
                if(pin === "diax67") {
                    document.getElementById('view-home').classList.add('hidden');
                    document.getElementById('search-area').classList.add('hidden');
                    document.getElementById('view-admin').classList.remove('hidden');
                }
            },

            removeImageFromEdit: (index) => {
                currentEditImages.splice(index, 1);
                core.renderEditImages();
            },

            renderEditImages: () => {
                const container = document.getElementById('edit-images-preview');
                container.innerHTML = "";
                currentEditImages.forEach((url, index) => {
                    const div = document.createElement('div');
                    div.className = "relative inline-block";
                    div.innerHTML = `
                        <img src="${url}" class="w-16 h-16 object-cover rounded-lg ring-1 ring-white/10">
                        <button onclick="core.removeImageFromEdit(${index})" class="absolute -top-1 -right-1 bg-red-600 text-white rounded-full w-5 h-5 text-[10px] flex items-center justify-center font-bold shadow-xl border border-white/20">X</button>
                    `;
                    container.appendChild(div);
                });
            },

            publish: async () => {
                const t = document.getElementById('in-title').value;
                const c = document.getElementById('in-content').value;
                const a = document.getElementById('in-author').value || "Redakcja";
                const files = document.getElementById('in-files').files;

                if(!t || !c) return alert("Uzupełnij tytuł i treść!");
                document.getElementById('loader').style.display = 'flex';

                let newImageUrls = [];
                for(let f of files) {
                    const fd = new FormData();
                    fd.append("image", f);
                    try {
                        const r = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: fd });
                        const d = await r.json();
                        if(d.success) newImageUrls.push(d.data.url);
                    } catch(e) { console.error("ImgBB Error", e); }
                }

                const finalImages = [...currentEditImages, ...newImageUrls];

                const postData = {
                    title: t, content: c, author: a,
                    ts: Date.now(), 
                    date: new Date().toLocaleString('pl-PL'),
                    images: finalImages
                };

                const action = editId ? postsRef.child(editId).update(postData) : postsRef.push(postData);
                action.then(() => location.reload()).catch(err => {
                    alert("Błąd: " + err.message);
                    document.getElementById('loader').style.display = 'none';
                });
            },

            editMode: (id) => {
                const post = allData.find(x => x.id === id);
                if(!post) return;
                editId = id;
                currentEditImages = post.images ? [...post.images] : [];
                
                document.getElementById('in-title').value = post.title;
                document.getElementById('in-author').value = post.author;
                document.getElementById('in-content').value = post.content;
                document.getElementById('admin-mode-title').innerText = "Edytuj Artykuł";
                document.getElementById('publish-btn').innerText = "Zapisz Zmiany";
                document.getElementById('publish-btn').classList.replace('bg-blue-600', 'bg-amber-600');
                document.getElementById('cancel-edit-btn').classList.remove('hidden');
                
                core.renderEditImages();
                window.scrollTo(0,0);
            },

            cancelEdit: () => {
                editId = null;
                currentEditImages = [];
                document.getElementById('in-title').value = "";
                document.getElementById('in-author').value = "";
                document.getElementById('in-content').value = "";
                document.getElementById('in-files').value = "";
                document.getElementById('edit-images-preview').innerHTML = "";
                document.getElementById('admin-mode-title').innerText = "Nowy Wpis";
                document.getElementById('publish-btn').innerText = "Opublikuj na stronie";
                document.getElementById('publish-btn').classList.replace('bg-amber-600', 'bg-blue-600');
                document.getElementById('cancel-edit-btn').classList.add('hidden');
            },

            deletePost: (id) => confirm("Usunąć ten wpis na zawsze?") && postsRef.child(id).remove(),

            showAllPosts: () => {
                showLimit = 999;
                core.renderPosts(allData);
                document.getElementById('more-container').classList.add('hidden');
            },

            filterPosts: () => {
                const term = document.getElementById('search-input').value.toLowerCase();
                const filtered = allData.filter(p => 
                    p.title.toLowerCase().includes(term) || 
                    p.author.toLowerCase().includes(term)
                );
                core.renderPosts(filtered, term !== "");
            },

            renderPosts: (items, isSearching = false) => {
                const container = document.getElementById('news-container');
                container.innerHTML = "";
                const toShow = isSearching ? items : items.slice(0, showLimit);

                if(toShow.length === 0) {
                    container.innerHTML = "<div class='text-center py-20 text-slate-500 uppercase text-xs tracking-widest'>Nic nie znaleziono</div>";
                    return;
                }

                toShow.forEach(v => {
                    const card = document.createElement('div');
                    card.className = "card glass p-6 rounded-2xl cursor-pointer mb-4 post-anim";
                    card.innerHTML = `
                        <div class="flex gap-5 flex-col md:flex-row items-center md:items-start">
                            ${v.images?.[0] ? `<img src="${v.images[0]}" class="w-full md:w-28 h-28 object-cover rounded-xl shadow-lg border border-white/5">` : `<div class="w-28 h-28 bg-slate-800 rounded-xl flex items-center justify-center text-slate-600"><i class="fa-solid fa-image text-3xl"></i></div>`}
                            <div class="flex-1 text-center md:text-left">
                                <h2 class="font-black text-xl mb-1">${v.title}</h2>
                                <p class="text-slate-400 text-sm line-clamp-2 leading-relaxed">${v.content}</p>
                                <div class="flex flex-wrap justify-center md:justify-start items-center gap-3 mt-4">
                                    <span class="text-[10px] font-black text-blue-500 uppercase px-3 py-1 bg-blue-500/10 rounded-full">${v.author}</span>
                                    <span class="text-[10px] text-slate-500 font-bold">${v.date}</span>
                                </div>
                            </div>
                        </div>`;
                    card.onclick = () => core.showFull(v);
                    container.appendChild(card);
                });

                const moreBtn = document.getElementById('more-container');
                moreBtn.classList.toggle('hidden', isSearching || items.length <= showLimit);
            },

            showFull: (data) => {
                document.getElementById('view-home').classList.add('hidden');
                document.getElementById('search-area').classList.add('hidden');
                document.getElementById('view-article').classList.remove('hidden');
                
                let imgs = (data.images || []).map(img => `<img src="${img}" class="w-full rounded-3xl mb-6 shadow-2xl border border-white/5">`).join('');
                
                document.getElementById('article-content').innerHTML = `
                    <h1 class="text-4xl md:text-5xl font-black mb-4 tracking-tighter leading-tight">${data.title}</h1>
                    <div class="flex items-center gap-4 mb-8">
                        <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center font-bold text-white shadow-lg shadow-blue-500/30">${data.author.charAt(0)}</div>
                        <div>
                            <p class="text-sm font-bold uppercase text-blue-500 tracking-tighter">${data.author}</p>
                            <p class="text-[10px] text-slate-500 font-bold">${data.date}</p>
                        </div>
                    </div>
                    <div class="text-slate-300 text-lg leading-relaxed white-pre mb-10 border-l-4 border-blue-600 pl-6">${data.content}</div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">${imgs}</div>
                `;
                window.scrollTo(0,0);
            }
        };

        // SYNCHRONIZACJA Z FIREBASE
        postsRef.on('value', (snap) => {
            const data = snap.val();
            allData = [];
            const admList = document.getElementById('admin-list');
            admList.innerHTML = "<h3 class='text-[10px] font-black text-slate-600 uppercase tracking-widest mb-4'>Zarządzaj wpisami:</h3>";
            
            if(data) {
                Object.entries(data).sort((a,b) => b[1].ts - a[1].ts).forEach(([id, v]) => {
                    allData.push({ id, ...v });
                    admList.innerHTML += `
                        <div class="flex justify-between items-center bg-white/5 p-3 rounded-xl border border-white/5 hover:border-white/20 transition">
                            <span class="text-[10px] font-bold truncate max-w-[150px] opacity-70 italic">${v.title}</span>
                            <div class="flex gap-2">
                                <button onclick="core.editMode('${id}')" class="text-amber-500 hover:bg-amber-500/10 px-3 py-1 rounded-full text-[9px] font-bold uppercase transition border border-amber-500/30">Edytuj</button>
                                <button onclick="core.deletePost('${id}')" class="text-red-500 hover:bg-red-500/10 px-3 py-1 rounded-full text-[9px] font-bold uppercase transition border border-red-500/30">Usuń</button>
                            </div>
                        </div>`;
                });
            }
            core.renderPosts(allData);
        });
    </script>
</body>
</html>
